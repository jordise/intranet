<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Tarea Limpieza v01 — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;--green:#1e9e4e;--green-light:#e6f7ee;--gray-1:#f4f5f7;--gray-2:#e8eaed;--gray-3:#c4c9d4;--gray-4:#7a8194;--gray-5:#2d3142;--orange:#e07b00;--r:14px;--shadow:0 4px 18px rgba(0,0,0,.12)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}

    /* ── Nav compacta blanca — sin botón menú — v06 ── */
    .wp-nav{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#fff;border-bottom:1.5px solid var(--gray-2);box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:100}
    .wp-nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
    .wp-nav-logo img{height:26px;object-fit:contain}
    .wp-nav-center{flex:1;min-width:0;padding:0 6px}
    .wp-nav-title{font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;color:var(--gray-5);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wp-nav-sub{font-size:11px;color:var(--gray-4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wp-nav-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .wp-task-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:4px 10px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;background:var(--gray-1);border:1.5px solid var(--gray-2);color:var(--gray-5)}
    .wp-debug-btn{background:var(--gray-1);border:1.5px solid var(--gray-2);color:var(--gray-4);font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;flex-shrink:0}
    .wp-nav-close{display:flex;align-items:center;justify-content:center;background:rgba(200,16,46,.1);border:1.5px solid rgba(200,16,46,.2);color:var(--red);width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:900;cursor:pointer;transition:background .15s;flex-shrink:0}
    .wp-nav-close:hover{background:rgba(200,16,46,.2)}

    main{padding:16px;max-width:500px;margin:0 auto}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-4);padding:12px 16px 8px;border-bottom:1px solid var(--gray-2)}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s}
    .toggle-row:not(:last-child){border-bottom:1px solid var(--gray-2)}
    .toggle-row:active{background:var(--gray-1)}
    .toggle-label{font-size:14px;font-weight:500;color:var(--gray-5);flex:1;padding-right:12px;line-height:1.3}
    .toggle-sub{font-size:11px;color:var(--gray-4);margin-top:2px}
    .switch{position:relative;width:50px;height:28px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0;position:absolute}
    .slider{position:absolute;inset:0;background:var(--gray-3);border-radius:28px;transition:background .2s;cursor:pointer}
    .slider::before{content:'';position:absolute;height:22px;width:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    input:checked + .slider{background:var(--green)}
    input:checked + .slider::before{transform:translateX(22px)}
    .photo-wrap{padding:14px 16px}
    .photo-slot{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;transition:all .2s}
    .photo-slot.empty{background:var(--gray-1);border:2px dashed var(--gray-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
    .photo-slot.empty:hover{border-color:var(--red);background:var(--red-light)}
    .ps-num{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;color:var(--gray-3)}
    .ps-btns{display:flex;gap:5px}
    .ps-btn{background:#fff;border:1.5px solid var(--gray-2);border-radius:8px;padding:7px 11px;font-size:18px;cursor:pointer;line-height:1;transition:all .15s}
    .ps-btn:hover{border-color:var(--red);background:var(--red-light)}
    .pt-del{position:absolute;top:4px;right:4px;background:rgba(200,16,46,.85);color:#fff;border:none;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif}
    .photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .photo-btn{height:44px;border-radius:10px;border:1.5px solid var(--gray-2);background:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gray-5);transition:all .15s}
    .photo-btn:active{background:var(--gray-1)}
    .photo-btn.primary{background:var(--red);color:#fff;border-color:var(--red)}
    .photo-btn.primary:active{background:var(--red-dark)}
    #fileInput{display:none}#cameraInput{display:none}
    .photo-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:28px;height:28px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(4px)}
    .comments-wrap{padding:14px 16px}
    .comments-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-4);margin-bottom:8px;display:block}
    textarea{width:100%;height:90px;border:1.5px solid var(--gray-2);border-radius:10px;padding:10px 12px;font-family:'Open Sans',sans-serif;font-size:14px;color:var(--gray-5);resize:none;outline:none;transition:border-color .15s}
    textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.08)}
    textarea::placeholder{color:var(--gray-3)}
    .save-wrap{padding:6px 0 20px}
    .photo-required-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-light);color:var(--red);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;text-transform:uppercase;letter-spacing:.4px}
    .photo-slot.slot-error{border-color:var(--red)!important;border-style:solid!important;animation:shake-slot .4s}
    @keyframes shake-slot{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .btn-todo-ok{width:100%;height:60px;background:linear-gradient(135deg,#1967d2,#1251b0);color:#fff;border:none;border-radius:14px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;letter-spacing:.3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 16px rgba(25,103,210,.4);margin-bottom:10px}
    .btn-todo-ok:active{transform:scale(.98);opacity:.9}
    .btn-todo-ok:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed}
    .btn-todo-ok .spinner{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
    .save-label-sub{font-size:10px;opacity:.7;display:block;font-weight:600;margin-top:1px}
    .btn-save{width:100%;height:54px;background:var(--green);color:#fff;border:none;border-radius:14px;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;box-shadow:0 4px 14px rgba(30,158,78,.35)}
    .btn-save:active{background:#17834a;transform:scale(.98)}
    .btn-save:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed}
    .btn-save .spinner{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d3142;color:#fff;padding:12px 22px;border-radius:30px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}
    #loadOverlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px}
    .load-spinner{width:40px;height:40px;border:3px solid var(--gray-2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    .load-text{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--gray-4)}
    .error-state{text-align:center;padding:50px 20px}
    .error-state .emoji{font-size:50px;margin-bottom:12px}
    .error-state h3{font-family:'Montserrat',sans-serif;font-size:18px;margin-bottom:8px}
    .error-state p{font-size:13px;color:var(--gray-4)}

    /* ── Incidencias desplegable ── */
    .inc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s;border-bottom:1px solid transparent}
    .inc-header.is-open{border-bottom-color:var(--gray-2);background:var(--orange-light,#fff4e0)}
    .inc-label-wrap{display:flex;align-items:center;gap:10px;flex:1}
    .inc-label{font-size:14px;font-weight:600;color:var(--gray-5);line-height:1.3}
    .inc-sub{font-size:11px;color:var(--gray-4);margin-top:2px}
    .inc-arrow{font-size:18px;color:var(--gray-4);transition:transform .25s;flex-shrink:0;margin-left:8px}
    .inc-header.is-open .inc-arrow{transform:rotate(180deg)}
    .inc-badge{display:inline-flex;align-items:center;padding:2px 8px;background:var(--orange,#e07b00);color:#fff;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;border-radius:10px;margin-left:6px;text-transform:uppercase}
    .inc-body{display:none;flex-direction:column;gap:14px;padding:14px 16px}
    .inc-body.open{display:flex}
    .inc-photos{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .inc-photo-slot{position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;flex-shrink:0}
    .inc-photo-slot.empty{background:var(--gray-1);border:2px dashed var(--gray-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer}
    .inc-photo-slot.empty:hover{border-color:var(--orange,#e07b00);background:var(--orange-light,#fff4e0)}
    .inc-photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
    #cameraInc3,#fileInc3,#cameraInc4,#fileInc4,#cameraInc5,#fileInc5{display:none}
    :root{--orange:#e07b00;--orange-light:#fff4e0}
  </style>

</head>

<script>Auth.require('entradas');</script>
<div id="loadOverlay"><div class="load-spinner"></div><div class="load-text">Cargando...</div></div>
<div id="toast" class="toast"></div>

<!-- ══ NAV COMPACTA — sin botón menú — v06 ══ -->
<nav class="wp-nav">
  <a class="wp-nav-logo" href="index.html">
    <img src="logo-negro.png" alt="<3Villas">
  </a>
  <div class="wp-nav-center">
    <div class="wp-nav-title" id="hVilla">Cargando…</div>
    <div class="wp-nav-sub" id="hRes"></div>
  </div>
  <div class="wp-nav-btns">
    <div class="wp-task-badge" id="hTaskBadge">🧹 Limpieza</div>
    <button class="wp-debug-btn" onclick="showDebug()" title="Debug">🐛</button>
    <button class="wp-nav-close" onclick="try{window.close();}catch(e){history.back();}" title="Cerrar">✕</button>
  </div>
</nav>

<main id="mainContent" style="display:none">

  <!-- 1. VERIFICACIONES -->
  <div class="card">
    <div class="card-title">🧹 Verificaciones</div>
    <label class="toggle-row" for="swVentanas">
      <div><div class="toggle-label">🪟 Ventanas y puertas cerradas</div><div class="toggle-sub">Obligatorio</div></div>
      <div class="switch"><input type="checkbox" id="swVentanas"><div class="slider"></div></div>
    </label>
    <label class="toggle-row" for="swAires">
      <div><div class="toggle-label">❄️ Aires acondicionados cerrados</div><div class="toggle-sub">Obligatorio</div></div>
      <div class="switch"><input type="checkbox" id="swAires"><div class="slider"></div></div>
    </label>
    <label class="toggle-row" for="swBasura">
      <div><div class="toggle-label">🗑️ Basura recogida</div><div class="toggle-sub">Obligatorio</div></div>
      <div class="switch"><input type="checkbox" id="swBasura"><div class="slider"></div></div>
    </label>
  </div>

  <!-- 2. FOTO OBLIGATORIA -->
  <div class="card">
    <div class="card-title">
      📷 Foto Cocina
      <span class="photo-required-badge">⚠ Obligatoria</span>
    </div>
    <div class="photo-wrap">
      <div class="photo-slot empty" id="photoSlot">
        <span class="ps-num">1</span>
        <div class="ps-btns">
          <button class="ps-btn" onclick="event.stopPropagation();openCamera('main')" title="Hacer foto">📷</button>
          <button class="ps-btn" onclick="event.stopPropagation();openGallery('main')" title="Subir archivo">📂</button>
        </div>
        <img id="photoPreview" alt="Foto Cocina" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
        <button class="pt-del" id="photoRemove" onclick="removePhoto(event,'main')" style="display:none">✕</button>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this,'main')">
      <input type="file" id="fileInput" accept="image/*" onchange="handlePhoto(this,'main')">
      <p style="font-size:11px;color:var(--gray-4);margin-top:10px">📌 Foto con la puerta del cubo de basura abierta</p>
    </div>
  </div>

  <!-- 3. TAREA COMPLETADA -->
  <div class="card" id="cardDone" style="border:2px solid var(--gray-2);transition:border-color .3s">
    <label class="toggle-row" for="swDone" style="padding:16px">
      <div>
        <div class="toggle-label" style="font-size:15px;font-weight:600">✅ Tarea completada</div>
        <div class="toggle-sub" id="doneHint">Sube la foto para marcar automáticamente</div>
      </div>
      <div class="switch"><input type="checkbox" id="swDone" onchange="onSwDoneChange()"><div class="slider"></div></div>
    </label>
  </div>

  <!-- 4. INCIDENCIAS (desplegable) -->
  <div class="card">
    <div class="inc-header" id="incHeader" onclick="toggleIncidencias()">
      <div class="inc-label-wrap">
        <span style="font-size:20px">⚠️</span>
        <div>
          <div class="inc-label">Incidencias <span class="inc-badge" id="incBadge" style="display:none">ACTIVA</span></div>
          <div class="inc-sub">Marcar solo si hay algo roto o hay alguna incidencia</div>
        </div>
      </div>
      <span class="inc-arrow">▾</span>
    </div>
    <div class="inc-body" id="incBody">
      <div>
        <label class="comments-label" for="txtIncidencia">📝 Descripción</label>
        <textarea id="txtIncidencia" placeholder="Describir qué está roto o cuál es la incidencia..." style="height:90px"></textarea>
      </div>
      <div>
        <div class="comments-label" style="margin-bottom:10px">📷 Fotos de la incidencia</div>
        <div class="inc-photos">
          <div class="inc-photo-slot empty" id="incSlot3" onclick="openCamera('inc3')">
            <span class="ps-num">1</span><span style="font-size:20px">📷</span>
            <img id="incPreview3" alt="">
            <button class="pt-del" id="incRemove3" onclick="removePhoto(event,'inc3')" style="display:none">✕</button>
          </div>
          <div class="inc-photo-slot empty" id="incSlot4" onclick="openCamera('inc4')">
            <span class="ps-num">2</span><span style="font-size:20px">📷</span>
            <img id="incPreview4" alt="">
            <button class="pt-del" id="incRemove4" onclick="removePhoto(event,'inc4')" style="display:none">✕</button>
          </div>
          <div class="inc-photo-slot empty" id="incSlot5" onclick="openCamera('inc5')">
            <span class="ps-num">3</span><span style="font-size:20px">📷</span>
            <img id="incPreview5" alt="">
            <button class="pt-del" id="incRemove5" onclick="removePhoto(event,'inc5')" style="display:none">✕</button>
          </div>
        </div>
        <input type="file" id="cameraInc3" accept="image/*" capture="environment" onchange="handlePhoto(this,'inc3')">
        <input type="file" id="fileInc3"   accept="image/*" onchange="handlePhoto(this,'inc3')">
        <input type="file" id="cameraInc4" accept="image/*" capture="environment" onchange="handlePhoto(this,'inc4')">
        <input type="file" id="fileInc4"   accept="image/*" onchange="handlePhoto(this,'inc4')">
        <input type="file" id="cameraInc5" accept="image/*" capture="environment" onchange="handlePhoto(this,'inc5')">
        <input type="file" id="fileInc5"   accept="image/*" onchange="handlePhoto(this,'inc5')">
      </div>
    </div>
  </div>

  <!-- 5. NOTAS INTERNAS -->
  <div class="card">
    <div class="card-title">📝 Notas Internas</div>
    <div class="comments-wrap">
      <textarea id="txtNotas" placeholder="Notas internas del equipo. No se envían al cliente ni al propietario." style="height:80px"></textarea>
    </div>
  </div>

  <!-- BOTONES -->
  <div class="save-wrap">
    <button class="btn-todo-ok" id="btnTodoOk" onclick="guardarTodoOk()">
      <div class="spinner" id="spinnerTodoOk"></div>
      <div>
        <span>✅ Todo OK — Guardar</span>
        <span class="save-label-sub">Marca ventanas, aires y basura como ✓</span>
      </div>
    </button>
    <button class="btn-save" id="btnSave" onclick="guardar()">
      <div class="spinner" id="saveSpinner"></div>
      <span id="saveLabel">💾 Guardar</span>
    </button>
  </div>
</main>

<script>
const WORKER='https://caspio-proxy.jordi-89b.workers.dev';
const params=new URLSearchParams(location.search);
const idReserva=params.get('Idreserva')||params.get('idreserva')||'';
const taskType=params.get('Tasktype_booking')||'10';
const code=params.get('code')||'';
const TASK_CONFIG={'10':{badge:'🧹 Limpieza'},'20':{badge:'📦 WelcomePack'},'30':{badge:'🔒 Cierre'}};
const cfg=TASK_CONFIG[taskType]||TASK_CONFIG['10'];

/* ── Estado fotos ── */
const photos={main:{file:null,base64:null},inc3:{file:null,base64:null},inc4:{file:null,base64:null},inc5:{file:null,base64:null}};

const SLOT_MAP={
  main:{cam:'cameraInput',file:'fileInput',  prev:'photoPreview',slot:'photoSlot',rem:'photoRemove'},
  inc3:{cam:'cameraInc3', file:'fileInc3',   prev:'incPreview3', slot:'incSlot3', rem:'incRemove3'},
  inc4:{cam:'cameraInc4', file:'fileInc4',   prev:'incPreview4', slot:'incSlot4', rem:'incRemove4'},
  inc5:{cam:'cameraInc5', file:'fileInc5',   prev:'incPreview5', slot:'incSlot5', rem:'incRemove5'},
};

/* ── sessionStorage iOS ── */
const STATE_KEY='lim_'+idReserva+'_'+taskType;
const MAX_AGE=5*60*1000;

function saveState(){
  const elV=g('swVentanas');if(!elV)return;
  try{sessionStorage.setItem(STATE_KEY,JSON.stringify({ts:Date.now(),v:elV.checked,a:sw('swAires'),b:sw('swBasura'),d:sw('swDone'),io:incOpen,inc:gv('txtIncidencia'),n:gv('txtNotas')}));}catch(e){}
}
function restoreStateIfRecent(){
  try{const raw=sessionStorage.getItem(STATE_KEY);if(!raw)return;const s=JSON.parse(raw);if(Date.now()-s.ts>MAX_AGE)return;
  $sw('swVentanas',s.v);$sw('swAires',s.a);$sw('swBasura',s.b);$sw('swDone',s.d);
  const ti=g('txtIncidencia');if(ti)ti.value=s.inc||'';const tn=g('txtNotas');if(tn)tn.value=s.n||'';
  if(s.io&&!incOpen)openInc();onSwDoneChange();}catch(e){}
}
function clearState(){try{sessionStorage.removeItem(STATE_KEY);}catch(e){}}

document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')restoreStateIfRecent();});
window.addEventListener('pageshow',e=>{if(e.persisted)restoreStateIfRecent();});

function initAutoSave(){
  ['swVentanas','swAires','swBasura','swDone'].forEach(id=>{const el=g(id);if(el)el.addEventListener('change',saveState);});
  ['txtIncidencia','txtNotas'].forEach(id=>{const el=g(id);if(el)el.addEventListener('input',saveState);});
}

/* ── Helpers ── */
function g(id){return document.getElementById(id);}
function gv(id){return(g(id)||{}).value||'';}
function sw(id){return !!(g(id)||{}).checked;}
function $sw(id,val){const el=g(id);if(!el)return;if(typeof val==='boolean')el.checked=val;else el.checked=val===true||val===1||val===-1||['yes','sí','true','1'].includes(String(val).toLowerCase());}
function hide(id){const e=g(id);if(e)e.style.display='none';}
function show(id){const e=g(id);if(e)e.style.display='';}

let toastTimer;
function toast(msg,type){const el=g('toast');el.textContent=msg;el.className='toast show '+(type||'success');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='toast',3000);}

/* ── Tarea completada ── */
function onSwDoneChange(){
  const done=sw('swDone'),card=g('cardDone'),hint=g('doneHint');
  if(done){if(card)card.style.borderColor='var(--green)';if(hint){hint.textContent='Tarea marcada como completada';hint.style.color='var(--green)';}}
  else{if(card)card.style.borderColor='var(--red-light)';if(hint){hint.textContent='⚠️ Pendiente — aparecerá en el listado';hint.style.color='var(--red)';}}
}
function markDone(){if(!sw('swDone')){g('swDone').checked=true;onSwDoneChange();}}

/* ── Incidencias desplegable ── */
let incOpen=false;
function openInc(){incOpen=true;const h=g('incHeader'),b=g('incBody'),bk=g('incBadge');if(h)h.classList.add('is-open');if(b)b.classList.add('open');if(bk)bk.style.display='';}
function closeInc(){incOpen=false;const h=g('incHeader'),b=g('incBody'),bk=g('incBadge');if(h)h.classList.remove('is-open');if(b)b.classList.remove('open');if(bk)bk.style.display='none';}
function toggleIncidencias(){if(incOpen)closeInc();else openInc();saveState();}

/* ── Fotos ── */
function openCamera(slot){saveState();const m=SLOT_MAP[slot];if(!m)return;const el=g(m.cam);if(el){el.value='';el.click();}}
function openGallery(slot){saveState();const m=SLOT_MAP[slot];if(!m)return;const el=g(m.file);if(el){el.value='';el.click();}}

function handlePhoto(input,slot){
  const file=input.files[0];if(!file)return;photos[slot]={file,base64:null};
  const reader=new FileReader();
  reader.onload=e=>{photos[slot].base64=e.target.result;showPhotoPreview(slot,e.target.result);if(slot==='main'){markDone();saveState();}};
  reader.readAsDataURL(file);
}

function showPhotoPreview(slot,src){
  const m=SLOT_MAP[slot];if(!m)return;
  const img=g(m.prev),rem=g(m.rem),slotEl=g(m.slot);
  if(img){img.src=src;img.style.display='block';}
  if(rem)rem.style.display='block';
  if(slotEl){slotEl.classList.remove('empty');slotEl.classList.add('has-img');slotEl.querySelectorAll('span').forEach(el=>el.style.display='none');}
}

function removePhoto(e,slot){
  e.stopPropagation();photos[slot]={file:null,base64:null};
  const m=SLOT_MAP[slot];if(!m)return;
  const img=g(m.prev),rem=g(m.rem),slotEl=g(m.slot),cam=g(m.cam),fil=g(m.file);
  if(img){img.src='';img.style.display='none';}
  if(rem)rem.style.display='none';
  if(slotEl){slotEl.classList.remove('has-img');slotEl.classList.add('empty');slotEl.querySelectorAll('span').forEach(el=>el.style.display='');}
  if(cam)cam.value='';if(fil)fil.value='';
  saveState();
}

/* ── Validación foto principal ── */
function fotoPresente(){return photos.main.base64!==null||(g('photoPreview')&&g('photoPreview').style.display==='block');}
function fotoError(){
  const area=g('photoSlot');area.classList.add('slot-error');area.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>area.classList.remove('slot-error'),1500);toast('⚠️ La foto es obligatoria','error');
}

/* ── Todo OK ── */
async function guardarTodoOk(){
  if(!fotoPresente()){fotoError();return;}
  g('swVentanas').checked=true;g('swAires').checked=true;g('swBasura').checked=true;g('swDone').checked=true;
  onSwDoneChange();saveState();
  const btnOk=g('btnTodoOk'),sp=g('spinnerTodoOk');
  btnOk.disabled=true;sp.style.display='block';
  await guardar(true);
  btnOk.disabled=false;sp.style.display='none';
}

/* ── Guardar ── */
async function guardar(fromOk){
  if(!fotoPresente()){fotoError();return;}
  const btn=g('btnSave'),lbl=g('saveLabel'),sp=g('saveSpinner'),btnOk=g('btnTodoOk');
  btn.disabled=true;if(btnOk)btnOk.disabled=true;lbl.textContent='Guardando...';sp.style.display='block';
  try{
    const data={Idreserva:idReserva,Tasktype_booking:taskType,Tarea_terminada:sw('swDone'),
      Limpieza_filtrolavaplatos:sw('swVentanas'),
      Limpieza_salyabrillan_lavaplatos:sw('swAires')?'Y':'',
      Limpieza_cajon_lavadora_limpio:sw('swBasura')?'Y':'',
      Incidencias:incOpen,Solutiondescription:gv('txtIncidencia').trim(),
      Internal_notes:gv('txtNotas').trim(),
      Taskname:cfg.badge||'Limpieza'};

    /* Subir fotos */
    if(photos.main.file&&photos.main.base64){try{const up=await uploadPhoto(photos.main.file,idReserva,taskType,'1');if(up&&up.url)data['Picture_cloudfare1']=up.url;}catch(e){console.warn(e);}}
    for(const[slot,suf]of[['inc3','3'],['inc4','4'],['inc5','5']]){
      if(photos[slot].file&&photos[slot].base64){try{const up=await uploadPhoto(photos[slot].file,idReserva,taskType,suf);if(up&&up.url)data['Picture_cloudfare'+suf]=up.url;}catch(e){console.warn(e);}}
    }

    const wh=`Idreserva='${idReserva}' AND Tasktype_booking=${parseInt(taskType)}`;
    const chk=await(await fetch(Auth.url(`${WORKER}?action=data&table=TaTasks&where=${encodeURIComponent(wh)}&limit=1`))).json();
    const exists=(chk.Result||chk.result||[]).length>0;
    const qs=exists?`action=save&table=TaTasks&where=${encodeURIComponent(wh)}&method=PUT`:`action=save&table=TaTasks&method=POST`;
    const res=await fetch(Auth.url(`${WORKER}?${qs}`),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(!res.ok)throw new Error(await res.text());
    clearState();
    toast('✓ Guardado correctamente','success');
    btn.disabled=false;lbl.textContent='✓ GUARDADO';btn.style.background='var(--green)';
    setTimeout(()=>{try{window.close();}catch(e){history.back();}},800);
  }catch(e){
    console.error(e);toast('Error: '+e.message,'error');
    btn.disabled=false;lbl.textContent='💾 Guardar';sp.style.display='none';if(btnOk)btnOk.disabled=false;
  }
}

async function uploadPhoto(file,idRes,tType,suffix){
  const fd=new FormData();fd.append('file',file,file.name||'foto_'+suffix+'.jpg');fd.append('idreserva',idRes);fd.append('tasktype',tType);fd.append('suffix',suffix);fd.append('year',new Date().getFullYear());
  const res=await fetch(Auth.url(`${WORKER}?action=upload`),{method:'POST',body:fd});const data=await res.json();
  if(!res.ok||!data.success)throw new Error(data.error||'Upload failed');return data;
}

async function loadBooking(){
  const where=code?`TaBookings2021_FS_confirmation_code='${code}'`:`TaBookings2021_BookingID='${idReserva}'`;
  const res=await fetch(Auth.url(`${WORKER}?action=view&view=Vi_villas_and_bookings2021&where=${encodeURIComponent(where)}&limit=1`));
  const json=await res.json();const r=(json.Result||json.result||[])[0];if(!r)return;
  g('hVilla').textContent=r['TaBookings2021_Property_Title']||`Reserva ${idReserva}`;
  g('hRes').textContent=`Reserva: ${r['TaBookings2021_FS_confirmation_code']||idReserva}`;
}

async function loadTask(){
  const where=`Idreserva='${idReserva}' AND Tasktype_booking=${parseInt(taskType)}`;
  const res=await fetch(Auth.url(`${WORKER}?action=data&table=TaTasks&where=${encodeURIComponent(where)}&limit=1`));
  const json=await res.json();const task=(json.Result||json.result||[])[0];window.__taskDebug=task;if(!task)return;
  $sw('swDone',     task['Tarea_terminada']);
  $sw('swVentanas', task['Limpieza_filtrolavaplatos']);
  $sw('swAires',    task['Limpieza_salyabrillan_lavaplatos']=== 'Y'||task['Limpieza_salyabrillan_lavaplatos']===true);
  $sw('swBasura',   task['Limpieza_cajon_lavadora_limpio']=== 'Y'||task['Limpieza_cajon_lavadora_limpio']===true);
  onSwDoneChange();
  const ti=g('txtIncidencia');if(ti&&task['Solutiondescription'])ti.value=task['Solutiondescription'];
  const tn=g('txtNotas');if(tn&&task['Internal_notes'])tn.value=task['Internal_notes'];
  const incVal=task['Incidencias'];
  if(incVal===true||incVal===1||['yes','sí','true'].includes(String(incVal).toLowerCase()))if(!incOpen)openInc();
  const fm=task['Picture_cloudfare1']||task['Picture_in_cleaning1'];
  if(fm&&typeof fm==='string'&&fm.startsWith('http'))showPhotoPreview('main',fm);
  [['Picture_cloudfare3','inc3'],['Picture_cloudfare4','inc4'],['Picture_cloudfare5','inc5']].forEach(([f,s])=>{
    const u=task[f];if(u&&typeof u==='string'&&u.startsWith('http'))showPhotoPreview(s,u);
  });
}

document.addEventListener('DOMContentLoaded',async()=>{
  g('hTaskBadge').textContent=cfg.badge;
  if(!idReserva){showError('Faltan parámetros en la URL.');return;}
  try{
    await Promise.allSettled([loadBooking(),loadTask()]);
    restoreStateIfRecent();initAutoSave();
    hide('loadOverlay');show('mainContent');
  }catch(e){showError('Error al cargar: '+e.message);}
});

function showDebug(){const t=JSON.stringify(window.__taskDebug||{},null,2);const w=window.open('','_blank','width=600,height=500');w.document.write('<pre style="font-family:monospace;font-size:12px;padding:16px">'+t+'</pre>');}
function showError(msg){hide('loadOverlay');g('mainContent').innerHTML=`<div class="error-state"><div class="emoji">⚠️</div><h3>Error</h3><p>${msg}</p></div>`;show('mainContent');}
</script>
