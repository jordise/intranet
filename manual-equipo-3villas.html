:root{
  --red:#e2231a; --red-d:#b91b13; --ink:#1a1d22; --ink-2:#3a3f47;
  --muted:#6b7280; --line:#e6e8ec; --line-2:#d4d7dd;
  --bg:#f6f7f9; --panel:#ffffff; --panel-2:#fbfbfc;
  --accent:#0f62fe; --accent-l:#e8f0ff; --warn:#b45309; --warn-l:#fff7ed;
  --ok:#15803d; --ok-l:#ecfdf3; --sens:#7c2d12; --sens-l:#fdf2ec;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.06);
  --shadow-md:0 4px 16px rgba(16,24,40,.10);
  --shadow-lg:0 12px 40px rgba(16,24,40,.16);
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --side-w:340px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── TOP-NAV (estilo editar-tarea.html) ── */
.top-nav{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#fff;
  border-bottom:1.5px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:300}
.nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-logo img{height:26px;object-fit:contain}
.nav-center{flex:1;min-width:0;padding:0 4px}
.h-title{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.h-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.nav-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mode-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:20px;border:1.5px solid var(--line-2);background:#fff;color:var(--ink-2);
  cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.editing{background:var(--ok);border-color:var(--ok);color:#fff}
.mode-btn.editing:hover{background:#127a36}
.nav-menu-btn{display:flex;align-items:center;justify-content:center;background:var(--red);border:none;
  color:#fff;width:32px;height:32px;border-radius:8px;text-decoration:none;font-size:16px;cursor:pointer;
  transition:background .15s;flex-shrink:0}
.nav-menu-btn:hover{background:var(--red-d)}
/* ── BARRA DE BÚSQUEDA (bajo la cabecera) ── */
.searchbar{position:sticky;top:51px;z-index:39;background:var(--bg);padding:12px 18px;border-bottom:1px solid var(--line)}
.search-wrap{position:relative;max-width:680px;margin:0 auto}
.search-wrap input{width:100%;height:42px;border:1px solid var(--line-2);border-radius:999px;
  padding:0 40px 0 42px;font-size:14px;font-family:inherit;background:#fff;transition:.15s}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-l)}
.search-wrap .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-wrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;
  color:var(--muted);cursor:pointer;font-size:18px;padding:4px;line-height:1;display:none}
.search-wrap .clr.show{display:block}
.btn-burger{display:none;border:1px solid var(--line-2);background:#fff;border-radius:var(--r-sm);
  width:38px;height:38px;font-size:18px;cursor:pointer}

/* ── LAYOUT ── */
.layout{display:flex;align-items:flex-start;max-width:1340px;margin:0 auto}
.side{position:sticky;top:118px;width:var(--side-w);height:calc(100vh - 118px);overflow-y:auto;
  padding:16px 10px 40px;border-right:1px solid var(--line);background:var(--panel)}
.side h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
  margin:6px 12px 10px;font-weight:700}
.main{flex:1;min-width:0;padding:26px 32px 80px}

/* ── ÁRBOL NAV ── */
.tree{list-style:none;margin:0;padding:0}
.tree .node{margin:1px 0}
.tree .row{display:flex;align-items:center;gap:4px;border-radius:var(--r-sm);cursor:pointer;
  padding:5px 8px;color:var(--ink-2);font-size:13.5px;transition:.1s}
.tree .row:hover{background:var(--panel-2)}
.tree .row.active{background:var(--accent-l);color:var(--accent);font-weight:600}
.tree .row .tw{width:16px;height:16px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:10px;transition:transform .15s}
.tree .row .tw.empty{visibility:hidden}
.tree .node.collapsed>.kids{display:none}
.tree .node.collapsed>.row .tw{transform:rotate(-90deg)}
.tree .row .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree .row .badge{font-size:9px;flex:none}
.tree .kids{list-style:none;margin:0;padding:0 0 0 14px;border-left:1px solid var(--line)}
.tree .lvl0>.row{font-weight:700;color:var(--ink);font-size:14px;margin-top:6px}

/* ── CONTENIDO ── */
.crumbs{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.crumbs span.sep{opacity:.5}
.doc{max-width:820px}
.doc h1{font-size:27px;font-weight:800;letter-spacing:-.5px;margin:0 0 4px}
.doc .doc-sub{font-size:15px;color:var(--muted);margin:0 0 18px}
.doc .meta{font-size:11.5px;color:var(--muted);margin-bottom:22px;display:flex;gap:14px;flex-wrap:wrap}
.section-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:0;margin:0 0 16px;box-shadow:var(--shadow-sm);overflow:hidden}
.sc-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;border-bottom:1px solid transparent}
.sc-head:hover{background:var(--panel-2)}
.section-card.open .sc-head{border-bottom-color:var(--line)}
.sc-head .tw{color:var(--muted);font-size:12px;transition:transform .15s;flex:none}
.section-card.collapsed .sc-head .tw{transform:rotate(-90deg)}
.section-card.collapsed .sc-body{display:none}
.sc-head .h{flex:1;font-weight:700;font-size:16px;color:var(--ink)}
.sc-head .h small{display:block;font-weight:500;font-size:12.5px;color:var(--muted);margin-top:2px}
.sc-body{padding:6px 18px 16px}

.item{padding:12px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.item .it-head{display:flex;align-items:flex-start;gap:8px}
.item .it-title{font-weight:600;font-size:14.5px;color:var(--ink);flex:1}
.item .it-body{font-size:14px;color:var(--ink-2);margin-top:4px}
.item .it-body p{margin:0 0 6px}
.item.lvl2{margin-left:14px;padding-left:14px;border-left:2px solid var(--line)}
.item.lvl3{margin-left:28px;padding-left:14px;border-left:2px solid var(--line-2)}
.item .it-actions{display:flex;gap:4px;opacity:0;transition:.12s;flex:none}
.item:hover .it-actions{opacity:1}
.iconbtn{border:1px solid var(--line-2);background:#fff;border-radius:var(--r-sm);cursor:pointer;
  width:28px;height:28px;font-size:13px;color:var(--ink-2);display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--panel-2);border-color:var(--accent);color:var(--accent)}

/* nodo sensible */
.sensitive{background:var(--sens-l);border:1px dashed var(--sens);border-radius:var(--r-md);padding:10px 12px;margin-top:6px}
.sensitive .reveal{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--sens);font-weight:600;cursor:pointer}
.sensitive.shown .reveal{margin-bottom:8px}
.sensitive .secret{display:none;font-size:14px;color:var(--ink-2)}
.sensitive.shown .secret{display:block}
.sens-pill{font-size:10px;font-weight:700;color:var(--sens);background:#fff;border:1px solid var(--sens);
  border-radius:999px;padding:1px 7px}

mark{background:#fde68a;color:inherit;border-radius:2px;padding:0 1px}

/* editor inline */
.editor{margin-top:8px}
.editor input.t,.editor input.s,.editor textarea{width:100%;font-family:inherit;font-size:14px;
  border:1px solid var(--line-2);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:6px}
.editor input.t{font-weight:600}
.editor textarea{min-height:90px;resize:vertical;line-height:1.5}
.editor:focus-within input,.editor:focus-within textarea{}
.editor .ed-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}
.editor .ed-bar label{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
.btn{border:none;border-radius:var(--r-sm);padding:8px 14px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#0a4fd6}
.btn-ghost{background:#fff;border:1px solid var(--line-2);color:var(--ink-2)}
.btn-ghost:hover{background:var(--panel-2)}
.btn:disabled{opacity:.55;cursor:default}
.add-row{margin-top:10px}
.add-btn{border:1px dashed var(--line-2);background:var(--panel-2);color:var(--muted);
  border-radius:var(--r-sm);padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* gestor de enlaces en el editor */
.links-mgr{margin:8px 0 4px;border:1px solid var(--line);border-radius:var(--r-md);padding:10px;background:var(--panel-2)}
.links-mgr .lm-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.lm-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.lm-row input{flex:1;min-width:0;font-family:inherit;font-size:13px;border:1px solid var(--line-2);border-radius:var(--r-sm);padding:6px 8px}
.lm-row input.lm-text{flex:0 0 38%}
.lm-row .lm-del{flex:none;border:1px solid var(--line-2);background:#fff;border-radius:var(--r-sm);width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:14px}
.lm-row .lm-del:hover{border-color:var(--red);color:var(--red)}
.lm-add{border:1px dashed var(--line-2);background:#fff;color:var(--accent);border-radius:var(--r-sm);padding:6px 10px;font-size:12.5px;font-weight:600;cursor:pointer}
.lm-add:hover{background:var(--accent-l)}

/* search results panel */
.results{max-width:820px}
.res-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);
  padding:12px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow-sm)}
.res-item:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
.res-item .rt{font-weight:600;font-size:14.5px;margin-bottom:2px}
.res-item .rp{font-size:11.5px;color:var(--muted);margin-bottom:4px}
.res-item .rc{font-size:13px;color:var(--ink-2)}
.res-count{font-size:13px;color:var(--muted);margin-bottom:14px}

/* toast */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:90;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red-d)}
#toast.ok{background:var(--ok)}

/* spinner */
#loader{position:fixed;inset:0;background:rgba(246,247,249,.92);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:100}
#loader img{width:54px;height:54px;animation:beat 1s ease-in-out infinite}
#loader .lt{font-size:13px;color:var(--muted);font-weight:500}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.hidden{display:none!important}

/* empty / import */
.empty-state{max-width:560px;margin:40px auto;text-align:center;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--r-lg);padding:40px 32px;box-shadow:var(--shadow-sm)}
.empty-state h2{margin:0 0 8px;font-size:20px}
.empty-state p{color:var(--muted);margin:0 0 20px}

/* scrollbar */
.side::-webkit-scrollbar{width:8px}
.side::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}

/* responsive */
.scrim{display:none}
@media(max-width:860px){
  .btn-burger{display:block}
  .brand .sub{display:none}
  .side{position:fixed;left:0;top:118px;z-index:50;box-shadow:var(--shadow-lg);transform:translateX(-100%);transition:transform .22s}
  .side.open{transform:translateX(0)}
  .scrim{display:block;position:fixed;inset:118px 0 0;background:rgba(0,0,0,.35);z-index:45;opacity:0;pointer-events:none;transition:.2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .main{padding:18px 16px 70px}
  .doc h1{font-size:22px}
}
</style>
</head>

<script>
/* ════════════════════════════════════════════════════════════
   Manual Principal 3Villas — lógica
   Tabla Caspio: TaManual (vía Worker caspio-proxy)
   Campos: TaManualID(PK) ParentId Orden Nivel Titulo Subtitulo
           Contenido Sensible Modificado Creado ActualizadoPor
   ════════════════════════════════════════════════════════════ */
(function(){
'use strict';
var WORKER='https://caspio-proxy.jordi-89b.workers.dev';

/* ── PERMISOS ──
   CAN_EDIT  = el usuario TIENE permiso para editar (admin/manager)
   EDIT_MODE = está ahora mismo en modo edición (por defecto NO; se activa
               con el botón "Editar" de la cabecera, solo si CAN_EDIT).      */
var CAN_EDIT=false, EDIT_MODE=false, USER_ROLE='', USER_NAME='';
try{
  USER_ROLE=(typeof Auth!=='undefined'&&Auth.role)?Auth.role():'';
  USER_NAME=(typeof Auth!=='undefined'&&Auth.name)?Auth.name():'';
}catch(e){}
CAN_EDIT=(USER_ROLE==='admin'||USER_ROLE==='manager');

/* ── ESTADO ── */
var NODES=[];          /* array plano de registros de Caspio */
var BY_ID={};          /* id -> nodo */
var CHILDREN={};       /* parentId -> [nodos ordenados] */
var ROOTS=[];          /* nodos nivel 0 */
var activeId=null;
var collapsed={};      /* id -> true si plegado en árbol */

/* ── HELPERS DOM ── */
function $(id){return document.getElementById(id);}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function showLoader(b){$('loader').classList.toggle('hidden',!b);}
var _tt;
function toast(msg,kind){var t=$('toast');t.textContent=msg;t.className=(kind||'')+' show';clearTimeout(_tt);_tt=setTimeout(function(){t.className=t.className.replace('show','');},2600);}

/* ── API ── */
function authUrl(u){return (typeof Auth!=='undefined'&&Auth.url)?Auth.url(u):u;}
function apiLoad(){
  return fetch(authUrl(WORKER+'?action=data&table=TaManual&limit=1000'))
    .then(function(r){return r.json();})
    .then(function(j){return j.Result||j.result||[];});
}
function apiInsert(rec){
  return fetch(authUrl(WORKER+'?action=save&table=TaManual'),
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)})
    .then(function(r){return r.json();});
}
function apiUpdate(id,rec){
  /* El action=update del Worker solo soporta TaVillas/TaUsers/TaTasks.
     Para TaManual se usa action=save con method=PUT y where sobre la PK. */
  var where='TaManualID='+encodeURIComponent(id);
  return fetch(authUrl(WORKER+'?action=save&table=TaManual&method=PUT&where='+where),
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)})
    .then(function(r){return r.json();});
}
function nowStamp(){
  var d=new Date(),p=function(n){return(n<10?'0':'')+n;};
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

/* ── ÁRBOL EN MEMORIA ── */
function rebuildIndex(){
  BY_ID={};CHILDREN={};ROOTS=[];
  NODES.forEach(function(n){
    n._id=n.TaManualID; BY_ID[n._id]=n;
    var p=parseInt(n.ParentId||0,10)||0;
    (CHILDREN[p]=CHILDREN[p]||[]).push(n);
  });
  Object.keys(CHILDREN).forEach(function(k){
    CHILDREN[k].sort(function(a,b){return (parseInt(a.Orden||0,10))-(parseInt(b.Orden||0,10));});
  });
  ROOTS=CHILDREN[0]||[];
}
function childrenOf(id){return CHILDREN[id]||[];}
function pathOf(id){
  var arr=[],n=BY_ID[id],guard=0;
  while(n&&guard++<20){arr.unshift(n);var p=parseInt(n.ParentId||0,10)||0;n=p?BY_ID[p]:null;}
  return arr;
}
/* sección raíz (nivel 0) que contiene un nodo */
function rootOf(id){var p=pathOf(id);return p.length?p[0]:null;}

/* ════════ RENDER: ÁRBOL LATERAL ════════ */
function renderTree(){
  var ul=$('tree');ul.innerHTML='';
  ROOTS.forEach(function(n){ul.appendChild(treeNode(n,0));});
}
function treeNode(n,lvl){
  var kids=childrenOf(n._id);
  var li=el('li','node lvl'+lvl);li.dataset.id=n._id;
  if(collapsed[n._id])li.classList.add('collapsed');
  var row=el('div','row');row.dataset.id=n._id;
  var tw=el('span','tw'+(kids.length?'':' empty'),kids.length?'▾':'');
  if(kids.length){tw.onclick=function(ev){ev.stopPropagation();collapsed[n._id]=!collapsed[n._id];li.classList.toggle('collapsed');};}
  var lbl=el('span','lbl',esc(n.Titulo||'(sin título)'));
  row.appendChild(tw);row.appendChild(lbl);
  if(isTruthy(n.Sensible))row.appendChild(el('span','badge','🔒'));
  if(n._id===activeId)row.classList.add('active');
  row.onclick=function(){selectRoot(rootOf(n._id)._id, n._id);closeSideMobile();};
  li.appendChild(row);
  if(kids.length){
    var k=el('ul','kids');
    kids.forEach(function(c){k.appendChild(treeNode(c,lvl+1));});
    li.appendChild(k);
  }
  return li;
}
function markActiveTree(){
  var rows=$('tree').querySelectorAll('.row');
  rows.forEach(function(r){r.classList.toggle('active', r.dataset.id==String(activeId));});
}

function isTruthy(v){return v===true||v===-1||v==='-1'||v==='true'||v==='Yes'||v==='yes'||v==='1'||v===1;}

/* ════════ RENDER: CONTENIDO DE UNA SECCIÓN ════════ */
/* Muestra la sección raíz completa; activeId resalta/scroll a un nodo concreto */
function selectRoot(rootId, focusId){
  activeId=focusId||rootId;
  $('search').value='';$('searchClr').classList.remove('show');
  var root=BY_ID[rootId];if(!root)return;
  var c=$('content');c.innerHTML='';
  c.appendChild(buildCrumbs(rootId));
  var doc=el('div','doc');
  var h=el('h1',null,esc(root.Titulo));doc.appendChild(h);
  if(root.Subtitulo)doc.appendChild(el('p','doc-sub',esc(root.Subtitulo)));
  var meta=el('div','meta');
  if(root.Modificado)meta.appendChild(el('span',null,'Modificado: '+esc(String(root.Modificado).replace('T',' ').slice(0,16))));
  if(root.ActualizadoPor)meta.appendChild(el('span',null,'Por: '+esc(root.ActualizadoPor)));
  doc.appendChild(meta);
  c.appendChild(doc);
  /* hijos directos = tarjetas de apartado */
  childrenOf(rootId).forEach(function(child){
    doc.appendChild(buildSectionCard(child));
  });
  if(EDIT_MODE)doc.appendChild(buildAddRow(rootId,1,'+ Añadir apartado'));
  markActiveTree();
  if(focusId&&focusId!==rootId){
    setTimeout(function(){var t=document.querySelector('[data-card="'+focusId+'"],[data-item="'+focusId+'"]');
      if(t){t.scrollIntoView({behavior:'smooth',block:'center'});t.style.transition='background .8s';t.style.background='var(--accent-l)';
      setTimeout(function(){t.style.background='';},900);}},60);
  }else{window.scrollTo(0,0);}
}
function buildCrumbs(id){
  var c=el('div','crumbs');
  c.appendChild(el('span',null,'Manual'));
  c.appendChild(el('span','sep','/'));
  c.appendChild(el('span',null,esc(BY_ID[id].Titulo)));
  return c;
}

/* tarjeta de apartado (nivel 1) con sus sub-items */
function buildSectionCard(node){
  var card=el('div','section-card open');card.dataset.card=node._id;
  var head=el('div','sc-head');
  head.appendChild(el('span','tw','▾'));
  var hbox=el('div','h');hbox.innerHTML=esc(node.Titulo)+(node.Subtitulo?'<small>'+esc(node.Subtitulo)+'</small>':'');
  head.appendChild(hbox);
  if(EDIT_MODE){
    var act=el('div','it-actions');act.style.opacity='1';
    act.appendChild(iconBtn('✏️','Editar',function(ev){ev.stopPropagation();openEditor(node,hbox.parentNode.parentNode,'card');}));
    head.appendChild(act);
  }
  head.onclick=function(){card.classList.toggle('collapsed');};
  card.appendChild(head);
  var body=el('div','sc-body');
  /* contenido propio del apartado */
  if(node.Contenido)body.appendChild(renderBody(node));
  else if(isTruthy(node.Sensible))body.appendChild(renderBody(node));
  /* sub-items */
  childrenOf(node._id).forEach(function(sub){body.appendChild(buildItem(sub,2));});
  if(EDIT_MODE)body.appendChild(buildAddRow(node._id,2,'+ Añadir sub-apartado'));
  card.appendChild(body);
  return card;
}

/* item de nivel 2/3 */
function buildItem(node,lvl){
  var it=el('div','item lvl'+lvl);it.dataset.item=node._id;
  var head=el('div','it-head');
  var ti=el('div','it-title',esc(node.Titulo)+(isTruthy(node.Sensible)?' <span class="sens-pill">🔒 sensible</span>':''));
  head.appendChild(ti);
  if(EDIT_MODE){
    var act=el('div','it-actions');
    act.appendChild(iconBtn('✏️','Editar',function(){openEditor(node,it,'item');}));
    head.appendChild(act);
  }
  it.appendChild(head);
  if(node.Contenido||isTruthy(node.Sensible))it.appendChild(renderBody(node));
  /* nivel 3 (sub-sub) */
  childrenOf(node._id).forEach(function(sub){it.appendChild(buildItem(sub,3));});
  if(EDIT_MODE&&lvl<3)it.appendChild(buildAddRow(node._id,lvl+1,'+ Añadir punto'));
  return it;
}

/* cuerpo (con soporte de bloque sensible) */
function renderBody(node){
  if(isTruthy(node.Sensible)){
    var box=el('div','sensitive');
    var rv=el('div','reveal','🔒 Información sensible — <u>mostrar</u>');
    rv.onclick=function(){box.classList.toggle('shown');rv.innerHTML=box.classList.contains('shown')?'🔓 Ocultar':'🔒 Información sensible — <u>mostrar</u>';};
    var sec=el('div','secret',node.Contenido||'');
    box.appendChild(rv);box.appendChild(sec);
    return box;
  }
  return el('div','it-body',node.Contenido||'');
}

function iconBtn(txt,title,fn,extra){
  var b=el('button','iconbtn'+(extra?' '+extra:''),txt);b.title=title;b.onclick=fn;return b;
}
function buildAddRow(parentId,nivel,label){
  var wrap=el('div','add-row');
  var b=el('button','add-btn',label);
  b.onclick=function(){openNewEditor(parentId,nivel,wrap);};
  wrap.appendChild(b);
  return wrap;
}

/* ════════ EDICIÓN ════════ */
/* Extrae los <a href> de un HTML como lista {text,url}; devuelve también
   el HTML "sin enlaces" para poder recomponer. */
function parseLinks(html){
  var links=[];
  var rest=String(html||'').replace(/<a\s+[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi,function(m,url,txt){
    var clean=txt.replace(/<[^>]+>/g,'').trim();
    links.push({text:clean,url:url});
    return '〔'+clean+'〕'; /* marcador legible: 〔texto〕 = enlace nº (por orden) */
  });
  return {links:links,rest:rest};
}
/* Recompone el HTML: cada marcador 〔...〕 (en orden) se sustituye por su enlace. */
function composeLinks(rest,links){
  var i=0;
  return rest.replace(/〔[\s\S]*?〕/g,function(m){
    var l=links[i++];
    if(!l||!l.url)return l?esc(l.text):'';
    return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.text)+'</a>';
  });
}
/* Construye el gestor visual de enlaces. Devuelve {wrap, getState} */
function buildLinkManager(initialLinks){
  var state=initialLinks.slice();
  var wrap=el('div','links-mgr');
  wrap.appendChild(el('div','lm-title','🔗 Enlaces'));
  var list=el('div','lm-list');
  function rowFor(idx){
    var l=state[idx];
    var row=el('div','lm-row');
    var ti=el('input','lm-text');ti.type='text';ti.placeholder='Texto del enlace';ti.value=l.text||'';
    var ur=el('input','lm-url');ur.type='url';ur.placeholder='https://…';ur.value=l.url||'';
    var del=el('button','lm-del','×');del.title='Quitar enlace';
    ti.oninput=function(){state[idx].text=ti.value;};
    ur.oninput=function(){state[idx].url=ur.value;};
    del.onclick=function(){state[idx]=null;row.remove();};
    row.appendChild(ti);row.appendChild(ur);row.appendChild(del);
    return row;
  }
  state.forEach(function(_,i){list.appendChild(rowFor(i));});
  wrap.appendChild(list);
  var add=el('button','lm-add','+ Añadir enlace');
  add.onclick=function(){state.push({text:'',url:''});list.appendChild(rowFor(state.length-1));};
  wrap.appendChild(add);
  return {wrap:wrap,getState:function(){return state.filter(Boolean);}};
}

function openEditor(node,container,kind){
  if(!CAN_EDIT)return;
  if(container.querySelector('.editor'))return;
  var parsed=parseLinks(node.Contenido||'');
  var ed=el('div','editor');
  ed.innerHTML=''
    +'<input class="t" type="text" value="'+esc(node.Titulo||'')+'" placeholder="Título">'
    +'<input class="s" type="text" value="'+esc(node.Subtitulo||'')+'" placeholder="Subtítulo (opcional)">'
    +'<textarea placeholder="Contenido (texto; admite &lt;br&gt; y &lt;strong&gt;). Los enlaces se gestionan abajo.">'+esc(parsed.rest)+'</textarea>';
  /* gestor de enlaces */
  var lm=buildLinkManager(parsed.links);
  ed.appendChild(lm.wrap);
  var bar=el('div','ed-bar');
  var lab=el('label',null,'<input type="checkbox" '+(isTruthy(node.Sensible)?'checked':'')+'> 🔒 Sensible (credenciales)');
  var save=el('button','btn btn-primary','Guardar');
  var cancel=el('button','btn btn-ghost','Cancelar');
  bar.appendChild(save);bar.appendChild(cancel);bar.appendChild(lab);
  ed.appendChild(bar);
  container.appendChild(ed);
  cancel.onclick=function(){ed.remove();};
  save.onclick=function(){
    var t=ed.querySelector('.t').value.trim();
    if(!t){toast('El título no puede estar vacío','err');return;}
    save.disabled=true;cancel.disabled=true;save.textContent='Guardando…';
    /* recomponer contenido: marcadores existentes + enlaces nuevos al final */
    var links=lm.getState();
    var restText=ed.querySelector('textarea').value;
    /* si hay más enlaces que marcadores (añadidos nuevos), se anexan al final */
    var nMarkers=(restText.match(/〔[\s\S]*?〕/g)||[]).length;
    var contenido=composeLinks(restText,links);
    if(links.length>nMarkers){
      var extra=links.slice(nMarkers).filter(function(l){return l.url;})
        .map(function(l){return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.text||l.url)+'</a>';});
      if(extra.length)contenido+=(contenido?' ':'')+extra.join(' ');
    }
    var rec={Titulo:t,Subtitulo:ed.querySelector('.s').value.trim(),
      Contenido:contenido,
      Sensible:lab.querySelector('input').checked,
      Modificado:nowStamp(),ActualizadoPor:USER_NAME||USER_ROLE||''};
    apiUpdate(node._id,rec).then(function(res){
      if(res&&(res.error||res.Message)&&!res.RecordsAffected)throw new Error(res.error||res.Message);
      Object.keys(rec).forEach(function(k){node[k]=rec[k];});
      toast('Guardado','ok');
      refreshCurrent();
    }).catch(function(e){console.error(e);toast('Error al guardar: '+e.message,'err');save.disabled=false;cancel.disabled=false;save.textContent='Guardar';});
  };
}
function openNewEditor(parentId,nivel,anchor){
  if(!CAN_EDIT)return;
  if(anchor.querySelector('.editor'))return;
  var ed=el('div','editor');
  ed.innerHTML=''
    +'<input class="t" type="text" value="" placeholder="Título del nuevo apartado">'
    +'<input class="s" type="text" value="" placeholder="Subtítulo (opcional)">'
    +'<textarea placeholder="Contenido (opcional; texto con &lt;br&gt; y &lt;strong&gt;). Enlaces abajo."></textarea>';
  var lm=buildLinkManager([]);
  ed.appendChild(lm.wrap);
  var bar=el('div','ed-bar');
  var lab=el('label',null,'<input type="checkbox"> 🔒 Sensible');
  var save=el('button','btn btn-primary','Crear');
  var cancel=el('button','btn btn-ghost','Cancelar');
  bar.appendChild(save);bar.appendChild(cancel);bar.appendChild(lab);
  ed.appendChild(bar);
  anchor.insertBefore(ed,anchor.firstChild);
  ed.querySelector('.t').focus();
  cancel.onclick=function(){ed.remove();};
  save.onclick=function(){
    var t=ed.querySelector('.t').value.trim();
    if(!t){toast('El título no puede estar vacío','err');return;}
    save.disabled=true;cancel.disabled=true;save.textContent='Creando…';
    var contenido=ed.querySelector('textarea').value;
    var newLinks=lm.getState().filter(function(l){return l.url;})
      .map(function(l){return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.text||l.url)+'</a>';});
    if(newLinks.length)contenido+=(contenido?' ':'')+newLinks.join(' ');
    var sib=childrenOf(parentId);
    var maxOrd=sib.reduce(function(m,n){return Math.max(m,parseInt(n.Orden||0,10)||0);},0);
    var rec={ParentId:parentId,Orden:maxOrd+10,Nivel:nivel,
      Titulo:t,Subtitulo:ed.querySelector('.s').value.trim(),
      Contenido:contenido,
      Sensible:lab.querySelector('input').checked,
      Modificado:nowStamp(),ActualizadoPor:USER_NAME||USER_ROLE||''};
    apiInsert(rec).then(function(){return apiLoad();}).then(function(rows){
      NODES=rows;rebuildIndex();renderTree();refreshCurrent();
      toast('Apartado creado','ok');
    }).catch(function(e){console.error(e);toast('Error al crear: '+e.message,'err');save.disabled=false;cancel.disabled=false;save.textContent='Crear';});
  };
}
function refreshCurrent(){
  var r=rootOf(activeId);
  if(r)selectRoot(r._id, activeId);
}

/* ════════ BÚSQUEDA ════════ */
var searchTimer;
function onSearch(){
  var q=$('search').value.trim();
  $('searchClr').classList.toggle('show',!!q);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){q?runSearch(q):refreshCurrent();},120);
}
function stripHtml(h){var d=el('div',null,h||'');return d.textContent||'';}
function runSearch(q){
  var ql=q.toLowerCase();
  var hits=NODES.filter(function(n){
    var hay=(n.Titulo||'')+' '+(n.Subtitulo||'')+' '+stripHtml(n.Contenido);
    if(isTruthy(n.Sensible)&&!CAN_EDIT){/* staff: no busca dentro de contenido sensible */ hay=(n.Titulo||'');}
    return hay.toLowerCase().indexOf(ql)>=0;
  });
  var c=$('content');c.innerHTML='';
  var wrap=el('div','results');
  wrap.appendChild(el('div','res-count',hits.length+' resultado'+(hits.length===1?'':'s')+' para "'+esc(q)+'"'));
  if(!hits.length)wrap.appendChild(el('div','res-count','Sin coincidencias. Prueba con otras palabras.'));
  hits.slice(0,80).forEach(function(n){
    var path=pathOf(n._id).map(function(x){return esc(x.Titulo);}).join(' › ');
    var snip=stripHtml(n.Contenido);
    var item=el('div','res-item');
    item.innerHTML='<div class="rt">'+hl(esc(n.Titulo||''),q)+(isTruthy(n.Sensible)?' 🔒':'')+'</div>'
      +'<div class="rp">'+path+'</div>'
      +(snip?'<div class="rc">'+hl(esc(snip.slice(0,160)),q)+(snip.length>160?'…':'')+'</div>':'');
    item.onclick=function(){var r=rootOf(n._id);selectRoot(r._id,n._id);};
    wrap.appendChild(item);
  });
  c.appendChild(wrap);
  markActiveTree();
  window.scrollTo(0,0);
}
function hl(text,q){
  try{var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    return text.replace(re,'<mark>$1</mark>');}catch(e){return text;}
}

/* ════════ IMPORTADOR (semilla) ════════ */
function showEmpty(){
  var c=$('content');c.innerHTML='';
  var box=el('div','empty-state');
  if(CAN_EDIT){
    box.innerHTML='<h2>El manual está vacío</h2><p>Importa el contenido inicial del manual (extraído del documento). Esto crea todos los apartados en la base de datos. Solo hay que hacerlo una vez.</p>';
    var b=el('button','btn btn-primary','Importar contenido inicial');
    b.onclick=importSeed;box.appendChild(b);
  }else{
    box.innerHTML='<h2>El manual está vacío</h2><p>Aún no hay contenido. Un administrador o manager debe importarlo.</p>';
  }
  c.appendChild(box);
}
function flattenSeed(seed){
  var out=[];var order={};
  (function walk(arr,parentTmp,nivel){
    arr.forEach(function(node){
      order[parentTmp]=(order[parentTmp]||0)+10;
      var tmpId='T'+(out.length+1);
      out.push({tmpId:tmpId,parentTmp:parentTmp,orden:order[parentTmp],nivel:nivel,
        Titulo:node.t||'',Subtitulo:node.s||'',Contenido:node.c||'',Sensible:!!node.x});
      if(node.k&&node.k.length)walk(node.k,tmpId,nivel+1);
    });
  })(seed,'0',0);
  return out;
}
function importSeed(){
  if(!CAN_EDIT)return;
  showLoader(true);var lt=$('loader').querySelector('.lt');lt.textContent='Importando manual…';
  var flat=flattenSeed(window.MANUAL_SEED||[]);
  /* Cada fila lleva un token único en ActualizadoPor para poder correlacionar
     tras releer, sin depender del ID que devuelva el insert del Worker. */
  var BATCH='imp'+Date.now();
  flat.forEach(function(row,i){row.token=BATCH+'#'+i;});
  /* PASO 1: insertar todos los nodos planos (ParentId=0 de momento) */
  var done=0;
  flat.reduce(function(p,row){
    return p.then(function(){
      lt.textContent='Importando… '+(++done)+'/'+flat.length;
      var rec={ParentId:0,Orden:row.orden,Nivel:row.nivel,
        Titulo:row.Titulo,Subtitulo:row.Subtitulo,Contenido:row.Contenido,Sensible:row.Sensible,
        Modificado:nowStamp(),ActualizadoPor:row.token};
      return apiInsert(rec);
    });
  },Promise.resolve())
  .then(function(){lt.textContent='Enlazando apartados…';return apiLoad();})
  .then(function(rows){
    /* mapear token -> id real */
    var byToken={};
    rows.forEach(function(r){if(r.ActualizadoPor&&r.ActualizadoPor.indexOf(BATCH)===0)byToken[r.ActualizadoPor]=r.TaManualID;});
    /* PASO 2: actualizar ParentId real + limpiar token de ActualizadoPor */
    var updates=flat.filter(function(row){return row.parentTmp!=='0';});
    var di=0,total=updates.length;
    return updates.reduce(function(p,row){
      return p.then(function(){
        lt.textContent='Enlazando… '+(++di)+'/'+total;
        var myId=byToken[row.token];
        var parentRow=flat[parseInt(row.parentTmp.slice(1),10)-1];
        var parentId=parentRow?byToken[parentRow.token]:0;
        if(!myId)return;
        return apiUpdate(myId,{ParentId:parentId||0,ActualizadoPor:USER_NAME||'import'});
      });
    },Promise.resolve()).then(function(){
      /* limpiar también el token de las raíces (parentTmp==='0') */
      var roots=flat.filter(function(r){return r.parentTmp==='0';});
      return roots.reduce(function(p,row){return p.then(function(){
        var id=byToken[row.token];if(!id)return;
        return apiUpdate(id,{ActualizadoPor:USER_NAME||'import'});
      });},Promise.resolve());
    });
  })
  .then(function(){return apiLoad();})
  .then(function(rows){
    NODES=rows;rebuildIndex();renderTree();
    var r=ROOTS[0];if(r)selectRoot(r._id);
    showLoader(false);toast('Manual importado ('+rows.length+' apartados)','ok');
  })
  .catch(function(e){console.error(e);showLoader(false);toast('Error al importar: '+e.message,'err');});
}

/* ════════ UI MÓVIL ════════ */
function closeSideMobile(){$('side').classList.remove('open');$('scrim').classList.remove('show');}
function setupMobile(){
  $('scrim').onclick=closeSideMobile;
}

/* ════════ MODO VER / EDITAR ════════ */
function toggleEditMode(){
  if(!CAN_EDIT)return;
  EDIT_MODE=!EDIT_MODE;
  var b=$('modeBtn');
  if(EDIT_MODE){b.classList.add('editing');b.textContent='✓ Hecho';}
  else{b.classList.remove('editing');b.textContent='✏️ Editar';}
  updateMeta();
  refreshCurrent();
}
function updateMeta(){
  var m=$('hMeta');if(!m)return;
  var total=NODES.length;
  var modeTxt=CAN_EDIT?(EDIT_MODE?'Modo edición':'Solo lectura'):'Solo lectura';
  m.textContent=total?(total+' apartados · '+modeTxt):modeTxt;
}

/* ════════ INIT ════════ */
function init(){
  /* botón de modo: solo visible si el usuario puede editar */
  if(CAN_EDIT){var b=$('modeBtn');b.style.display='inline-flex';}
  $('search').addEventListener('input',onSearch);
  $('searchClr').onclick=function(){$('search').value='';$('searchClr').classList.remove('show');refreshCurrent();};
  setupMobile();
  showLoader(true);
  apiLoad().then(function(rows){
    NODES=rows||[];rebuildIndex();updateMeta();
    if(!NODES.length){showLoader(false);renderTree();showEmpty();return;}
    renderTree();
    var first=ROOTS[0];if(first)selectRoot(first._id);
    showLoader(false);
  }).catch(function(e){
    console.error(e);showLoader(false);
    toast('No se pudo cargar el manual: '+e.message,'err');
    $('content').innerHTML='<div class="empty-state"><h2>Error de conexión</h2><p>No se pudo cargar el manual desde la base de datos. Revisa la conexión e inténtalo de nuevo.</p></div>';
  });
}
/* expuesto para el onclick del botón en la cabecera */
window.toggleEditMode=toggleEditMode;
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();

})();

</script>
