<!DOCTYPE html>
<!-- VERSIÓN ACTUAL: v5 | Historial al final -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Header Footer v5 — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--green:#16a34a;--green-lt:#f0fdf4;--green-bd:#86efac;
      --blue:#2563EB;--blue-lt:#EFF6FF;--blue-bd:#BFDBFE;
      --amber:#B45309;--amber-lt:#FFFBEB;--amber-bd:#FCD34D;
      --gray-1:#f9fafb;--gray-2:#f1f3f5;--gray-3:#dee2e6;
      --gray-4:#868e96;--gray-5:#212529;--wa:#25D366;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Montserrat,sans-serif;background:#fff;color:var(--gray-5);min-height:100vh}
    /* Loading */
    #stLoad{display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:80vh;gap:10px;text-align:center;padding:40px 20px}    @keyframes spin{to{transform:rotate(360deg)}}
    /* Layout */
    #content{display:none;max-width:540px;margin:0 auto;padding:0 20px 80px}
    /* Header */
    .page-header{text-align:center;padding:12px 16px 14px;border-bottom:1px solid var(--gray-2);
      margin-bottom:0;position:relative}
    .page-logo{height:52px;display:block;margin:0 auto 6px;max-width:180px;object-fit:contain}
    .page-title{font-family:Montserrat,sans-serif;font-size:16px;font-weight:900;color:var(--red);margin-bottom:6px}
    .page-greeting{font-size:15px;font-weight:600;margin-bottom:2px}
    .page-villa{font-size:13px;color:var(--gray-4)}
    .page-code{display:inline-block;margin-top:6px;font-size:11px;color:var(--gray-4);
      background:var(--gray-2);padding:3px 12px;border-radius:20px;
      font-family:Montserrat,sans-serif;font-weight:700}
    /* Lang */
    #langWrap{display:none;position:absolute;top:12px;right:12px}
    #langSel{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;
      border:1px solid var(--gray-3);border-radius:8px;padding:4px 8px;
      background:#fff;color:var(--gray-5);cursor:pointer;outline:none;
      appearance:none;-webkit-appearance:none;padding-right:6px}

    /* ══ v35: BARRA DE NAVEGACIÓN DE PASOS ══ */
    #stepNav{
      display:none; /* se muestra cuando content está visible */
      background:#fff;
      border-bottom:2px solid var(--gray-2);
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      position:sticky;
      top:0;
      z-index:200;
    }
    #stepNav::-webkit-scrollbar{display:none}
    .snav-inner{
      display:flex;
      min-width:max-content;
      padding:0 8px;
    }
    .snav-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      padding:10px 12px;
      border:none;
      background:none;
      cursor:pointer;
      font-family:Montserrat,sans-serif;
      font-size:9px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--gray-4);
      border-bottom:2.5px solid transparent;
      margin-bottom:-2px;
      white-space:nowrap;
      text-decoration:none;
      transition:color .15s, border-color .15s;
      flex-shrink:0;
    }
    .snav-btn:hover{color:var(--gray-5)}
    .snav-btn.active{color:var(--red);border-bottom-color:var(--red)}
    .snav-btn.done-tab{color:var(--green)}
    .snav-btn.done-tab.active{color:var(--green);border-bottom-color:var(--green)}
    .snav-num{
      width:24px;height:24px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:900;
      background:var(--gray-2);color:var(--gray-4);
      flex-shrink:0;
    }
    .snav-btn.active .snav-num{background:var(--red);color:#fff}
    .snav-btn.done-tab .snav-num{background:var(--green);color:#fff}
    .snav-btn.done-tab.active .snav-num{background:var(--green);color:#fff}

    /* ══ PANELES ══ */
    .panel{display:none;padding-top:20px}
    .panel.active{display:block}

    /* Key section (panel llaves) */
    .key-grid{display:flex;flex-direction:column;gap:9px}
    .key-row{background:#fff;border:1px solid var(--gray-3);border-radius:11px;padding:16px;}
    .key-lbl{font-family:Montserrat,sans-serif;font-size:9px;font-weight:800;
      text-transform:uppercase;letter-spacing:.7px;color:var(--gray-4);display:block;margin-bottom:10px;}
    .key-val{font-family:Montserrat,sans-serif;font-size:14px;font-weight:700;color:var(--gray-5);}
    .key-val.code{font-size:28px;letter-spacing:5px;color:var(--red);font-weight:900;
      background:var(--gray-1);display:inline-block;padding:6px 16px;
      border-radius:8px;border:1px dashed var(--gray-3);}
    .key-row-center{text-align:center}
    .enter-note{font-family:Montserrat,sans-serif;font-size:11px;font-weight:500;
      color:var(--gray-4);margin-top:8px;line-height:1.5;}
    .addr-inline{display:flex;align-items:center;gap:10px;margin-top:4px}
    .addr-text{font-family:Montserrat,sans-serif;font-size:14px;font-weight:700;color:var(--gray-5);}
    .btn-maps{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
      padding:6px 12px;background:var(--gray-2);color:var(--gray-5);border-radius:8px;
      font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;
      text-decoration:none;border:1px solid var(--gray-3);}
    .wifi-block{display:flex;align-items:flex-start;gap:12px}
    .wifi-ico{flex-shrink:0;color:var(--gray-5);margin-top:2px}
    .wifi-data{flex:1}
    .wifi-line{font-family:Montserrat,sans-serif;font-size:14px;font-weight:700;
      color:var(--gray-5);margin-bottom:6px;line-height:1.4;}
    .wifi-line:last-child{margin-bottom:0}
    .wifi-line .wl-lbl{font-family:Montserrat,sans-serif;font-size:9px;font-weight:800;
      text-transform:uppercase;letter-spacing:.5px;color:var(--gray-4);margin-right:6px;}
    .wifi-line .wl-val{font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;color:var(--gray-5);}

    /* Keys pending box */
    .keys-pending{background:var(--gray-1);border:1.5px dashed var(--gray-3);
      border-radius:12px;padding:28px 20px;text-align:center;margin-top:8px}
    .keys-pending-ico{font-size:40px;margin-bottom:10px}
    .keys-pending-title{font-size:14px;font-weight:900;color:var(--gray-5);margin-bottom:8px}
    .keys-pending-desc{font-size:12px;color:var(--gray-4);line-height:1.6;font-weight:500}

    /* During section */
    #duringSection{display:none;border:1px solid var(--gray-3);border-radius:11px;
      padding:16px;background:#fff;margin-bottom:22px;}
    #duringSection .key-lbl{color:var(--green)}
    .ds-desc{font-family:Montserrat,sans-serif;font-size:12px;font-weight:500;
      color:var(--gray-4);line-height:1.5;margin-bottom:10px;}
    .btn-wa-vm{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
      background:var(--wa);color:#fff;border-radius:8px;font-family:Montserrat,sans-serif;
      font-size:12px;font-weight:800;text-decoration:none}

    /* Steps */
    .steps-section{margin-bottom:24px}
    .steps-label{font-size:11px;font-weight:800;text-transform:uppercase;
      letter-spacing:.7px;color:var(--gray-4);margin-bottom:16px;
      padding-bottom:10px;border-bottom:1px solid var(--gray-2);text-align:center}
    .progress-track{display:flex;align-items:center;margin-bottom:20px;
      max-width:300px;margin-left:auto;margin-right:auto}
    .pt-step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto}
    .pt-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-weight:900;font-size:13px;position:relative}
    .pt-circle.pend{border:2px solid var(--gray-3);background:var(--gray-2);color:var(--gray-4)}
    .pt-circle.done{background:var(--green);color:#fff;border:2px solid var(--green)}
    .pt-circle.done::after{content:'✓';position:absolute;top:-6px;right:-6px;
      font-size:9px;background:#fff;color:var(--green);border-radius:50%;
      width:16px;height:16px;display:flex;align-items:center;justify-content:center;
      border:1.5px solid var(--green-bd);font-weight:900;line-height:16px;text-align:center}
    .pt-label{font-size:10px;font-weight:700;color:var(--gray-4);
      text-align:center;max-width:56px;line-height:1.2}
    .pt-label.done{color:var(--green)}
    .pt-line{flex:1;height:2px;background:var(--gray-3);margin:0 4px;margin-bottom:20px}
    .pt-line.done{background:var(--green)}
    .steps-cards{display:flex;flex-direction:column;gap:8px}
    .step-card{border:1px solid var(--gray-3);border-radius:14px;padding:16px;
      display:flex;align-items:center;gap:14px}
    .step-card.done{border-color:var(--green);background:var(--green-lt)}
    .sc-ico{width:48px;height:48px;border-radius:12px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center}
    .step-card.pend .sc-ico{background:var(--blue-lt);color:var(--blue)}
    .step-card.done .sc-ico{background:var(--green);border:none;color:#fff}
    .sc-ico svg{width:24px;height:24px}
    .step-card.pend .sc-ico svg{stroke:var(--blue)}
    .step-card.done .sc-ico svg{stroke:#fff}
    .sc-body{flex:1;min-width:0}
    .sc-step-label{font-size:10px;font-weight:800;text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:3px}
    .step-card.pend .sc-step-label{color:var(--blue)}
    .step-card.done .sc-step-label{color:var(--green)}
    .sc-name{font-size:15px;font-weight:800;color:var(--gray-5);margin-bottom:3px}
    .sc-desc{font-size:11px;color:var(--gray-4);line-height:1.5;margin-bottom:5px}
    .sc-status{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block}
    .sc-status.pend{background:var(--amber-lt);color:var(--amber)}
    .sc-status.done{background:var(--green);color:#fff}
    .sc-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;padding:0;border:none;border-radius:10px;
      cursor:pointer;text-decoration:none}
    .sc-btn.pend{background:var(--blue);color:#fff}
    .sc-btn.done{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd)}
    /* Contact footer */
    .contact-footer{margin-top:22px;padding-top:18px;border-top:1px solid var(--gray-2);text-align:center}
    .cf-title{font-size:14px;font-weight:800;color:var(--gray-5);margin-bottom:6px}
    .cf-sub{font-size:11px;color:var(--gray-4);margin-bottom:14px}
    .cf-btns{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
    .btn-wa{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;
      background:var(--wa);color:#fff;border-radius:9px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;text-decoration:none}
    .btn-phone{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;
      background:#1a73e8;color:#fff;border-radius:9px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;text-decoration:none}
    .btn-email{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;
      background:var(--gray-2);color:var(--gray-5);border:1px solid var(--gray-3);
      border-radius:9px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;text-decoration:none}
    #waFloat{position:fixed;bottom:20px;right:20px;z-index:500;background:var(--wa);
      width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 14px rgba(37,211,102,.35);text-decoration:none}
    @media(max-width:420px){
      .key-val.code{font-size:22px;letter-spacing:3px}
      .cf-btns{flex-direction:column;align-items:center}
      .snav-btn{padding:8px 9px;font-size:8px}
    }
  
    /* ══ SPINNER — corazón 3Villas ══ */
    img.spinner {
      width: 56px !important;
      height: 56px !important;
      display: block !important;
      margin: 0 auto 12px !important;
      animation: spin-3v .9s linear infinite !important;
    }
    img.spinner-sm {
      width: 20px !important;
      height: 20px !important;
      display: inline-block !important;
      vertical-align: middle !important;
      animation: spin-3v .7s linear infinite !important;
    }
    @keyframes spin-3v { to { transform: rotate(360deg); } }

    /* ══ v40: Tabs Info+Keys en header, Steps 1-4 como mini-cards ══ */
    .hdr-tabs{display:flex;gap:10px;justify-content:center;margin:10px 0 6px}
    .hdr-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;
      border:none;border-radius:12px;
      cursor:pointer;font-family:Montserrat,sans-serif;font-size:12px;font-weight:800;
      text-decoration:none;transition:all .15s}
    .hdr-tab:hover{opacity:.85}
    .hdr-tab.info,.hdr-tab.active.info{background:var(--blue);color:#fff}
    .hdr-tab.keys{background:var(--gray-2);color:var(--gray-4);border:1.5px solid var(--gray-3)}
    .hdr-tab.keys.done-tab,.hdr-tab.active.keys{background:var(--green);color:#fff;border-color:var(--green)}
    /* i blanca SVG */
    .info-ico{display:inline-flex;width:16px;height:16px;align-items:center;justify-content:center}
    .info-ico svg{width:16px;height:16px}
    /* Título 4 pasos */
    .hdr-steps-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;
      color:var(--gray-4);margin:12px 0 8px;text-align:center;display:none}

  </style>
</head>
<body>

<div id="site-header"></div>

<div style="max-width:540px;margin:0 auto;padding:20px 20px 0;font-family:Montserrat,sans-serif">
  <h2 style="font-size:18px;font-weight:900;color:#212529;margin-bottom:12px">Página de test</h2>
  <p style="font-size:13px;color:#868e96;line-height:1.6">
    Este es el contenido propio de la página.<br>
    La cabecera y el pie se cargan desde <strong>checkin_header.html</strong> y <strong>checkin_footer.html</strong>.
  </p>
</div>

<div id="site-footer"></div>

<script>
(function() {
  /* Detectar base URL automáticamente — funciona en GitHub Pages y local */
  var base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

  function inject(url, id) {
    var el = document.getElementById(id);
    if (!el) return;
    fetch(base + url)
      .then(function(r){ return r.text(); })
      .then(function(html){
        el.innerHTML = html;
        el.querySelectorAll('script').forEach(function(s){
          var ns = document.createElement('script');
          ns.textContent = s.textContent;
          document.body.appendChild(ns);
        });
      })
      .catch(function(e){ console.warn('Error cargando ' + base + url, e); });
  }

  inject('checkin_header.html', 'site-header');
  inject('checkin_footer.html', 'site-footer');
})();
</script>

</body>
</html>
<!-- HISTORIAL: v5 - Base URL dinámica, funciona en GitHub Pages y local | v4 - anterior -->
