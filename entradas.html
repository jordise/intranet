<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- entradas-desviar.html v03 — 12/05/2026 -->
  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  entradas-desviar.html — Página despachadora de entradas        ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  QUÉ HACE ESTA PÁGINA:                                          ║
  ║  Esta página no muestra contenido. Su única función es leer     ║
  ║  el rol del usuario que ha iniciado sesión y redirigirle        ║
  ║  automáticamente a la página correcta de entradas.              ║
  ║                                                                 ║
  ║  FLUJO:                                                         ║
  ║  1. Comprueba que el usuario tiene sesión activa (auth.js).     ║
  ║     Si no tiene sesión, lo manda al login automáticamente.      ║
  ║  2. Obtiene el email del usuario de la sesión.                  ║
  ║  3. Busca ese email en la tabla TaUsers de Caspio para          ║
  ║     leer su campo "Role".                                       ║
  ║  4. Según el rol, redirige a una página u otra (ver abajo).     ║
  ║  5. Si algo falla, muestra un mensaje de error con botón        ║
  ║     para volver al login.                                       ║
  ║                                                                 ║
  ║  CÓMO AÑADIR O QUITAR ROLES:                                    ║
  ║  Busca el bloque "TABLA DE REDIRECCIÓN POR ROL" en el JS.       ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->
  <!-- ══ PWA ══ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3Villas">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/3villas-manuals/sw.js')
          .then(r => console.log('SW registrado:', r.scope))
          .catch(e => console.warn('SW error:', e));
      });
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entradas Desviar — 3Villas v03</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --red: #C8102E; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2d3142;
    }
    .logo-wrap { margin-bottom: 28px; }
    .logo-wrap img { height: 48px; opacity: .85; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #e8eaed;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .5px;
      color: #7a8194;
      text-transform: uppercase;
    }
    .err-box {
      display: none;
      margin-top: 24px;
      background: #fce8eb;
      border: 1.5px solid #C8102E;
      border-radius: 10px;
      padding: 16px 22px;
      text-align: center;
      max-width: 340px;
    }
    .err-box p { font-size: 13px; color: #9e0c24; margin-bottom: 10px; }
    .err-box button {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 7px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="Logo_350x180_negro_trans.png" alt="3Villas">
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Verificando acceso…</div>

  <div class="err-box" id="errBox">
    <p id="errMsg">No se pudo verificar el usuario. Inténtalo de nuevo.</p>
    <button onclick="location.href='login.html'">Ir al login</button>
  </div>

  <!-- auth.js debe cargarse ANTES del script principal para que Auth esté disponible -->
  <script src="auth.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════════════
       CONFIGURACIÓN GENERAL
       ════════════════════════════════════════════════════════════════ */

    /* URL del proxy Cloudflare que conecta con Caspio */
    const WORKER = 'https://caspio-proxy.jordi-89b.workers.dev';


    /* ════════════════════════════════════════════════════════════════
       ▼▼▼  TABLA DE REDIRECCIÓN POR ROL  ▼▼▼

       Aquí defines qué página abre cada rol.
       - La clave es el rol tal como está escrito en Caspio (TaUsers → Role).
         Siempre en minúsculas (el código ya lo convierte).
       - El valor es el nombre del archivo HTML al que se redirige.

       PÁGINA DE DESTINO A:  entradas-cleaner.html
         Roles que van aquí:
    */
    const ROLES_CLEANER = [
      'cleaner'
      // Añade aquí más roles si también deben ver entradas-cleaner:
      // 'limpieza',
      // 'housekeeper',
    ];

    /*
       PÁGINA DE DESTINO B:  entradas-equipo.html
         Cualquier rol que NO esté en ROLES_CLEANER irá aquí.
         Eso incluye: admin, manager, staff, owner, y cualquier otro.
         No hay que listarlos; el código los recoge automáticamente.

       Si en el futuro quisieras añadir una TERCERA página de destino,
       crea un nuevo array (ej. ROLES_OWNER = ['owner']) y añade
       un nuevo bloque "else if" en la función redirigir() más abajo.
    ════════════════════════════════════════════════════════════════ */

    const DEST_CLEANER = 'entradas-cleaner.html';  // página para roles en ROLES_CLEANER
    const DEST_EQUIPO  = 'entradas-equipo.html';   // página para todos los demás roles


    /* ════════════════════════════════════════════════════════════════
       LÓGICA PRINCIPAL — no necesitas tocar nada de aquí abajo
       ════════════════════════════════════════════════════════════════ */

    function redirigir(role) {
      /* Comprueba si el rol está en la lista de cleaners */
      if (ROLES_CLEANER.includes(role)) {
        location.replace(DEST_CLEANER);
      } else {
        /* Cualquier otro rol (admin, manager, staff, owner…) */
        location.replace(DEST_EQUIPO);
      }
    }

    async function init() {
      try {
        /* 1. Verificar sesión activa. Si no hay sesión, auth.js redirige al login */
        if (typeof Auth === 'undefined') throw new Error('auth.js no cargado');
        if (typeof Auth.require === 'function') Auth.require('entradas');

        /* 2. Obtener el email del usuario con sesión */
        const email = Auth.email ? Auth.email() : '';
        if (!email) throw new Error('Sin email de sesión');

        document.getElementById('msg').textContent = 'Cargando perfil…';

        /* 3. Buscar el usuario en TaUsers para leer su rol */
        const url  = Auth.url(`${WORKER}?action=data&table=TaUsers&limit=500`);
        const res  = await fetch(url);
        if (!res.ok) throw new Error(`Error al cargar usuarios (HTTP ${res.status})`);
        const json = await res.json();
        const rows = json.Result || json.result || [];

        /* Buscar la fila cuyo Email coincide con el usuario en sesión */
        const me = rows.find(u =>
          String(u.Email || u.email || '').toLowerCase() === email.toLowerCase()
        );

        /* 4. Leer el campo Role (prueba los nombres más comunes por si Caspio lo llama distinto) */
        const role = String(
          (me && (me.Role || me.role || me.Rol || me.rol || ''))
        ).trim().toLowerCase();

        /* Log de depuración — visible en consola del navegador */
        console.log('[desviar] email:', email, '| rol detectado:', role || '(vacío)');

        document.getElementById('msg').textContent = 'Redirigiendo…';

        /* 5. Redirigir según el rol */
        redirigir(role);

      } catch (err) {
        /* Si algo falla, mostrar error en pantalla */
        console.error('[desviar] Error:', err);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').style.display     = 'none';
        document.getElementById('errMsg').textContent    = err.message || 'Error al verificar usuario.';
        document.getElementById('errBox').style.display  = 'block';
      }
    }

    /* Arrancar cuando el DOM esté listo */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>
</html>
