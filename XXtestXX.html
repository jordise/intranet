<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocupación Villas — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;--green:#1e9e4e;--green-light:#e6f7ee;--orange:#e07b00;--orange-light:#fff4e0;--gray-1:#f4f5f7;--gray-2:#e8eaed;--gray-3:#c4c9d4;--gray-4:#7a8194;--gray-5:#2d3142;--shadow-sm:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 14px rgba(0,0,0,.11);--shadow-lg:0 8px 28px rgba(0,0,0,.13);--r:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh}
    header{background:var(--gray-5);color:#fff;padding:10px 16px;min-height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.28)}
    .h-title{font-family:'Montserrat',sans-serif;font-size:clamp(13px,3.5vw,20px);font-weight:900;letter-spacing:1px;text-transform:uppercase}
    .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:20px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700}
    
    #filterPanel{background:#fff;border-bottom:2px solid var(--gray-2);padding:12px 22px 12px;position:sticky;top:54px;z-index:200;box-shadow:var(--shadow-sm)}
    .main-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .f-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
    .f-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-4)}
    .f-input{height:36px;border:1.5px solid var(--gray-2);border-radius:7px;padding:0 10px;font-size:13px}
    
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;padding:20px}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;border-left:6px solid var(--gray-3);transition:transform 0.2s}
    .card.ocupada{border-left-color:var(--red)}
    .c-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
    .villa-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase}
    .villa-status{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-bottom:4px;color:#fff;font-weight:800}
    
    .c-body{padding:12px 14px;border-top:1px solid var(--gray-2)}
    .dates-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px}
    .date-box{background:var(--gray-1);border-radius:7px;padding:6px 10px}
    .date-box .lbl{font-size:9px;font-weight:700;color:var(--gray-4);display:block}
    .date-box .val{font-size:13px;font-weight:800;color:var(--gray-5)}
    
    .guest-info{font-size:13px;color:var(--gray-5);font-weight:600;margin-top:5px}
    .c-actions{padding:10px 14px;background:var(--gray-1);border-top:1px solid var(--gray-2);display:flex;gap:8px}
    .act-chip{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;text-decoration:none;font-family:'Montserrat'}
    
    .state-box{text-align:center;padding:100px 20px;color:var(--gray-4)}
    .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--gray-2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    @media(max-width:600px){#grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <div class="h-title">🏠 MONITOR DE OCUPACIÓN</div>
  <div class="logout-btn"><span id="hUserName">Cargando...</span></div>
</header>

<div id="filterPanel">
  <div class="main-bar">
    <div class="f-group">
      <label class="f-label">Desde (Ocupado el...)</label>
      <input type="date" id="fDesde" class="f-input" onchange="doSearch()">
    </div>
    <div class="f-group">
      <label class="f-label">Hasta (Y el...)</label>
      <input type="date" id="fHasta" class="f-input" onchange="doSearch()">
    </div>
    <div class="f-group" style="flex:2">
      <label class="f-label">Filtrar por Villa</label>
      <input type="text" id="fVilla" class="f-input" placeholder="Nombre de la villa..." oninput="doSearch()">
    </div>
    <button onclick="clearFilters()" style="padding:10px; border:none; background:none; cursor:pointer">✕ Limpiar</button>
  </div>
</div>

<main>
  <div id="stLoad" class="state-box" style="display:none">
    <div class="spinner"></div><p>Consultando disponibilidad...</p>
  </div>
  <div id="grid"></div>
</main>

<script src="auth.js"></script>
<script>
const CFG = {
  workerUrl: 'https://caspio-proxy.jordi-89b.workers.dev',
  viewName: 'Vi_villas_and_bookings2021'
};

const F = {
  reservationId: 'TaBookings2021_BookingID',
  confirmCode: 'TaBookings2021_FS_confirmation_code',
  villaName: 'TaVillas_Name_villa_para_inquilinos',
  checkIn: 'TaBookings2021_Checkin',
  checkOut: 'TaBookings2021_Checkout',
  status: 'TaBookings2021_BookingStatus',
  guestName: 'TaBookings2021_Guest_Full_Name',
  villaId: 'TaVillas_villaid'
};

const $ = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = s => {
    if(!s) return '—';
    const d = new Date(s.includes('T') ? s : s + 'T00:00:00');
    return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
};

// Inicialización
window.addEventListener('DOMContentLoaded', () => {
    Auth.require('entradas'); // Reutiliza el permiso de entradas
    $('hUserName').textContent = Auth.name() || 'Usuario';
    $('fDesde').value = todayStr();
    $('fHasta').value = todayStr();
    doSearch();
});

function clearFilters() {
    $('fDesde').value = todayStr();
    $('fHasta').value = todayStr();
    $('fVilla').value = '';
    doSearch();
}

async function doSearch() {
    const grid = $('grid');
    const loader = $('stLoad');
    
    grid.style.display = 'none';
    loader.style.display = 'block';

    const desde = $('fDesde').value || todayStr();
    const hasta = $('fHasta').value || desde;
    const villa = $('fVilla').value.trim();

    // LÓGICA DE OCUPACIÓN: La reserva empieza antes de que acabe el filtro 
    // Y termina después de que empiece el filtro.
    let where = `${F.status}<>'cancelled' AND ${F.checkIn} < '${hasta}T23:59:59' AND ${F.checkOut} > '${desde}T00:00:00'`;
    
    if (villa) {
        where += ` AND ${F.villaName} LIKE '%${villa}%'`;
    }

    try {
        const url = `${CFG.workerUrl}?action=view&view=${encodeURIComponent(CFG.viewName)}&where=${encodeURIComponent(where)}&orderBy=${F.villaName}`;
        const res = await fetch(Auth.url(url));
        const json = await res.json();
        const records = json.Result || [];

        renderOccupancy(records);
    } catch (err) {
        grid.innerHTML = `<p style="padding:20px; color:red">Error: ${err.message}</p>`;
        grid.style.display = 'block';
    } finally {
        loader.style.display = 'none';
    }
}

function renderOccupancy(records) {
    const grid = $('grid');
    grid.innerHTML = '';
    grid.style.display = 'grid';

    if (records.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; padding:100px">
                <div style="font-size:50px">✅</div>
                <h3 style="font-family:Montserrat">Todo disponible</h3>
                <p style="color:var(--gray-4)">No hay reservas registradas para estas fechas.</p>
            </div>`;
        return;
    }

    // Agrupar para evitar duplicados de villa si hay varias reservas en el rango
    const villasVistas = new Set();

    records.forEach(r => {
        const vId = r[F.villaId];
        if (villasVistas.has(vId)) return; 
        villasVistas.add(vId);

        const card = document.createElement('div');
        card.className = 'card ocupada';
        
        const ci = r[F.checkIn];
        const co = r[F.checkOut];
        const vn = r[F.villaName] || 'Villa sin nombre';
        const guest = r[F.guestName] || 'Huésped desconocido';
        const code = r[F.confirmCode];

        card.innerHTML = `
            <div class="c-head">
                <div>
                    <span class="villa-status" style="background:var(--red)">OCUPADA</span>
                    <div class="villa-name">${vn}</div>
                </div>
                <div style="font-size:10px; font-weight:700; color:var(--gray-3)">#${code}</div>
            </div>
            <div class="c-body">
                <div class="dates-grid">
                    <div class="date-box">
                        <span class="lbl">Check-in</span>
                        <span class="val">${fmtDate(ci)}</span>
                    </div>
                    <div style="color:var(--gray-3)">➔</div>
                    <div class="date-box">
                        <span class="lbl">Check-out</span>
                        <span class="val">${fmtDate(co)}</span>
                    </div>
                </div>
                <div class="guest-info">👤 ${guest}</div>
            </div>
            <div class="c-actions">
                <a href="villa.html?villa_id=${vId}" class="act-chip" style="background:var(--green-light); color:var(--green)">FICHA VILLA</a>
                <a href="https://dashboard.hostaway.com/reservations/${code}" target="_blank" class="act-chip" style="background:var(--gray-2); color:var(--gray-5)">VER PMS</a>
            </div>
        `;
        grid.appendChild(card);
    });
}
</script>

</body>
</html>
