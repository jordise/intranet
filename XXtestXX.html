<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario 7 Días — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #C8102E; --red-dark: #9e0c24; --blue: #1565c0; --blue-dark: #0d47a1;
      --gray-1: #f4f5f7; --gray-2: #e8eaed; --gray-5: #2d3142; --r: 8px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--gray-1); color: var(--gray-5); }
    
    header { 
      background: var(--red); color: #fff; padding: 10px 16px; 
      display: flex; align-items: center; justify-content: space-between; 
      position: sticky; top: 0; z-index: 300; box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .h-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 1px; }

    /* PANEL FILTROS */
    #filterPanel { background: #fff; border-bottom: 2px solid var(--gray-2); padding: 12px 16px; position: sticky; top: 48px; z-index: 200; }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .f-group { display: flex; flex-direction: column; gap: 4px; }
    .f-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #7a8194; }
    .f-input { height: 34px; border: 1.5px solid var(--gray-2); border-radius: 6px; padding: 0 8px; font-size: 13px; }

    /* MODO CALENDARIO */
    main { padding: 16px; overflow-x: auto; }
    #grid { 
      display: grid; 
      grid-template-columns: repeat(7, minmax(140px, 1fr)); 
      gap: 12px; 
      align-items: start; 
    }

    .cal-column { background: #dfe2e7; border-radius: var(--r); min-height: 80vh; padding-bottom: 20px; }
    .cal-header { 
      background: var(--gray-5); color: #fff; padding: 10px; 
      text-align: center; border-radius: 8px 8px 0 0; 
      position: sticky; top: 0; z-index: 10;
    }
    .cal-day-num { font-family: 'Montserrat'; font-size: 20px; font-weight: 900; display: block; }
    .cal-day-name { font-size: 11px; text-transform: uppercase; opacity: 0.8; }

    /* MINI TARJETAS */
    .mini-card {
      margin: 8px; padding: 10px; border-radius: 6px; 
      font-size: 12px; font-weight: 700; color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      cursor: pointer; transition: transform 0.1s;
    }
    .mini-card:active { transform: scale(0.96); }
    .mini-card.entrada { background: var(--red); border-left: 5px solid var(--red-dark); }
    .mini-card.salida { background: var(--blue); border-left: 5px solid var(--blue-dark); }
    .mini-card .guest { display: block; font-weight: 400; font-size: 10px; margin-top: 4px; opacity: 0.9; }

    .state-box { text-align: center; padding: 50px; grid-column: 1/-1; }
    .spinner { width: 30px; height: 30px; border: 3px solid #ccc; border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width: 800px) {
      #grid { grid-template-columns: repeat(7, 150px); } /* Scroll lateral en móvil */
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>

<header>
  <div class="h-title">3VILLAS CALENDAR</div>
  <div id="hUserName" style="font-size: 12px; opacity: 0.8;"></div>
</header>

<div id="filterPanel">
  <div class="filter-row">
    <div class="f-group">
      <label class="f-label">Semana del</label>
      <input type="date" id="fDesde" class="f-input" onchange="doSearch()">
    </div>
    <div class="f-group">
      <label class="f-label">Filtrar</label>
      <select id="fTipo" class="f-input" onchange="doSearch()">
        <option value="both">Todo</option>
        <option value="entrada">Solo Entradas</option>
        <option value="salida">Solo Salidas</option>
      </select>
    </div>
    <button onclick="doSearch()" style="height:34px; padding:0 15px; background:var(--red); color:#fff; border:none; border-radius:6px; font-weight:700; cursor:pointer;">BUSCAR</button>
  </div>
</div>

<main>
  <div id="stLoad" class="state-box" style="display:none"><div class="spinner"></div></div>
  <div id="grid"></div>
</main>

<script>
const CFG = {
  workerUrl: 'https://caspio-proxy.jordi-89b.workers.dev',
  viewName: 'Vi_villas_and_bookings2021'
};

const F = {
  villaName: 'TaVillas_Name_villa_para_inquilinos',
  guestName: 'TaBookings2021_Guest_Full_Name',
  checkIn: 'TaBookings2021_Checkin',
  checkOut: 'TaBookings2021_Checkout',
  status: 'TaBookings2021_BookingStatus',
  confirmCode: 'TaBookings2021_FS_confirmation_code'
};

const $ = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().split('T')[0];
const g = (r, key) => r[F[key]] ?? '';

// INIT
window.addEventListener('DOMContentLoaded', () => {
  $('fDesde').value = todayStr();
  if(typeof Auth !== 'undefined') $('hUserName').textContent = Auth.name();
  doSearch();
});

async function doSearch() {
  const grid = $('grid');
  const startDay = $('fDesde').value;
  if (!startDay) return;

  grid.innerHTML = '';
  $('stLoad').style.display = 'block';

  // Calculamos los 7 días
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(startDay + 'T00:00:00');
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().split('T')[0]);
  }

  // Filtro de Caspio: registros que toquen cualquiera de estos 7 días
  const endDay = days[6];
  const where = `${F.status}<>'cancelled' AND ((${F.checkIn} >= '${startDay}T00:00:00' AND ${F.checkIn} <= '${endDay}T23:59:59') OR (${F.checkOut} >= '${startDay}T00:00:00' AND ${F.checkOut} <= '${endDay}T23:59:59'))`;
  
  const url = `${CFG.workerUrl}?action=view&view=${encodeURIComponent(CFG.viewName)}&where=${encodeURIComponent(where)}&limit=500`;

  try {
    const res = await fetch(Auth.url(url));
    const json = await res.json();
    const records = json.Result || [];
    renderCalendar(days, records);
  } catch (err) {
    grid.innerHTML = `<p style="padding:20px; color:red">Error: ${err.message}</p>`;
  } finally {
    $('stLoad').style.display = 'none';
  }
}
