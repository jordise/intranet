<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entradas v15 — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;--green:#1e9e4e;--green-light:#e6f7ee;--orange:#e07b00;--orange-light:#fff4e0;--gray-1:#f4f5f7;--gray-2:#e8eaed;--gray-3:#c4c9d4;--gray-4:#7a8194;--gray-5:#2d3142;--shadow-sm:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 14px rgba(0,0,0,.11);--r:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh}
    
    header{background:var(--red);color:#fff;padding:10px 16px;min-height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.15)}
    .h-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
    .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700}

    #filterPanel{background:#fff;border-bottom:2px solid var(--gray-2);padding:12px 22px 0;position:sticky;top:54px;z-index:200}
    .main-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-bottom:8px}
    .pill-group{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
    .pill-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;color:var(--gray-4)}
    .pill-opts{display:flex;background:var(--gray-2);border-radius:20px;padding:2px;gap:1px}
    .pill-opt{border:none;border-radius:18px;padding:4px 12px;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;background:none;color:var(--gray-4)}
    .pill-opt.on{background:#fff;color:var(--gray-5);box-shadow:var(--shadow-sm)}

    /* ═════════ MODO CALENDARIO MINIMALISTA ═════════ */
    main { padding: 18px 10px; max-width: 100%; margin: 0 auto; }
    #grid { 
        display: grid; 
        grid-template-columns: repeat(7, minmax(150px, 1fr)); 
        gap: 10px; 
        align-items: start; 
        overflow-x: auto;
    }
    .cal-column { background: #fbfbfb; border-radius: 12px; min-height: 75vh; border: 1px solid #eee; }
    .cal-header { 
        padding: 15px 5px; text-align: center; border-bottom: 2px solid #eee;
        background: #fff; border-radius: 12px 12px 0 0;
    }
    .cal-day-num { font-family: 'Montserrat'; font-size: 24px; font-weight: 900; color: var(--gray-5); display: block; line-height: 1; }
    .cal-day-name { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray-4); font-weight: 700; }
    
    .mini-card {
        margin: 10px 8px; padding: 12px; border-radius: 10px; 
        background: #fff; border: 1px solid #eee;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        position: relative; transition: all 0.2s;
    }
    .mini-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--gray-3); }
    
    /* Indicador lateral de tipo */
    .mini-card.entrada { border-left: 4px solid var(--red); }
    .mini-card.salida { border-left: 4px solid #1565c0; }

    .m-villa { font-family: 'Montserrat'; font-size: 11px; font-weight: 800; color: var(--gray-5); text-transform: uppercase; margin-bottom: 4px; line-height: 1.2; }
    .m-guest { display: block; font-size: 10px; color: var(--gray-4); margin-bottom: 8px; }

    /* Botones redondos L, W, C */
    .m-btns { display: flex; gap: 5px; }
    .m-btn {
        width: 26px; height: 26px; border-radius: 50%; 
        display: flex; align-items: center; justify-content: center;
        font-family: 'Montserrat'; font-size: 11px; font-weight: 900;
        text-decoration: none; border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .m-btn:hover { opacity: 0.8; }
    
    /* Colores botones Entrada (Rojos) */
    .entrada .btn-l { background: var(--red-light); color: var(--red); }
    .entrada .btn-w { background: var(--orange-light); color: var(--orange); }
    /* Colores botones Salida (Azules) */
    .salida .btn-c { background: #e3f2fd; color: #1565c0; }

    /* Estados de los botones (Iconos ✓ / ✗) */
    .status-icon { font-size: 8px; margin-right: 2px; }

    /* ESTILOS ORIGINALES RELLENO */
    #masFiltros{overflow:hidden;max-height:0;transition:max-height .3s ease}
    #masFiltros.open{max-height:400px}
    .f-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
    .f-input{height:36px;border:1.5px solid var(--gray-2);border-radius:7px;padding:0 10px;font-size:13px}
    #statsBar{display:none;background:#fff;border-bottom:1px solid var(--gray-2);padding:8px 22px;align-items:center;gap:20px;font-size:13px}

    @media(max-width: 900px){ #grid { grid-template-columns: repeat(7, 180px); } }
  </style>
  <script src="auth.js"></script>
</head>
<body>
<input type="hidden" id="mgrName">

<header>
  <div class="h-title">3VILLAS — E/S</div>
  <div class="logout-btn">👤 <span id="hUserName"></span></div>
</header>

<div id="filterPanel">
  <div class="main-bar">
    <div class="pill-group">
      <span class="pill-label">Check-in</span>
      <div class="pill-opts">
        <button class="pill-opt on" id="tAll" onclick="setToggle('all')">Todos</button>
        <button class="pill-opt" id="tPend" onclick="setToggle('pend')">Pend.</button>
      </div>
    </div>
    <div class="pill-group">
      <span class="pill-label">WP</span>
      <div class="pill-opts">
        <button class="pill-opt on" id="tWPall" onclick="setWPFilter('all')">Todos</button>
        <button class="pill-opt" id="tWPpend" onclick="setWPFilter('pending')">Pend.</button>
      </div>
    </div>
    <div class="pill-group">
      <span class="pill-label">Mostrar</span>
      <div class="pill-opts">
        <button class="pill-opt on" id="tTipo_both" onclick="setTipoFilter('both')">Todo</button>
        <button class="pill-opt" id="tTipo_entrada" onclick="setTipoFilter('entrada')">Ent.</button>
        <button class="pill-opt" id="tTipo_salida" onclick="setTipoFilter('salida')">Sal.</button>
      </div>
    </div>
    <div style="flex:1"></div>
    <button style="border:none; background:none; color:var(--gray-4); cursor:pointer" onclick="$('masFiltros').classList.toggle('open')">Filtros ▾</button>
  </div>

  <div id="masFiltros">
    <div style="padding:10px 0; border-top:1px solid #eee; display:flex; gap:10px; flex-wrap:wrap">
        <div class="f-group">
          <label class="f-label">Desde</label>
          <input type="date" id="fDesde" class="f-input" onchange="doSearch()">
        </div>
        <div class="f-group">
          <label class="f-label">Manager</label>
          <select id="fManager" class="f-input" onchange="doSearch()"><option value="">Cargando...</option></select>
        </div>
    </div>
  </div>
</div>

<div id="statsBar">
  <div><strong id="sCnt">0</strong> Movs.</div>
  <div><strong id="sPax">0</strong> Pax</div>
</div>

<main>
  <div id="grid"></div>
</main>

<script>
const CFG = {
  workerUrl: 'https://caspio-proxy.jordi-89b.workers.dev',
  viewName: 'Vi_villas_and_bookings2021'
};

const F = {
  confirmCode:'TaBookings2021_FS_confirmation_code',
  villaName:'TaVillas_Name_villa_para_inquilinos',
  guestName:'TaBookings2021_Guest_Full_Name',
  checkIn:'TaBookings2021_Checkin',
  checkOut:'TaBookings2021_Checkout',
  status:'TaBookings2021_BookingStatus',
  limpieza:'TaBookings2021_LimpiezaTerminada',
  wellcomePack:'TaBookings2021_Welcomepackentregado',
  cierre:'TaBookings2021_Checkoutcontrolado',
  adults:'TaBookings2021_Adults',
  children:'TaBookings2021_Children',
  checkinPend:'TaBookings2021_checkinonline_todo_terminado'
};

let toggleMode='all', fWelcomePack='all', tipoFilter='both';
const $=id=>document.getElementById(id);
const g = (r, key) => r[F[key]] ?? '';
const isOk = (val) => {
    if(val===null||val===undefined) return null;
    const s = String(val).toLowerCase();
    return !['0','x','no','false','pendiente'].includes(s);
};

// URLs de formularios originales
const getUrlLimpieza = (code) => `http://c1abn932.caspio.com/dp/353f70000ad4eac80ca64b2d82fa?Idreserva=${code}&Tasktype_booking=10`;
const getUrlWP = (code) => `task-wp.html?Idreserva=${code}&Tasktype_booking=20&code=${code}`;
const getUrlCierre = (code) => `https://c1abn932.caspio.com/dp/353f70001524a7e12ac54a758120?Idreserva=${code}&Tasktype_booking=30`;

window.addEventListener('DOMContentLoaded', async () => {
    $('fDesde').value = new Date().toISOString().split('T')[0];
    if(typeof Auth !== 'undefined') $('hUserName').textContent = Auth.name();
    await loadManagers();
    doSearch();
});

async function loadManagers(){
    const res = await fetch(Auth.url(`${CFG.workerUrl}?action=data&table=TaUsers&limit=100`));
    const json = await res.json();
    const sel = $('fManager');
    sel.innerHTML = '<option value="">Todos los Managers</option>';
    (json.Result||[]).filter(u => u.Keyholder_por_defecto).forEach(u => {
        sel.innerHTML += `<option value="${u.UserID}">${u.Name}</option>`;
    });
}

function setToggle(m){ toggleMode=m; updatePills('t', ['all','pend'], m); doSearch(); }
function setWPFilter(m){ fWelcomePack=m; updatePills('tWP', ['all','pending'], m); doSearch(); }
function setTipoFilter(m){ tipoFilter=m; updatePills('tTipo', ['both','entrada','salida'], m); doSearch(); }

function updatePills(pre, opts, val){
    opts.forEach(o => $(pre+'_'+o)?.classList.toggle('on', o===val));
}

async function doSearch(){
    const start = $('fDesde').value;
    const d = new Date(start + 'T00:00:00');
    d.setDate(d.getDate() + 6);
    const end = d.toISOString().split('T')[0];

    const grid = $('grid');
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px">Cargando...</div>';

    let where = `${F.status}<>'cancelled' AND ((${F.checkIn} >= '${start}T00:00:00' AND ${F.checkIn} <= '${end}T23:59:59') OR (${F.checkOut} >= '${start}T00:00:00' AND ${F.checkOut} <= '${end}T23:59:59'))`;
    
    const mgr = $('fManager').value;
    if(mgr) where += ` AND TaVillas_KeyHolder_person='${mgr}'`;

    try {
        const res = await fetch(Auth.url(`${CFG.workerUrl}?action=view&view=${encodeURIComponent(CFG.viewName)}&where=${encodeURIComponent(where)}&limit=500`));
        const json = await res.json();
        renderCalendar(start, json.Result || []);
    } catch(e) { grid.innerHTML = 'Error al cargar datos.'; }
}

function renderCalendar(startStr, records){
    const grid = $('grid');
    grid.innerHTML = '';
    const days = [];
    for(let i=0; i<7; i++){
        const d = new Date(startStr + 'T00:00:00');
        d.setDate(d.getDate() + i);
        days.push(d.toISOString().split('T')[0]);
    }

    const columnsMap = {};
    days.forEach(day => {
        const d = new Date(day + 'T00:00:00');
        const col = document.createElement('div');
        col.className = 'cal-column';
        col.innerHTML = `
            <div class="cal-header">
                <span class="cal-day-name">${d.toLocaleDateString('es-ES',{weekday:'short'})}</span>
                <span class="cal-day-num">${d.getDate()}</span>
            </div>
            <div id="day-${day}"></div>
        `;
        grid.appendChild(col);
        columnsMap[day] = col.querySelector(`#day-${day}`);
    });

    let count=0, pax=0;

    records.forEach(r => {
        const ci = (g(r,'checkIn')||'').split('T')[0];
        const co = (g(r,'checkOut')||'').split('T')[0];
        const code = g(r,'confirmCode');
        
        // Filtros adicionales
        if(fWelcomePack === 'pending' && isOk(g(r,'wellcomePack'))) return;
        if(toggleMode === 'pend' && Number(g(r,'checkinPend')) !== 3) return;

        // Pintar Entrada
        if(columnsMap[ci] && (tipoFilter==='both' || tipoFilter==='entrada')){
            columnsMap[ci].appendChild(createCard(r, 'entrada'));
            count++; pax += (parseInt(g(r,'adults'))||0) + (parseInt(g(r,'children'))||0);
        }
        // Pintar Salida
        if(columnsMap[co] && (tipoFilter==='both' || tipoFilter==='salida')){
            columnsMap[co].appendChild(createCard(r, 'salida'));
            if(tipoFilter==='salida') count++;
        }
    });

    $('sCnt').textContent = count;
    $('sPax').textContent = pax;
    $('statsBar').style.display = 'flex';
}

function createCard(r, type){
    const el = document.createElement('div');
    el.className = `mini-card ${type}`;
    const villa = g(r, 'villaName');
    const guest = g(r, 'guestName');
    const code = g(r, 'confirmCode');

    let btnsHtml = '';
    if(type === 'entrada'){
        const lOk = isOk(g(r,'limpieza'));
        const wOk = isOk(g(r,'wellcomePack'));
        btnsHtml = `
            <a href="${getUrlLimpieza(code)}" onclick="window.open(this.href,'_blank','width=600,height=800');return false;" class="m-btn btn-l" title="Limpieza">
                <span class="status-icon">${lOk?'✓':'✗'}</span>L
            </a>
            <a href="${getUrlWP(code)}" onclick="window.open(this.href,'_blank','width=600,height=800');return false;" class="m-btn btn-w" title="WelcomePack">
                <span class="status-icon">${wOk?'✓':'✗'}</span>W
            </a>
        `;
    } else {
        const cOk = isOk(g(r,'cierre'));
        btnsHtml = `
            <a href="${getUrlCierre(code)}" onclick="window.open(this.href,'_blank','width=600,height=800');return false;" class="m-btn btn-c" title="Cierre">
                <span class="status-icon">${cOk?'✓':'✗'}</span>C
            </a>
        `;
    }

    el.innerHTML = `
        <div class="m-villa">${villa}</div>
        <span class="m-guest">${guest}</span>
        <div class="m-btns">${btnsHtml}</div>
    `;
    return el;
}
</script>
</body>
</html>
