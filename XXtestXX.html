<style>
    /* Estilos específicos para la vista Multilisting */
    .villa-row {
        background: #fff;
        border-radius: var(--r);
        margin-bottom: 12px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--gray-2);
        overflow: hidden;
    }
    .villa-header {
        padding: 12px 16px;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--gray-2);
    }
    .villa-info { display: flex; align-items: center; gap: 12px; }
    .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
    }
    .res-container {
        display: flex;
        flex-direction: column;
        padding: 8px;
        gap: 8px;
        background: #fff;
    }
    /* Timeline de reserva compacta */
    .res-strip {
        display: grid;
        grid-template-columns: 100px 1fr auto;
        align-items: center;
        padding: 10px 14px;
        border-radius: 8px;
        background: var(--gray-1);
        border: 1px solid var(--gray-2);
        gap: 15px;
    }
    .res-strip.current { border-left: 4px solid var(--red); background: var(--red-light); }
    .res-dates { font-family: 'Montserrat'; font-size: 11px; font-weight: 700; color: var(--gray-5); }
    .res-guest { font-weight: 600; font-size: 13px; }
    .res-type-tag {
        font-size: 9px;
        font-weight: 800;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
    }
    /* Colores por tipo de evento en el rango */
    .tag-ocupada { background: var(--red); color: #fff; }
    .tag-entrada { background: var(--green); color: #fff; }
    .tag-salida { background: var(--orange); color: #fff; }
    .tag-libre { background: var(--gray-3); color: #fff; }

    .date-range-display {
        font-size: 11px;
        color: var(--gray-4);
        font-weight: 600;
    }
</style>

<main>
    <div id="stInit" class="state-box">
        <div style="font-size:42px;margin-bottom:12px">🗓️</div>
        <p style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px">Generando vista de calendario...</p>
    </div>
    <div id="stLoad" class="state-box" style="display:none">
        <div class="spinner"></div><p>Sincronizando disponibilidad...</p>
    </div>
    <div id="grid-multilisting"></div>
</main>

<script>
// ... (Mantener CFG, F y funciones de utilidad anteriores) ...

async function doSearch() {
    const mySearchId = ++_searchId;
    renderChips();
    
    const grid = $('grid-multilisting');
    grid.innerHTML = '';
    $('stInit').style.display = 'none';
    $('stLoad').style.display = 'block';

    const fDesde = $('fDesde').value;
    const fHasta = $('fHasta').value;
    const where = buildWhere(); // Usamos la lógica de solapamiento que ya teníamos

    try {
        const res = await fetch(Auth.url(`${CFG.workerUrl}?action=view&view=${encodeURIComponent(CFG.viewName)}&where=${encodeURIComponent(where)}&orderBy=${encodeURIComponent(F.villaName)}`));
        const json = await res.json();
        const bookings = json.Result || [];

        // Agrupar por Villa
        const dataByVilla = new Map();
        
        // Inicializar con todas las villas que conocemos (para el total)
        masterVillasMap.forEach((v, id) => {
            dataByVilla.set(id, { info: v, bookings: [] });
        });

        // Llenar con las reservas encontradas
        bookings.forEach(b => {
            const vId = String(b[F.villaId]);
            if(dataByVilla.has(vId)) {
                dataByVilla.get(vId).bookings.push(b);
            }
        });

        renderMultilisting(dataByVilla, fDesde, fHasta);
    } catch (err) {
        console.error(err);
    } finally {
        $('stLoad').style.display = 'none';
    }
}

function renderMultilisting(dataMap, d1, d2) {
    const grid = $('grid-multilisting');
    let html = '';
    
    // Convertir fechas de filtro a milisegundos para comparar
    const startFilter = new Date(d1 + 'T00:00:00').getTime();
    const endFilter = new Date(d2 + 'T23:59:59').getTime();

    // Ordenar villas alfabéticamente
    const sortedVillas = [...dataMap.values()].sort((a,b) => a.info.name.localeCompare(b.info.name));

    sortedVillas.forEach(v => {
        // Filtrar por Manager si aplica
        if (selectedManagers.size > 0 && !selectedManagers.has(v.info.manager)) return;
        
        // 1. Determinar Estado Global de la Villa en este rango
        let villaStatus = 'LIBRE';
        let statusClass = 'tag-libre';
        
        v.bookings.sort((a,b) => new Date(g(a,'checkIn')) - new Date(g(b,'checkIn')));

        const hasCheckIn = v.bookings.some(b => fmtDate(g(b,'checkIn')) === fmtDate(d1));
        const hasCheckOut = v.bookings.some(b => fmtDate(g(b,'checkOut')) === fmtDate(d1));
        const isOcupada = v.bookings.some(b => {
            const bIn = new Date(g(b,'checkIn')).getTime();
            const bOut = new Date(g(b,'checkOut')).getTime();
            return (startFilter >= bIn && startFilter < bOut);
        });

        if (isOcupada) { villaStatus = 'OCUPADA'; statusClass = 'tag-ocupada'; }
        else if (hasCheckIn) { villaStatus = 'ENTRADA'; statusClass = 'tag-entrada'; }
        else if (hasCheckOut) { villaStatus = 'SALIDA'; statusClass = 'tag-salida'; }

        // Si el filtro de ocupación está activo, saltar si no coincide
        if (fOcupacion === 'ocup' && villaStatus === 'LIBRE') return;
        if (fOcupacion === 'disp' && villaStatus !== 'LIBRE') return;

        // Construir HTML de la fila
        let villaHtml = `
            <div class="villa-row">
                <div class="villa-header">
                    <div class="villa-info">
                        <span class="res-type-tag ${statusClass}">${villaStatus}</span>
                        <div class="villa-name">${v.info.name}</div>
                    </div>
                    <div class="date-range-display">Rango: ${fmtShort(d1)} - ${fmtShort(d2)}</div>
                </div>
                <div class="res-container">
        `;

        if (v.bookings.length === 0) {
            villaHtml += `<div style="padding:10px; font-size:12px; color:var(--gray-3); text-align:center">Sin movimientos en este periodo</div>`;
        } else {
            v.bookings.forEach(b => {
                const isCurrent = (new Date(g(b,'checkIn')).getTime() <= endFilter && new Date(g(b,'checkOut')).getTime() >= startFilter);
                villaHtml += `
                    <div class="res-strip ${isCurrent ? 'current' : ''}">
                        <div class="res-dates">
                            ${fmtShort(g(b,'checkIn'))} <br> ${fmtShort(g(b,'checkOut'))}
                        </div>
                        <div class="res-guest">
                            <div style="font-size:10px; color:var(--red); font-weight:800">#${g(b,'confirmCode')}</div>
                            ${g(b,'guestName') || 'Reserva'}
                        </div>
                        <div>
                            <button class="lnk-k" style="padding:4px 8px; border-radius:4px" onclick="toggleCardBody('cb_${g(b,'reservationId')}')">Detalles</button>
                        </div>
                    </div>
                `;
            });
        }

        villaHtml += `</div></div>`;
        html += villaHtml;
    });

    grid.innerHTML = html || '<div class="empty">No se encontraron villas con los criterios seleccionados</div>';
}
</script>
