  <!-- v18: eliminado el registro del Service Worker /3villas-manuals/sw.js.
       Era un resto de los manuales: auth.js lo DESINSTALA activamente porque intercepta
       peticiones incorrectamente, y esta línea lo volvía a registrar en cada carga.
       Un SW roto puede retener las respuestas de los fetch (el guardado se completa en
       la red pero el JS de la página nunca recibe la señal → "Guardando..." eterno). -->
  <title>WelcomePack v20 — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;--green:#1e9e4e;--green-light:#e6f7ee;--gray-1:#f4f5f7;--gray-2:#e8eaed;--gray-3:#c4c9d4;--gray-4:#7a8194;--gray-5:#2d3142;--orange:#e07b00;--r:14px;--shadow:0 4px 18px rgba(0,0,0,.12)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}

    /* ── Nav compacta blanca — sin botón menú — v06 ── */
    .wp-nav{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#fff;border-bottom:1.5px solid var(--gray-2);box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:100}
    .wp-nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
    .wp-nav-logo img{height:26px;object-fit:contain}
    .wp-nav-center{flex:1;min-width:0;padding:0 6px}
    .wp-nav-title{font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;color:var(--gray-5);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wp-nav-sub{font-size:11px;color:var(--gray-4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wp-nav-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .wp-task-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:4px 10px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;background:var(--gray-1);border:1.5px solid var(--gray-2);color:var(--gray-5)}
    .wp-debug-btn{background:var(--gray-1);border:1.5px solid var(--gray-2);color:var(--gray-4);font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;flex-shrink:0}
    .wp-nav-close{display:flex;align-items:center;justify-content:center;background:rgba(200,16,46,.1);border:1.5px solid rgba(200,16,46,.2);color:var(--red);width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:900;cursor:pointer;transition:background .15s;flex-shrink:0}
    .wp-nav-close:hover{background:rgba(200,16,46,.2)}

    main{padding:16px;max-width:500px;margin:0 auto}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-4);padding:12px 16px 8px;border-bottom:1px solid var(--gray-2)}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s}
    .toggle-row:not(:last-child){border-bottom:1px solid var(--gray-2)}
    .toggle-row:active{background:var(--gray-1)}
    .toggle-label{font-size:14px;font-weight:500;color:var(--gray-5);flex:1;padding-right:12px;line-height:1.3}
    .toggle-sub{font-size:11px;color:var(--gray-4);margin-top:2px}
    .switch{position:relative;width:50px;height:28px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0;position:absolute}
    .slider{position:absolute;inset:0;background:var(--gray-3);border-radius:28px;transition:background .2s;cursor:pointer}
    .slider::before{content:'';position:absolute;height:22px;width:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    input:checked + .slider{background:var(--green)}
    input:checked + .slider::before{transform:translateX(22px)}
    .photo-wrap{padding:14px 16px}
    .photo-slot{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;transition:all .2s}
    .photo-slot.empty{background:var(--gray-1);border:2px dashed var(--gray-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
    .photo-slot.empty:hover{border-color:var(--red);background:var(--red-light)}
    .ps-num{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;color:var(--gray-3)}
    .ps-btns{display:flex;gap:5px}
    .ps-btn{background:#fff;border:1.5px solid var(--gray-2);border-radius:8px;padding:7px 11px;font-size:18px;cursor:pointer;line-height:1;transition:all .15s}
    .ps-btn:hover{border-color:var(--red);background:var(--red-light)}
    .pt-del{position:absolute;top:4px;right:4px;background:rgba(200,16,46,.85);color:#fff;border:none;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif}
    .photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .photo-btn{height:44px;border-radius:10px;border:1.5px solid var(--gray-2);background:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gray-5);transition:all .15s}
    .photo-btn:active{background:var(--gray-1)}
    .photo-btn.primary{background:var(--red);color:#fff;border-color:var(--red)}
    .photo-btn.primary:active{background:var(--red-dark)}
    #fileInput{display:none}#cameraInput{display:none}
    .photo-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:28px;height:28px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(4px)}
    .comments-wrap{padding:14px 16px}
    .comments-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-4);margin-bottom:8px;display:block}
    textarea{width:100%;height:90px;border:1.5px solid var(--gray-2);border-radius:10px;padding:10px 12px;font-family:'Open Sans',sans-serif;font-size:14px;color:var(--gray-5);resize:none;outline:none;transition:border-color .15s}
    textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.08)}
    textarea::placeholder{color:var(--gray-3)}
    .save-wrap{padding:6px 0 20px}
    .photo-required-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-light);color:var(--red);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;text-transform:uppercase;letter-spacing:.4px}
    .photo-slot.slot-error{border-color:var(--red)!important;border-style:solid!important;animation:shake-slot .4s}
    @keyframes shake-slot{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .btn-todo-ok{width:100%;height:60px;background:linear-gradient(135deg,#1967d2,#1251b0);color:#fff;border:none;border-radius:14px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;letter-spacing:.3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 16px rgba(25,103,210,.4);margin-bottom:10px}
    .btn-todo-ok:active{transform:scale(.98);opacity:.9}
    .btn-todo-ok:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed}
    .btn-todo-ok    .save-label-sub{font-size:10px;opacity:.7;display:block;font-weight:600;margin-top:1px}
    .btn-save{width:100%;height:54px;background:var(--green);color:#fff;border:none;border-radius:14px;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;box-shadow:0 4px 14px rgba(30,158,78,.35)}
    .btn-save:active{background:#17834a;transform:scale(.98)}
    .btn-save:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed}
    .btn-save    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d3142;color:#fff;padding:12px 22px;border-radius:30px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}
    #loadOverlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px}
    .load-spinner{width:40px;height:40px;border:3px solid var(--gray-2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    .load-text{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--gray-4)}
    .error-state{text-align:center;padding:50px 20px}
    .error-state .emoji{font-size:50px;margin-bottom:12px}
    .error-state h3{font-family:'Montserrat',sans-serif;font-size:18px;margin-bottom:8px}
    .error-state p{font-size:13px;color:var(--gray-4)}

<script>
const WORKER='https://caspio-proxy.jordi-89b.workers.dev';
const params=new URLSearchParams(location.search);
const idReserva=params.get('Idreserva')||params.get('idreserva')||'';
const taskType=params.get('Tasktype_booking')||'20';
const code=params.get('code')||'';
const TASK_CONFIG={'10':{label:'🧹 Limpieza',badge:'🧹 Limpieza',color:'#1565c0'},'20':{label:'📦 WelcomePack',badge:'📦 WelcomePack',color:'#e07b00'},'30':{label:'🔒 Cierre',badge:'🔒 Cierre',color:'#5e35b1'}};
const cfg=TASK_CONFIG[taskType]||TASK_CONFIG['20'];
let selectedPhoto=null,currentPhotoObjectUrl=null,taskRecordId=undefined;

const STATE_KEY='wp_state_'+idReserva+'_'+taskType;
const MAX_STATE_AGE_MS=5*60*1000;

function saveState(){
  const elAgua=document.getElementById('swAgua'),elWifi=document.getElementById('swWifi'),elDone=document.getElementById('swDone'),elTxt=document.getElementById('txtComentarios');
  if(!elAgua)return;
  try{sessionStorage.setItem(STATE_KEY,JSON.stringify({ts:Date.now(),agua:elAgua.checked,wifi:elWifi.checked,done:elDone.checked,txt:elTxt?elTxt.value:''}));}catch(e){}
}
function restoreStateIfRecent(){
  try{const raw=sessionStorage.getItem(STATE_KEY);if(!raw)return;const s=JSON.parse(raw);if(Date.now()-s.ts>MAX_STATE_AGE_MS)return;$sw('swAgua',s.agua);$sw('swWifi',s.wifi);$sw('swDone',s.done);const t=document.getElementById('txtComentarios');if(t)t.value=s.txt||'';onSwDoneChange();}catch(e){}
}
function clearState(){try{sessionStorage.removeItem(STATE_KEY);}catch(e){}}

document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')restoreStateIfRecent();});
window.addEventListener('pageshow',function(e){if(e.persisted)restoreStateIfRecent();});

function initAutoSave(){
  ['swAgua','swWifi','swDone'].forEach(function(id){const el=document.getElementById(id);if(el)el.addEventListener('change',saveState);});
  const txt=document.getElementById('txtComentarios');if(txt)txt.addEventListener('input',saveState);
}

document.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('hTaskBadge').textContent=cfg.badge;
  if(!idReserva){showError('Faltan parámetros en la URL.<br>Usa el botón desde Entradas y Salidas.');return;}
  try{
    await Promise.allSettled([loadBooking(),loadTask()]);
    restoreStateIfRecent();
    initAutoSave();
    hide('loadOverlay');show('mainContent');
  }catch(e){showError('Error al cargar: '+e.message);}
});



async function loadBooking(){} /* v09: fusionado en loadTask */
async function loadTask(){
  /* v09: Vi_Tasks_Booking_Villa — 1 llamada para tarea + reserva + villa */
  const where=`TaTasks_Idreserva='${idReserva}' AND TaTasks_Tasktype_booking=${parseInt(taskType)}`;
  const url=Auth.url(`${WORKER}?action=view&view=Vi_Tasks_Booking_Villa&where=${encodeURIComponent(where)}&limit=1`);
  const res=await fetch(url);const json=await res.json();
  const r=(json.Result||json.result||[])[0];window.__taskDebug=r;
  if(!r)return;
  /* v14: si la vista trae el ID de TaTasks, lo guardamos para saber si ya existe sin repetir la consulta en guardar().
     Si el campo no viene en la vista (nombre distinto), queda undefined y guardar() usa el método anterior — sin riesgo. */
  const _tid=r['TaTasks_taskid']??r['TaTasks_Taskid']??r['TaTasks_TaskID'];
  taskRecordId=(_tid!==undefined&&_tid!==null&&_tid!=='')?_tid:undefined;
  /* Datos reserva */
  const villaName=r['TaVillas_Name_villa_para_inquilinos']||r['TaBookings2021_FS_confirmation_code']||`Reserva ${idReserva}`;
  document.getElementById('hVilla').textContent=villaName;
  document.getElementById('hRes').textContent=`Reserva: ${r['TaBookings2021_FS_confirmation_code']||idReserva}`;
  /* Datos tarea */
  if(r['TaTasks_Tarea_terminada']!==undefined)$sw('swDone',r['TaTasks_Tarea_terminada']);
  if(r['TaTasks_Limpieza_filtrolavaplatos']!==undefined)$sw('swAgua',r['TaTasks_Limpieza_filtrolavaplatos']);
  if(r['TaTasks_Limpieza_salyabrillan_lavaplatos']!==undefined)$sw('swWifi',r['TaTasks_Limpieza_salyabrillan_lavaplatos']==='Y');
  if(r['TaTasks_Taskdescription'])document.getElementById('txtComentarios').value=r['TaTasks_Taskdescription'];
  const r2Url=r['TaTasks_Picture_cloudfare1'];
  if(r2Url&&r2Url.startsWith('http')){showPhotoPreview(r2Url);}
  const wpStatus=r['TaBookings2021_Welcomepackentregado'];
  if(typeof wpStatus!=='undefined'){$sw('swDone',wpStatus);onSwDoneChange();}
}

function $sw(id,val){const el=document.getElementById(id);if(!el)return;if(typeof val==='boolean')el.checked=val;else el.checked=val===true||val===1||val===-1||String(val)==='1';}
function sw(id){return document.getElementById(id)?.checked||false;}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}
function show(id){const el=document.getElementById(id);if(el)el.style.display='';}

function openCamera(){saveState();document.getElementById('cameraInput').value='';document.getElementById('cameraInput').click();}
function openGallery(){saveState();document.getElementById('fileInput').value='';document.getElementById('fileInput').click();}
function handlePhotoAreaClick(){if(!selectedPhoto)openGallery();}

function compressImage(file,maxPx,quality){
  maxPx=maxPx||1100;quality=quality||0.75;
  return new Promise(function(resolve){
    if(file.size<300*1024){resolve(file);return;}
    var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>=h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(function(blob){
        resolve(blob?new File([blob],file.name,{type:'image/jpeg',lastModified:Date.now()}):file);
      },'image/jpeg',quality);
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}
/* v09: upload state para pre-subida */
let _wpUpload={status:'idle',url:'',promise:null};
function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  compressImage(file,1100,0.75).then(function(compressed){
    selectedPhoto=compressed;
    _wpUpload={status:'uploading',url:'',promise:null};
    /* v14: Blob URL en vez de base64 — vista previa instantánea, sin esperar a FileReader */
    if(currentPhotoObjectUrl){URL.revokeObjectURL(currentPhotoObjectUrl);}
    currentPhotoObjectUrl=URL.createObjectURL(compressed);
    showPhotoPreview(currentPhotoObjectUrl);
    markWPDone();saveState();
    /* Pre-subida en background — arranca ya, en paralelo a la vista previa */
    _wpUpload.promise=_doUploadWP(compressed).then(function(url){
      _wpUpload.status=url?'done':'error';
      _wpUpload.url=url||'';
    });
  });
}
/* v15: timeout genérico para fetch — evita que guardar() se quede colgado indefinidamente.
   v18: blindado con Promise.race — el temporizador gana SIEMPRE, incluso si la promesa
   del fetch nunca se resuelve (p.ej. interceptada por un Service Worker defectuoso).
   Antes dependía de que el AbortError se propagara de vuelta, y eso puede no ocurrir.
   Sin reintento automático (a diferencia de la foto): reintentar un POST a ciegas
   podría crear un registro duplicado si el primer intento sí llegó al servidor. */
async function fetchWithTimeout(url,options,timeoutMs,label){
  timeoutMs=timeoutMs||25000;
  const controller=new AbortController();
  let timeoutId;
  const timeoutPromise=new Promise((_,reject)=>{
    timeoutId=setTimeout(()=>{
      controller.abort();
      reject(new Error((label||'La operación')+' ha tardado demasiado (posible problema de conexión)'));
    },timeoutMs);
  });
  try{
    return await Promise.race([
      fetch(url,Object.assign({},options,{signal:controller.signal})),
      timeoutPromise
    ]);
  }catch(e){
    if(e.name==='AbortError')throw new Error((label||'La operación')+' ha tardado demasiado (posible problema de conexión)');
    throw e;
  }finally{
    clearTimeout(timeoutId);
  }
}
const WP_UPLOAD_TIMEOUT_MS=25000;
function _uploadOnceWP(file){
  const fd=new FormData();
  const year=(new Date().getFullYear());
  const fname='fotos-tareas/'+year+'_wp_'+idReserva+'.jpg';
  fd.append('file',file,fname);fd.append('filename',fname);
  /* v18: reutiliza fetchWithTimeout (blindado con Promise.race) en vez de AbortController suelto */
  return fetchWithTimeout(Auth.url(`${WORKER}?action=upload`),{method:'POST',body:fd},WP_UPLOAD_TIMEOUT_MS,'La subida de la foto')
    .then(r=>r.json())
    .then(j=>j.url||j.publicUrl||'');
}
/* v13: timeout 25s + 1 reintento automático; nunca cuelga guardar() indefinidamente */
async function _doUploadWP(file){
  try{
    const url=await _uploadOnceWP(file);
    if(url)return url;
    throw new Error('Respuesta sin URL');
  }catch(e1){
    console.warn('Subida de foto falló, reintentando:',e1.message);
    try{
      const url2=await _uploadOnceWP(file);
      if(url2)return url2;
      throw new Error('Respuesta sin URL en reintento');
    }catch(e2){
      console.error('Subida de foto falló tras reintento:',e2.message);
      toast('⚠️ No se pudo subir la foto (conexión lenta). La tarea se guardará y podrás reintentar la foto más tarde.','error');
      return '';
    }
  }
}

/* v19: función toast que faltaba — se llamaba en 4 sitios pero no estaba definida
   (se perdió en alguna versión antigua, igual que compressImage en v10/v11).
   Al no existir, el guardado terminaba bien pero explotaba justo al intentar mostrar
   "✓ Guardado correctamente", dejando el botón congelado en "Guardando..." para siempre.
   Autocontenida con estilos inline (lo crítico va embebido). */
let _toastTimer=null;
function toast(msg,type){
  let el=document.getElementById('toast3v');
  if(!el){
    el=document.createElement('div');
    el.id='toast3v';
    el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:90%;padding:12px 18px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:99999;text-align:center;opacity:0;transition:opacity .25s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.style.background=(type==='error')?'#d9534f':(type==='success')?'#2e9e5b':'#444';
  el.textContent=msg;
  el.style.opacity='1';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.style.opacity='0';},(type==='error')?5000:3000);
}

async function guardar(fromTodoOk){
  if(!fotoPresente()){fotoError();return;}
  const btn=document.getElementById('btnSave'),lbl=document.getElementById('saveLabel'),sp=document.getElementById('saveSpinner'),btnOk=document.getElementById('btnTodoOk');
  btn.disabled=true;if(btnOk)btnOk.disabled=true;
  lbl.textContent='Guardando...';sp.style.display='block';
  /* v17: instrumentación temporal de tiempos — solo diagnóstico, no cambia el comportamiento.
     Ayuda a ver en la consola del navegador exactamente qué paso tarda más de un minuto. */
  const _t0=performance.now();
  const _tlog=(label)=>console.log('[guardar] '+label+': '+((performance.now()-_t0)/1000).toFixed(1)+'s');
  try{
    const data={Idreserva:idReserva,Tasktype_booking:taskType,Tarea_terminada:sw('swDone'),Limpieza_filtrolavaplatos:sw('swAgua'),Limpieza_salyabrillan_lavaplatos:sw('swWifi')?'Y':'',Taskdescription:document.getElementById('txtComentarios').value.trim(),Taskname:'WelcomePack'};
    _tlog('inicio');
    if(selectedPhoto){try{const uploadUrl=await uploadPhoto(selectedPhoto,idReserva,taskType);if(uploadUrl){
      /* v20: rompe-caché — la foto se sube siempre al MISMO nombre de archivo en R2, así que la URL
         era idéntica a la anterior y el navegador/CDN de Cloudflare mostraban la imagen vieja cacheada
         aunque el archivo nuevo sí se hubiera subido. El parámetro ?v=timestamp fuerza descarga fresca. */
      data['Picture_cloudfare1']=uploadUrl+(uploadUrl.includes('?')?'&':'?')+'v='+Date.now();
    }}catch(eUp){console.warn('Photo upload skipped:',eUp.message);}}
    _tlog('foto subida (o sin foto nueva)');
    const whereCheck=`Idreserva='${idReserva}' AND Tasktype_booking=${parseInt(taskType)}`;
    let exists;
    if(taskRecordId!==undefined){
      /* v14: ya sabemos por la carga inicial (Vi_Tasks_Booking_Villa) si el registro existe — sin fetch extra */
      exists=true;
      _tlog('existencia conocida por carga inicial (sin fetch)');
    }else{
      /* Fallback: la vista no traía el ID de TaTasks, se comprueba como antes.
         v15: con timeout — sin esto podía quedarse colgado indefinidamente si la red fallaba */
      const checkUrl=Auth.url(`${WORKER}?action=data&table=TaTasks&where=${encodeURIComponent(whereCheck)}&limit=1`);
      const checkRes=await fetchWithTimeout(checkUrl,{},25000,'La comprobación de la tarea');
      const checkJson=await checkRes.json();
      exists=(checkJson.Result||checkJson.result||[]).length>0;
      _tlog('comprobación de existencia (fetch)');
    }
    const saveQs=exists?`action=save&table=TaTasks&where=${encodeURIComponent(whereCheck)}&method=PUT`:`action=save&table=TaTasks&method=POST`;
    const saveUrl=Auth.url(`${WORKER}?${saveQs}`);
    /* v14: TaTasks y TaBookings2021 son tablas independientes — se guardan en paralelo
       v15: con timeout de 25s en ambas — sin reintento automático (un POST repetido a ciegas
       podría crear un registro duplicado si el primer intento sí llegó al servidor pero la
       respuesta no volvió al cliente). Si salta el timeout, se avisa y el usuario puede pulsar
       Guardar de nuevo: en ese reintento manual se vuelve a comprobar si ya existe, así que
       hará PUT en vez de duplicar. */
    const wpDone=sw('swDone');
    const bkWhere=`FS_confirmation_code='${idReserva}'`;
    const bkSaveUrl=Auth.url(`${WORKER}?action=save&table=TaBookings2021&where=${encodeURIComponent(bkWhere)}&method=PUT`);
    const [saveRes]=await Promise.all([
      fetchWithTimeout(saveUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)},25000,'El guardado de la tarea'),
      fetchWithTimeout(bkSaveUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Welcomepackentregado:wpDone})},25000,'La actualización de la reserva').catch(eBk=>{console.warn('No se pudo actualizar TaBookings2021:',eBk.message);return null;})
    ]);
    _tlog('guardado TaTasks + TaBookings2021 (Promise.all)');
    if(!saveRes.ok){const err=await saveRes.text();throw new Error(err);}
    clearState();
    _tlog('COMPLETADO con éxito');
    toast('✓ Guardado correctamente','success');
    btn.disabled=false;lbl.textContent='✓ GUARDADO';btn.style.background='var(--green)';
    setTimeout(()=>{try{window.close();}catch(e){history.back();}},800);
  }catch(e){
    _tlog('ERROR/EXCEPCIÓN: '+e.message);
    console.error('Save error:',e);
    toast('Error al guardar: '+e.message,'error');
    btn.disabled=false;lbl.textContent='💾 Guardar';sp.style.display='none';
    if(btnOk)btnOk.disabled=false;
  }
}

async function uploadPhoto(file,idRes,taskType){
  /* v09: usar URL pre-subida si ya está lista */
  if(_wpUpload.status==='done'&&_wpUpload.url)return _wpUpload.url;
  if(_wpUpload.status==='uploading'&&_wpUpload.promise){
    /* v16: fix — _wpUpload.promise ya incluye su propio reintento (25s+25s).
       Esperamos a que termine y leemos el resultado en el estado; si falló, NO
       relanzamos otro _doUploadWP encima: eso podía sumar hasta 100s (4 intentos)
       solo para la foto antes de guardar. */
    await _wpUpload.promise;
    return (_wpUpload.status==='done'&&_wpUpload.url)?_wpUpload.url:'';
  }
  if(_wpUpload.status==='error'){
    /* Ya se intentó en segundo plano y falló tras reintentar — no insistir más */
    return '';
  }
  /* fallback: no había pre-subida en curso (p.ej. foto ya existente cargada), subir ahora */
  return _doUploadWP(file);
}

function closeLB(){var o=document.getElementById('lbOverlay');if(o)o.classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLB();});

ralelo, sin esperar a FileReader); (2) evita la consulta duplicada de existencia de TaTasks en guardar() reutilizando el ID ya cargado por Vi_Tasks_Booking_Villa si está disponible (fallback seguro a la consulta anterior si el campo no viene en la vista); (3) TaTasks y TaBookings2021 se guardan en paralelo con Promise.all en vez de secuencialmente; (4) compresión de foto reducida de 1200px/0.80 a 1100px/0.75 para subidas más rápidas | v13 - Fix bloqueo "se queda guardando" al subir foto: timeout 25s + 1 reintento automático en _doUploadWP (AbortController), nunca cuelga indefinidamente; aviso al usuario si falla tras reintento; fix uploadRes.url (uploadPhoto devuelve string, no objeto) para que la foto se guarde correctamente; corregido desfase de versión en comentario cabecera (v9→v13) | v12 - Fix: compressImage no estaba definida (se perdió en v10/v11), foto no se cargaba |  v11 - Fix botón cerrar (history.back en lugar de window.close) |  v10 - Fix: openLB/closeLB faltaban en el script principal | v09 - Vi_Tasks_Booking_Villa (1 fetch vs 2); compressImage; pre-subida background; uploadPhoto cached |  v08 - Lightbox fotos con botón ✕; compressImage 1200px/80% |  v9 - Spinner corazón 3Villas embebido en CSS inline (sin archivo externo) | v8 - Eliminado CSS inline .spinner/.spin — ahora spinner.css y spinner-sm.css tienen prioridad | v7 - versión anterior -->
