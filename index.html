<html lang="es">
<head>

  <title>Menú — 3Villas v04</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;
      --green:#1e9e4e;--green-light:#e6f7ee;
      --orange:#e07b00;--orange-light:#fff4e0;
      --blue:#1967d2;--blue-light:#e8f0fe;
      --gray-1:#f8f9fa;--gray-2:#eaecef;--gray-3:#c8cdd8;
      --gray-4:#7a8194;--gray-5:#2d3142;
      --shadow-xs:0 1px 3px rgba(0,0,0,.07);
      --shadow-sm:0 2px 8px rgba(0,0,0,.08);
      --shadow-md:0 4px 16px rgba(0,0,0,.11);
      --r:14px;--r-sm:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh;padding-bottom:76px}

    /* ══ NAV — igual que buscar-villa ══ */
    nav.top-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 20px;background:#fff;
      border-bottom:1px solid var(--gray-2);
      box-shadow:var(--shadow-xs);
      position:sticky;top:0;z-index:100;
    }
    .nav-logo{display:flex;align-items:center;text-decoration:none}
    .nav-menu{
      display:flex;align-items:center;justify-content:center;
      background:var(--red);border:none;color:#fff;
      width:34px;height:34px;border-radius:8px;
      text-decoration:none;font-size:18px;transition:background .15s;
    }
    .nav-menu:hover{background:var(--red-dark)}

    /* ══ HERO ══ */
    .hero{text-align:center;padding:36px 20px 20px}
    .hero-icon{margin-bottom:12px}
    .hero-icon img{width:64px;height:64px;object-fit:contain}
    .hero-title{font-family:Montserrat,sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;color:var(--red);margin-bottom:4px}
    .hero-sub{font-size:13px;color:var(--gray-4)}

    /* ══ MAIN CARD — igual que buscar-villa ══ */
    .main-wrap{max-width:480px;margin:0 auto 40px;padding:0 16px}
    .main-card{
      background:#fff;border-radius:16px;
      box-shadow:0 6px 24px rgba(0,0,0,.09);
      overflow:hidden;border-top:3px solid var(--red);
      padding:20px;
      display:flex;flex-direction:column;gap:10px;
    }

    /* ══ BOTONES DE MENÚ ══ */
    .menu-btn{
      display:flex;align-items:center;gap:16px;
      padding:16px 20px;border-radius:var(--r-sm);
      text-decoration:none;color:var(--gray-5);
      border:1.5px solid var(--gray-2);background:#fff;
      transition:all .15s;cursor:pointer;
      font-family:'Open Sans',sans-serif;
    }
    .menu-btn:hover{border-color:var(--red);box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .menu-btn:active{transform:scale(.98)}
    .mb-ico{
      width:44px;height:44px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .mb-info{flex:1}
    .mb-title{font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:.2px;margin-bottom:2px}
    .mb-sub{font-size:11px;color:var(--gray-4)}
    .mb-arrow{font-size:20px;color:var(--gray-3);flex-shrink:0}
    .menu-btn:hover .mb-arrow{color:var(--red)}

    /* Colores por sección */
    .mb-red  .mb-ico{background:var(--red-light);color:var(--red)}
    .mb-red:hover{border-color:var(--red)}
    .mb-red .mb-title{color:var(--red)}

    .mb-blue .mb-ico{background:var(--blue-light);color:var(--blue)}
    .mb-blue:hover{border-color:var(--blue)}
    .mb-blue .mb-title{color:var(--blue)}

    .mb-green .mb-ico{background:var(--green-light);color:var(--green)}
    .mb-green:hover{border-color:var(--green)}
    .mb-green .mb-title{color:var(--green)}

    .mb-orange .mb-ico{background:var(--orange-light);color:var(--orange)}
    .mb-orange:hover{border-color:var(--orange)}
    .mb-orange .mb-title{color:var(--orange)}

    .mb-gray .mb-ico{background:var(--gray-2);color:var(--gray-4)}
    .mb-gray:hover{border-color:var(--gray-3)}
    .mb-gray .mb-title{color:var(--gray-5)}

    /* divider */
    .menu-divider{height:1px;background:var(--gray-2);margin:4px 0}


    /* ══ BOTTOM NAV ══ */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:#fff;border-top:1.5px solid var(--gray-2);
      box-shadow:0 -4px 20px rgba(0,0,0,.08);
      display:flex;align-items:stretch;
      padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .bn-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 4px 8px;text-decoration:none;color:var(--gray-4);
      font-family:Montserrat,sans-serif;font-size:9px;font-weight:800;
      text-transform:uppercase;letter-spacing:.4px;
      transition:color .15s,background .15s;cursor:pointer;
      border:none;background:none;
      position:relative;
    }
    .bn-item:hover,.bn-item.active{color:var(--red)}
    .bn-item.active::after{
      content:'';position:absolute;top:0;left:20%;right:20%;
      height:2.5px;background:var(--red);border-radius:0 0 3px 3px;
    }
    .bn-item svg{flex-shrink:0}
    /* Separador intranet */
    .bn-sep{width:1px;background:var(--gray-2);margin:10px 0;flex-shrink:0}
    /* ══ USER PILL ══ */
    .user-row{text-align:center;margin-top:4px;padding-bottom:8px}
    .user-pill{display:inline-flex;align-items:center;gap:6px;background:var(--gray-1);border:1.5px solid var(--gray-2);border-radius:20px;padding:5px 14px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:var(--gray-4)}
    .user-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

    /* ══ BOTTOM NAV ══ */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:#fff;border-top:1.5px solid var(--gray-2);
      box-shadow:0 -4px 20px rgba(0,0,0,.08);
      display:flex;align-items:stretch;
      padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .bn-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 4px 8px;text-decoration:none;color:var(--gray-4);
      font-family:Montserrat,sans-serif;font-size:9px;font-weight:800;
      text-transform:uppercase;letter-spacing:.4px;
      transition:color .15s,background .15s;cursor:pointer;
      border:none;background:none;
      position:relative;
    }
    .bn-item:hover,.bn-item.active{color:var(--red)}
    .bn-item.active::after{
      content:'';position:absolute;top:0;left:20%;right:20%;
      height:2.5px;background:var(--red);border-radius:0 0 3px 3px;
    }
    .bn-item svg{flex-shrink:0}
    /* Separador intranet */
    .bn-sep{width:1px;background:var(--gray-2);margin:10px 0;flex-shrink:0}
  </style>
