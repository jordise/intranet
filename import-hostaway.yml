name: Importar Hostaway → Caspio

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Horas hacia atras (72 = 3 dias, 168 = 1 semana)"
        required: true
        default: "72"
      batch:
        description: "Registros por llamada (max 15)"
        required: true
        default: "15"

jobs:
  import:
    name: Importar reservas
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Ejecutar importacion en bucle"
        env:
          HOURS: ${{ github.event.inputs.hours }}
          BATCH: ${{ github.event.inputs.batch }}
        run: |
          node << 'EOF'
          const WORKER = 'https://importar-host-a-caspio-ultimas-3horas.jordi-89b.workers.dev/import';
          const HOURS  = process.env.HOURS || '72';
          const BATCH  = process.env.BATCH || '15';

          async function main() {
            let url = `${WORKER}?hours=${HOURS}&batch=${BATCH}&offset=0`;
            let call = 0, inserted = 0, updated = 0, skipped = 0, errors = 0;

            console.log('');
            console.log('================================================');
            console.log(` IMPORTACION HOSTAWAY -> CASPIO`);
            console.log(` Ultimas ${HOURS}h | batch ${BATCH}`);
            console.log('================================================');

            while (url) {
              call++;
              const offset = new URL(url).searchParams.get('offset');
              console.log('');
              console.log(`--- Llamada #${call} | offset ${offset} ---`);

              let data;
              try {
                const res = await fetch(url);
                data = await res.json();
              } catch (e) {
                console.error(`ERROR de red: ${e.message}`);
                process.exit(1);
              }

              if (data.status !== 'ok') {
                console.error(`ERROR worker: ${JSON.stringify(data)}`);
                process.exit(1);
              }

              const i = data.inserted ?? 0;
              const u = data.updated  ?? 0;
              const s = data.skipped  ?? 0;
              const e = data.errors   ?? 0;

              console.log(`  Total Hostaway : ${data.total ?? '?'}`);
              console.log(`  Insertados     : ${i}`);
              console.log(`  Actualizados   : ${u}`);
              console.log(`  Saltados       : ${s}`);
              console.log(`  Errores        : ${e}`);
              if (data.errDetails) console.log(`  Detalle error  : ${data.errDetails}`);

              inserted += i;
              updated  += u;
              skipped  += s;
              errors   += e;

              if (!data.hasMore) {
                console.log('');
                console.log('  Sin mas registros — completado.');
                break;
              }

              url = data.nextCall;
              await new Promise(r => setTimeout(r, 2000));
            }

            console.log('');
            console.log('================================================');
            console.log(` RESUMEN FINAL — ${call} llamadas`);
            console.log('================================================');
            console.log(`  Insertados     : ${inserted}`);
            console.log(`  Actualizados   : ${updated}`);
            console.log(`  Saltados       : ${skipped}`);
            console.log(`  Errores        : ${errors}`);
            console.log('================================================');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
