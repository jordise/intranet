<style>
:root{
  --red:#C8102E;--red-dark:#9e0c24;--red-lt:#fce8eb;
  --green:#1e9e4e;--green-lt:#e6f7ee;
  --orange:#e07b00;--orange-lt:#fff4e0;
  --gray-1:#f8f9fa;--gray-2:#eaecef;--gray-3:#c8cdd8;
  --gray-4:#7a8194;--gray-5:#2d3142;
  --white:#fff;
  --shadow-xs:0 1px 3px rgba(0,0,0,.07);
  --shadow-sm:0 2px 8px rgba(0,0,0,.09);
  --r:12px;--r-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh;padding-bottom:80px}

/* NAV — estilo wp-nav (copiada de villa-info) */
.wp-nav{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#fff;border-bottom:1.5px solid var(--gray-2);box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:400}
.wp-nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.wp-nav-logo img{height:26px;object-fit:contain}
.wp-nav-center{flex:1;min-width:0;padding:0 6px}
.wp-nav-title{font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;color:var(--gray-5);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wp-nav-sub{font-size:11px;color:var(--gray-4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wp-nav-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.wp-nav-menu{display:flex;align-items:center;justify-content:center;background:var(--red);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;transition:background .15s;flex-shrink:0}
.wp-nav-menu:hover{background:var(--red-dark)}
.wp-nav-close{display:flex;align-items:center;justify-content:center;background:rgba(200,16,46,.1);border:1.5px solid rgba(200,16,46,.2);color:var(--red);width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:900;cursor:pointer;transition:background .15s;flex-shrink:0}
.wp-nav-close:hover{background:rgba(200,16,46,.2)}

/* SPINNER */
#loadOverlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(255,255,255,.85);
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
#loadOverlay.on{display:flex}
.spinner{
  width:52px;height:52px;
  animation:spin-3v .9s linear infinite;
}
@keyframes spin-3v{to{transform:rotate(360deg)}}
#loadMsg{font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;color:var(--gray-4)}

/* TOAST */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--gray-5);color:var(--white);
  font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:998;white-space:nowrap;
}
#toast.show{opacity:1}

/* FILTROS */
.filters-wrap{max-width:860px;margin:20px auto 0;padding:0 16px}
.filters-card{
  background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow-sm);padding:16px 20px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;
}
.f-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px}
.f-label{font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-5)}
.f-input,.f-inp,.f-select{
  border:1.5px solid var(--gray-2);border-radius:var(--r-sm);
  padding:8px 12px;font-size:13px;font-family:'Open Sans',sans-serif;
  color:var(--gray-5);background:var(--white);outline:none;transition:.15s;width:100%;
}
.f-input:focus,.f-inp:focus,.f-select:focus{border-color:var(--red)}

/* STATS */
.stats-wrap{max-width:860px;margin:10px auto 0;padding:0 16px}
.stats-bar{
  display:flex;gap:10px;flex-wrap:wrap;
}
.stat-chip{
  background:var(--white);border-radius:20px;padding:5px 14px;
  font-size:12px;font-weight:600;border:1.5px solid var(--gray-2);
  display:flex;align-items:center;gap:6px;
}
.stat-chip .dot{width:8px;height:8px;border-radius:50%}
.dot-ok{background:var(--green)}
.dot-warn{background:var(--orange)}
.dot-err{background:var(--red)}

/* LISTA VILLAS */
.list-wrap{max-width:860px;margin:14px auto 0;padding:0 16px}
.villa-card{
  background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow-xs);margin-bottom:10px;
  border-left:4px solid var(--gray-2);
  transition:border-color .2s;
  overflow:hidden;
}
.villa-card.complete{border-left-color:var(--green)}
.villa-card.partial{border-left-color:var(--orange)}
.villa-card.empty{border-left-color:var(--red)}

.villa-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;gap:12px;
}
.villa-header:hover{background:var(--gray-1)}
.villa-name{font-family:Montserrat,sans-serif;font-size:15px;font-weight:800;color:var(--gray-5)}
.villa-manager{font-size:11px;color:var(--gray-4);margin-top:2px}
.villa-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.progress-bar{width:80px;height:6px;background:var(--gray-2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.ok{background:var(--green)}
.progress-fill.partial{background:var(--orange)}
.progress-fill.empty{background:var(--red)}
.progress-pct{font-size:11px;font-weight:700;color:var(--gray-4);min-width:30px;text-align:right}
.villa-chevron{font-size:14px;color:var(--gray-3);transition:transform .2s;flex-shrink:0}
.villa-card.open .villa-chevron{transform:rotate(180deg)}

/* FORMULARIO DE CAMPOS */
.villa-form{
  display:none;padding:0 18px 18px;border-top:1px solid var(--gray-2);
}
.villa-card.open .villa-form{display:block}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:600px){.fields-grid{grid-template-columns:1fr}}

.field-item{display:flex;flex-direction:column;gap:4px}
.field-label{
  font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;
}
.field-label .tag{
  font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;letter-spacing:.3px;
}
.tag-ok{background:var(--green-lt);color:var(--green)}
.tag-warn{background:var(--orange-lt);color:var(--orange)}
.field-input,.field-textarea{
  border:1.5px solid var(--gray-2);border-radius:var(--r-sm);
  padding:8px 10px;font-size:13px;font-family:'Open Sans',sans-serif;
  color:var(--gray-5);background:var(--white);outline:none;
  transition:.15s;width:100%;resize:vertical;
}
.field-input:focus,.field-textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.08)}
.field-input.filled{border-color:var(--green);background:#fcfffc}
.field-input.empty-field,.field-textarea.empty-field{border-color:var(--orange);background:#fffaf5}
.field-textarea{min-height:80px}
.field-hint{font-size:10px;color:var(--gray-4);margin-top:2px;font-style:italic}
.field-item.full-width{grid-column:1/-1}

.btn-save{
  margin-top:16px;
  background:var(--red);color:var(--white);
  border:none;border-radius:var(--r-sm);padding:10px 24px;
  font-family:Montserrat,sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;transition:.15s;
}
.btn-save:hover{background:var(--red-dark)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-preview{
  margin-top:16px;margin-left:10px;
  background:var(--gray-1);color:var(--gray-5);
  border:1.5px solid var(--gray-2);border-radius:var(--r-sm);padding:10px 16px;
  font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-preview:hover{border-color:var(--red);color:var(--red)}

/* EMPTY STATE */
#emptyState{display:none;text-align:center;padding:40px;color:var(--gray-4);font-size:14px}

/* ── MÁS FILTROS ── */
.mas-filtros-toggle{
  background:none;border:1.5px solid var(--gray-2);
  color:var(--gray-4);font-size:12px;font-weight:700;
  font-family:'Montserrat',sans-serif;
  padding:6px 14px;border-radius:6px;cursor:pointer;
  transition:.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.mas-filtros-toggle:hover{border-color:var(--red);color:var(--red)}
.mas-filtros-toggle.active{border-color:var(--red);color:var(--red);background:var(--red-lt)}
.mas-filtros-panel{
  display:none;background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow-sm);padding:16px 20px;margin-top:8px;flex-wrap:wrap;gap:12px;
}
.mas-filtros-panel.open{display:flex}
.mas-filtros-panel .f-group{min-width:150px;flex:1}
.date-range-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-range-row .f-select{min-width:100px;flex:1}
.date-sep{font-size:11px;color:var(--gray-4)}
.reset-link{font-size:11px;color:var(--gray-4);cursor:pointer;
  background:none;border:none;font-family:'Open Sans',sans-serif;
  padding:0;align-self:flex-end;}
.reset-link:hover{color:var(--red)}

.cb-label{display:flex;align-items:center;gap:5px;font-size:12px;
  color:var(--gray-5);cursor:pointer;white-space:nowrap;font-family:'Open Sans',sans-serif}
.cb-label input[type=checkbox]{accent-color:var(--red);width:14px;height:14px;cursor:pointer}
</style>

<nav class="wp-nav">

<div style="max-width:860px;margin:20px auto 0;padding:0 16px">
  <h1 style="font-family:Montserrat,sans-serif;font-size:22px;font-weight:900;color:var(--gray-5);margin-bottom:4px">Campos del Manual de Villa</h1>
  <p style="font-size:13px;color:var(--gray-4)">Revisa y edita los datos que aparecen en el manual online de cada villa.</p>
</div>
<div class="filters-wrap">
  <div class="filters-card">
    <div class="f-group" style="min-width:260px">
      <label class="f-label">🔍 Buscar villa</label>
      <input class="f-input" id="filterName" type="text" placeholder="Nombre de villa…" oninput="applyFilters()">

    <div class="f-group">

<script>
Auth.require('editar-villas-para-manual');
var WORKER = 'https://caspio-proxy.jordi-89b.workers.dev';
var _allVillas = [];
var _managers  = {};   // userId → name
var _dirty     = {};   // villaid → {field: value}

// Botón cerrar de la cabecera
function goBack(){
  try{ window.close(); }catch(e){}
  setTimeout(function(){ history.back(); }, 200);
}

// Campos del manual — orden y configuración
var MANUAL_FIELDS = [
  { key:'Name_villa_para_inquilinos', label:'Nombre para el huésped',  type:'input',    hint:'Nombre que verá el huésped en el manual', span:false },
  { key:'Wifi_user',                  label:'Red Wifi (SSID)',          type:'input',    hint:'Nombre de la red wifi',                   span:false },
  { key:'Wifi_password',              label:'Contraseña Wifi',          type:'input',    hint:'Contraseña de la red wifi',               span:false },
  { key:'Beach_distance',             label:'Playa más cercana',        type:'input',    hint:'Ej: 500 mts · Cala Blanca',              span:false },
  { key:'Restaurant_distance',        label:'Restaurante más cercano',  type:'textarea', hint:'Ej: 200 mts · Es Jardí des Temple',      span:true  },
  { key:'Supermarket_distance',       label:'Supermercado más cercano', type:'input',    hint:'Ej: 1 km · Mercadona Alaior',            span:false },
  { key:'Pharmacy_distance',          label:'Farmacia',                 type:'input',    hint:'Ej: 800 mts · Farmàcia Son Bou',        span:false },
  { key:'Airport_distance',           label:'Aeropuerto',               type:'input',    hint:'Ej: 15 km',                              span:false },
  // Description no está en Vi_villas_users_edit — añadir en Caspio si se necesita
  // { key:'Description', label:'Descripción del entorno', type:'textarea', hint:'...', span:true },
  { key:'Electric_panel',             label:'Cuadro eléctrico',         type:'input',    hint:'Ej: En el garaje, puerta derecha',       span:false },
  { key:'Water_valve',                label:'Llave de paso',            type:'input',    hint:'Ej: Debajo del fregadero de la cocina',  span:false },
  { key:'BBQ',                        label:'Barbacoa',                 type:'textarea', hint:'Deja vacío si no hay barbacoa',           span:true  },
];

// ── HELPERS ────────────────────────────────────────────────────
function busy(on, msg){
  document.getElementById('loadOverlay').classList.toggle('on', on);
  if(msg) document.getElementById('loadMsg').textContent = msg;
}

function toast(msg, ok){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#1e9e4e' : '#C8102E';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function fieldScore(villa){
  var filled = MANUAL_FIELDS.filter(function(f){ return villa[f.key] && String(villa[f.key]).trim(); }).length;
  return { filled: filled, total: MANUAL_FIELDS.length, pct: Math.round(filled / MANUAL_FIELDS.length * 100) };
}

function statusClass(pct){
  if(pct === 100) return 'complete';
  if(pct >= 50)  return 'partial';
  return 'empty';
}

// ── LOAD DATA ──────────────────────────────────────────────────
function loadAll(){

  busy(true, 'Cargando villas…');

  fetch(Auth.url(WORKER + '?action=view&view=Vi_villas_users_edit&limit=500'))
  .then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t.slice(0,300)); });
    return r.json();
  })
  .then(function(res){
    var rows = res.Result || res.result || [];
    if(rows.length) console.log('[editar-manual] first row keys:', Object.keys(rows[0]).slice(0,5));

    // Dedup por TaVillas_villaid
    var seen = {};
    _allVillas = [];
    rows.forEach(function(r){
      var id = String(r.TaVillas_villaid || '');
      if(!id || seen[id]) return;
      seen[id] = true;
      var mgrId   = String(r.TaVillas_KeyHolder_person || '');
      var mgrName = r.TaUsers_Name || '';
      if(mgrId && mgrName) _managers[mgrId] = mgrName;

      _allVillas.push({
        villaid:                    id,
        Hostawayid:                 r.TaVillas_Hostawayid || '',
        Name:                       r.TaVillas_Name || '',
        _raw: r,
        Name_villa_para_inquilinos: r.TaVillas_Name_villa_para_inquilinos || '',
        Wifi_user:                  r.TaVillas_Wifi_user || '',
        Wifi_password:              r.TaVillas_Wifi_password || '',
        Beach_distance:             r.TaVillas_Beach_distance || '',
        Restaurant_distance:        r.TaVillas_Restaurant_distance || '',
        Supermarket_distance:       r.TaVillas_Supermarket_distance || '',
        Pharmacy_distance:          r.TaVillas_Pharmacy_distance || '',
        Airport_distance:           r.TaVillas_Airport_distance || '',
        Description:                r.TaVillas_Description || '',
        Electric_panel:             r.TaVillas_where_is_mainpower || '',
        Water_valve:                r.TaVillas_wher_is_water_stopcock || '',
        BBQ:                        r.TaVillas_BBQ || '',
        KeyHolder_person:           mgrId,
        _managerName:               mgrName,
        _managerUserId:             mgrId,
      });
    });

    _allVillas.sort(function(a,b){
      var na = a.Name_villa_para_inquilinos || a.Name;
      var nb = b.Name_villa_para_inquilinos || b.Name;
      return na.localeCompare(nb, 'es');
    });

    buildManagerFilter();
    buildStats();
    renderList(_allVillas);
    applyFilters();
    busy(false);

    // Abrir villa por URL param
    var pid = new URLSearchParams(location.search).get('villaid') || new URLSearchParams(location.search).get('id');
    if(pid){
      var card = document.getElementById('card-' + pid);
      if(card){ toggleCard(card); card.scrollIntoView({behavior:'smooth', block:'start'}); }
    }
  })
  .catch(function(e){
    busy(false);
    console.error('[editar-manual]', e);
    document.getElementById('loadMsg').textContent = e.message;
    toast('Error: ' + e.message.slice(0,80), false);
  });
}


// ── FILTROS ────────────────────────────────────────────────────
function buildManagerFilter(){
  var sel = document.getElementById('filterManager');
  Object.keys(_managers).sort(function(a,b){ return _managers[a].localeCompare(_managers[b],'es'); })
    .forEach(function(uid){
      var opt = document.createElement('option');
      opt.value = uid;
      opt.textContent = _managers[uid];
      sel.appendChild(opt);
    });
}

function applyFilters(){
  var name    = document.getElementById('filterName').value.trim().toLowerCase();
  var manager = document.getElementById('filterManager').value;
  var status  = document.getElementById('filterStatus').value;

  var filtered = [];
  _allVillas.forEach(function(v){
    var vname = (v.Name_villa_para_inquilinos || v.Name).toLowerCase();
    var show = true;
    if(name    && vname.indexOf(name) < 0)           show = false;
    if(manager && v._managerUserId !== manager)       show = false;
    if(status){
      var st = statusClass(fieldScore(v).pct);
      if(st !== status) show = false;
    }
    if(!passasMasFiltros(v)) show = false;
    // Show/hide card DOM element directly (no re-render)
    var card = document.getElementById('card-' + v.villaid);
    if(card) card.style.display = show ? '' : 'none';
    if(show) filtered.push(v);
  });

  // Empty state
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
  buildStats(filtered);
}

// ── STATS ──────────────────────────────────────────────────────
function buildStats(villas){
  villas = villas || _allVillas;
  var complete = 0, partial = 0, empty = 0;
  villas.forEach(function(v){
    var st = statusClass(fieldScore(v).pct);
    if(st==='complete') complete++;
    else if(st==='partial') partial++;
    else empty++;
  });
  var bar = document.getElementById('statsBar');
  bar.innerHTML =
    chip('dot-ok',   '✅ Completos',  complete) +
    chip('dot-warn', '⚠️ Parciales',  partial)  +
    chip('dot-err',  '❌ Incompletos',empty)     +
    '<div class="stat-chip">Total: <b>' + villas.length + '</b></div>';
}
function chip(dot, label, n){
  return '<div class="stat-chip"><div class="dot ' + dot + '"></div>' + label + ': <b>' + n + '</b></div>';
}

// ── RENDER LISTA ───────────────────────────────────────────────
function renderList(villas){
  var list  = document.getElementById('villaList');
  var empty = document.getElementById('emptyState');
  list.innerHTML = '';
  if(!villas.length){ empty.style.display='block'; return; }
  empty.style.display = 'none';

  villas.forEach(function(v){
    var sc  = fieldScore(v);
    var st  = statusClass(sc.pct);
    var hwid= v.Hostawayid;

    var card = document.createElement('div');
    card.className = 'villa-card ' + st;
    card.id = 'card-' + v.villaid;

    var managerTxt = v._managerName ? '👤 ' + v._managerName : '👤 Sin manager asignado';
    var pctClass   = sc.pct===100?'ok':sc.pct>=50?'partial':'empty';

    card.innerHTML =
      '<div class="villa-header" onclick="toggleCard(this.parentElement)">' +
        '<div>' +
          '<div class="villa-name">' + (v.Name_villa_para_inquilinos || v.Name || 'Villa ' + v.villaid) + '</div>' +
          '<div class="villa-manager">' + managerTxt + '</div>' +
        '</div>' +
        '<div class="villa-progress">' +
          '<div class="progress-bar"><div class="progress-fill ' + pctClass + '" style="width:' + sc.pct + '%"></div></div>' +
          '<span class="progress-pct">' + sc.filled + '/' + sc.total + '</span>' +
        '</div>' +
        '<span class="villa-chevron">▼</span>' +
      '</div>' +
      '<div class="villa-form" id="form-' + v.villaid + '">' +
        buildForm(v) +
        '<div style="margin-top:16px;display:flex;align-items:center;flex-wrap:wrap;gap:8px">' +
          '<button class="btn-save" onclick="saveVilla(\'' + v.villaid + '\')" id="btnSave-' + v.villaid + '">💾 Guardar cambios</button>' +
          (hwid ? '<a class="btn-preview" href="manual-villa.html?Hostawayid=' + hwid + '" target="_blank">👁 Ver manual</a>' : '') +
        '</div>' +
      '</div>';

    list.appendChild(card);
  });
}

// ── FORM DE CAMPOS ─────────────────────────────────────────────
function buildForm(v){
  var html = '<div class="fields-grid">';
  MANUAL_FIELDS.forEach(function(f){
    var val   = v[f.key] || '';
    var filled = val.trim().length > 0;
    var cls   = filled ? 'filled' : 'empty-field';
    var tag   = filled ? '<span class="tag tag-ok">✓ Relleno</span>' : '<span class="tag tag-warn">⚠ Vacío</span>';
    var spanCls = f.span ? 'field-item full-width' : 'field-item';
    var inputId = 'f-' + v.villaid + '-' + f.key;

    html += '<div class="' + spanCls + '">';
    html += '<label class="field-label" for="' + inputId + '">' + f.label + ' ' + tag + '</label>';
    if(f.type === 'textarea'){
      html += '<textarea class="field-textarea ' + cls + '" id="' + inputId + '"' +
              ' data-villaid="' + v.villaid + '" data-field="' + f.key + '"' +
              ' oninput="markDirty(this)">' + esc(val) + '</textarea>';
    } else {
      html += '<input class="field-input ' + cls + '" id="' + inputId + '" type="text"' +
              ' value="' + esc(val) + '"' +
              ' data-villaid="' + v.villaid + '" data-field="' + f.key + '"' +
              ' oninput="markDirty(this)">';
    }
    if(f.hint) html += '<div class="field-hint">' + f.hint + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── DIRTY TRACKING ─────────────────────────────────────────────
function markDirty(el){
  var villaid = el.dataset.villaid;
  var field   = el.dataset.field;
  var val     = el.value;
  if(!_dirty[villaid]) _dirty[villaid] = {};
  _dirty[villaid][field] = val;

  // Update tag and style
  var filled = val.trim().length > 0;
  el.className = el.className.replace(/filled|empty-field/g, '').trim();
  el.className += ' ' + (filled ? 'filled' : 'empty-field');
  var label = el.closest('.field-item').querySelector('.field-label');
  var tag   = label.querySelector('.tag');
  if(tag) tag.outerHTML = filled
    ? '<span class="tag tag-ok">✓ Relleno</span>'
    : '<span class="tag tag-warn">⚠ Vacío</span>';
}

// ── TOGGLE CARD ────────────────────────────────────────────────
function toggleCard(card){
  card.classList.toggle('open');
}

// ── SAVE ───────────────────────────────────────────────────────
function saveVilla(villaid){
  var changes = _dirty[villaid];
  if(!changes || !Object.keys(changes).length){
    toast('Sin cambios que guardar', false);
    return;
  }
  var btn = document.getElementById('btnSave-' + villaid);
  btn.disabled = true;

  // Map field keys back to Caspio field names (some differ)
  var record = {};
  Object.keys(changes).forEach(function(k){
    if(k === 'Electric_panel') record['where_is_mainpower']    = changes[k];
    else if(k === 'Water_valve') record['wher_is_water_stopcock'] = changes[k];
    else record[k] = changes[k];
  });

  // action=update con TaVillas y villaid como PK
  var url = WORKER + '?action=update&table=TaVillas&id=' + encodeURIComponent(villaid);
  fetch(Auth.url(url), {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(record)
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(e){ throw new Error(e.Message||e.error||'HTTP '+r.status); });
    return r.json();
  })
  .then(function(){
    // Update local data
    var v = _allVillas.find(function(x){ return x.villaid === villaid; });
    if(v) Object.assign(v, changes);
    delete _dirty[villaid];

    // Update progress bar
    var sc  = fieldScore(v || {});
    var st  = statusClass(sc.pct);
    var card = document.getElementById('card-' + villaid);
    card.className = card.className.replace(/complete|partial|empty/g, '').trim() + ' ' + st + ' open';
    var fill = card.querySelector('.progress-fill');
    var pct  = card.querySelector('.progress-pct');
    if(fill){ fill.className='progress-fill '+(sc.pct===100?'ok':sc.pct>=50?'partial':'empty'); fill.style.width=sc.pct+'%'; }
    if(pct)  pct.textContent = sc.filled+'/'+sc.total;

    toast('✅ Villa guardada correctamente', true);
    btn.disabled = false;

    // Invalidar KV cache de villa-manual si tiene Hostawayid
    var villa = _allVillas.find(function(x){ return x.villaid===villaid; });
    if(villa && villa.Hostawayid){
      fetch(Auth.url(WORKER+'?action=kv-delete&key=villa_manual:'+villa.Hostawayid)).catch(function(){});
    }

    buildStats();
  })
  .catch(function(e){
    toast('❌ Error al guardar: ' + e.message, false);
    btn.disabled = false;
  });
}


// ── MÁS FILTROS ─────────────────────────────────────────────────
function toggleMasFiltros(){
  var panel = document.getElementById('masFiltrosPanel');
  var btn   = document.getElementById('masFiltrosBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
  btn.textContent = panel.classList.contains('open') ? '⚙️ Menos filtros' : '⚙️ Más filtros';
}

function resetMasFiltros(){
  document.querySelectorAll('.mf-status-cb').forEach(function(cb){
    cb.checked = (cb.value==='1'||cb.value==='2');
  });
  var fd=document.getElementById('mfFinDesde');    if(fd) fd.value='2026-01-01';
  var ih=document.getElementById('mfInicioHasta'); if(ih) ih.value='2026-12-31';
  applyFilters();
}

function fillMasFiltrosDropdowns(){
  var zone={},ownerType={},dealType={},dealPer={},
      signed={},renov={},firstYear={},iniDesde={},iniHasta={};
  _allVillas.forEach(function(v){
    var r=v._raw||{};
    if(r.TaVillas_Zone)                   zone[r.TaVillas_Zone]=true;
    if(r.TaVillas_Owner_Type)             ownerType[r.TaVillas_Owner_Type]=true;
    if(r.TaVillas_Deal_Type)              dealType[r.TaVillas_Deal_Type]=true;
    if(r.TaVillas_Deal_Type_per)          dealPer[r.TaVillas_Deal_Type_per]=true;
    if(r.TaVillas_SIGNED)                 signed[r.TaVillas_SIGNED]=true;
    if(r.TaVillas_ContractRenovationType) renov[r.TaVillas_ContractRenovationType]=true;
    if(r.TaVillas_Fist_year_we_managed)   firstYear[r.TaVillas_Fist_year_we_managed]=true;
    if(r.TaVillas_Iniciocontrato)         iniDesde[r.TaVillas_Iniciocontrato]=true;
    if(r.TaVillas_Iniciocontrato)         iniHasta[r.TaVillas_Iniciocontrato]=true;
  });
  function fill(id,vals){
    var sel=document.getElementById(id);
    if(!sel) return;
    // keep first option, add rest sorted
    var existing=sel.options[0];
    while(sel.options.length>1) sel.remove(1);
    Object.keys(vals).sort(function(a,b){return parseInt(a)-parseInt(b);})
      .forEach(function(v){
        if(!v) return;
        var o=document.createElement('option');
        o.value=v; o.textContent=v; sel.appendChild(o);
      });
  }
  fill('mfZone',zone); fill('mfOwnerType',ownerType);
  fill('mfDealType',dealType); fill('mfDealPer',dealPer);
  fill('mfSigned',signed); fill('mfRenovacion',renov);
  fill('mfFirstYear',firstYear);
  fill('mfInicioDesde',iniDesde); fill('mfInicioHasta',iniHasta);
}

function passasMasFiltros(v){
  var r=v._raw||{};

  // Status checkboxes — si ninguno marcado, no filtra (muestra todos)
  var cbs=document.querySelectorAll('.mf-status-cb:checked');
  if(cbs.length>0){
    var allowed={};
    cbs.forEach(function(cb){allowed[cb.value]=true;});
    if(!allowed[String(r.TaVillas_Status||'')]) return false;
  }

  // Fin contrato >=
  var fdEl=document.getElementById('mfFinDesde');
  if(fdEl && fdEl.value){
    var finStr=r.TaVillas_Fincontrato||'';
    var finYear=finStr.length>=4?parseInt(finStr.substring(0,4)):0;
    var fdYear=parseInt(fdEl.value.substring(0,4));
    if(finYear && finYear<fdYear) return false;
  }

  // Inicio contrato <=
  var ihEl=document.getElementById('mfInicioHasta');
  if(ihEl && ihEl.value){
    var iniStr=r.TaVillas_Iniciocontrato||'';
    var iniYear=iniStr.length>=4?parseInt(iniStr.substring(0,4)):0;
    var ihYear=parseInt(ihEl.value.substring(0,4));
    if(iniYear && iniYear>ihYear) return false;
  }

  return true;
}

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener("load", function(){ loadAll(); });
