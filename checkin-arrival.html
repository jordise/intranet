<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Debug CheckinAuth</title>
  <script src="checkin-auth.js"></script>
  <style>
    body{font-family:monospace;padding:20px;background:#f5f5f5}
    .ok{color:green;font-weight:bold}
    .err{color:red;font-weight:bold}
    .info{color:#333}
    pre{background:#fff;padding:12px;border-radius:6px;border:1px solid #ddd;overflow-x:auto}
  </style>
</head>
<body>
<h2>🔍 CheckinAuth Debug</h2>
<pre id="out"></pre>
<script>
var out = document.getElementById('out');
function log(msg, cls) {
  out.innerHTML += '<span class="'+(cls||'info')+'">'+msg+'</span>\n';
}

log('=== ENTORNO ===');
log('pathname: ' + location.pathname);
log('search: ' + location.search);
log('href: ' + location.href);

log('\n=== localStorage ===');
var lsKey = '3v_checkin_auth';
var raw = localStorage.getItem(lsKey);
if (raw) {
  log('Sesión encontrada en localStorage: ', 'ok');
  try {
    var obj = JSON.parse(raw);
    log('  code: ' + obj.code);
    log('  pin: ' + obj.pin);
    log('  expires: ' + new Date(obj.expires).toLocaleString());
    log('  expirada: ' + (Date.now() > obj.expires ? 'SÍ' : 'NO'));
    if (Date.now() > obj.expires) log('  → SESIÓN EXPIRADA', 'err');
    else log('  → SESIÓN VÁLIDA', 'ok');
  } catch(e) {
    log('  Error parseando: ' + e, 'err');
  }
} else {
  log('NO hay sesión en localStorage', 'err');
  log('→ Por eso redirige a la página principal', 'err');
}

log('\n=== sessionStorage ===');
var rawSS = sessionStorage.getItem(lsKey);
log(rawSS ? 'Sesión en sessionStorage: ' + rawSS : 'No hay sesión en sessionStorage');

log('\n=== URL param code ===');
var p = new URLSearchParams(location.search);
var code = p.get('TaBookings2021_FS_confirmation_code') || p.get('code') || '(ninguno)';
log('code en URL: ' + code);

log('\n=== CheckinAuth ===');
log('CheckinAuth definido: ' + (typeof CheckinAuth !== 'undefined' ? 'SÍ' : 'NO'));
if (typeof CheckinAuth !== 'undefined') {
  log('isVerified(): ' + CheckinAuth.isVerified());
}

log('\n=== DIAGNÓSTICO ===');
if (!raw) {
  log('PROBLEMA: No hay sesión guardada en localStorage', 'err');
  log('CAUSA: O nunca se completó la verificación, o se borró el localStorage', 'err');
  log('SOLUCIÓN: Ve a checkin-online.html primero y verifica email+PIN', 'info');
} else if (Date.now() > JSON.parse(raw).expires) {
  log('PROBLEMA: Sesión expirada', 'err');
} else {
  log('La sesión está bien. El problema es otro.', 'ok');
}
</script>
</body>
</html>
