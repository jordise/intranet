<div class="page-header">
    <!-- Logo arriba del todo -->
    <img class="page-logo" src="logo-negro.png" alt="3Villas"
         onerror="this.onerror=null;this.src='3villas_simbolo_rojo_sin_fondo.png';this.style.height='32px'">
    <!-- Título debajo del logo -->
    <div class="page-title">Check-in Online</div>
    <!-- Selector de idioma -->
    <div id="langWrap">
      <select id="langSel" onchange="applyLang(this.value)">
        <option value="en">🌐 EN</option>
        <option value="es">ES</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="it">IT</option>
        <option value="nl">NL</option>
        <option value="pt">PT</option>
        <option value="ca">CA</option>
      </select>
    </div>
    <!-- Tabs Info + Keys -->
    <div class="hdr-tabs" id="hdrTabs" style="display:none">
      <button class="hdr-tab info active" id="tab0" onclick="showTab(0)">
        <span class="info-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="white" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 5.25a1.4 1.4 0 110 2.8 1.4 1.4 0 010-2.8zM13.4 17h-2.8v-5.6h2.8V17z"/></svg></span>
        <span data-i18n="tab_home">Info</span>
      </button>
      <button class="hdr-tab keys" id="tab5" onclick="showTab(5)">
        <span class="hdr-tab-ico">🔑</span>
        <span data-i18n="tab_keys">Keys</span>
      </button>
    </div>
    <div class="hdr-steps-lbl" id="hdrStepsLbl">4 Steps</div>
    <!-- Progress track en el header — círculos clicables -->
    <div class="progress-track" id="hdrSteps" style="display:none;margin-bottom:8px">
      <div class="pt-step">
        <a class="pt-circle pend" id="hpd1" href="#" style="text-decoration:none">1</a>
        <div class="pt-label" id="hpdl1">Arrival</div>
      </div>
      <div class="pt-line" id="hpl1"></div>
      <div class="pt-step">
        <a class="pt-circle pend" id="hpd2" href="#" style="text-decoration:none">2</a>
        <div class="pt-label" id="hpdl2">Police</div>
      </div>
      <div class="pt-line" id="hpl2"></div>
      <div class="pt-step">
        <a class="pt-circle pend" id="hpd3" href="#" style="text-decoration:none">3</a>
        <div class="pt-label" id="hpdl3">Deposit</div>
      </div>
      <div class="pt-line" id="hpl3"></div>
      <div class="pt-step">
        <a class="pt-circle pend" id="hpd4" href="#" style="text-decoration:none">4</a>
        <div class="pt-label" id="hpdl4">Tax</div>
      </div>
    </div>
  </div>
