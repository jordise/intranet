<!--  checkin_header.html — cabecera compartida de todas las páginas de check-in
     SOLO HTML + CSS + función updateCheckinHeader().
     Sin CheckinAuth, sin i18n propio, sin fetch propio.
     Cada subpágina llama a updateCheckinHeader() tras verificar/guardar. -->
<style>
  .chk-header{
    text-align:center;padding:12px 16px 10px;border-bottom:2px solid var(--gray-2);
    background:#fff;position:sticky;top:0;z-index:200;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .chk-logo{height:42px;display:block;margin:0 auto 5px;max-width:150px;object-fit:contain}
  .chk-title{font-family:Montserrat,sans-serif;font-size:13px;font-weight:900;
    color:var(--red);margin-bottom:7px}
  #chkLangWrap{position:absolute;top:10px;right:10px}
  #chkLangSel{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;
    border:1px solid var(--gray-3);border-radius:8px;padding:4px 8px;
    background:#fff;color:var(--gray-5);cursor:pointer;outline:none;
    appearance:none;-webkit-appearance:none}
  .chk-tabs{display:flex;gap:8px;justify-content:center;margin:0 0 8px}
  .chk-tab{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
    border-radius:10px;font-family:Montserrat,sans-serif;font-size:11px;
    font-weight:800;text-decoration:none;transition:opacity .15s}
  .chk-tab:hover{opacity:.85}
  .chk-tab.info{background:var(--blue);color:#fff}
  .chk-tab.keys{background:var(--gray-2);color:var(--gray-4);border:1.5px solid var(--gray-3)}
  .chk-tab.keys.done{background:var(--green);color:#fff;border-color:var(--green)}
  .chk-steps{display:flex;align-items:center;max-width:270px;margin:0 auto}
  .chk-pt-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:0 0 auto}
  .chk-pt-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-family:Montserrat,sans-serif;font-weight:900;font-size:12px;
    text-decoration:none;position:relative;transition:all .2s}
  .chk-pt-circle.pend{border:2px solid var(--gray-3);background:var(--gray-2);color:var(--gray-4)}
  .chk-pt-circle.done{background:var(--green);color:#fff;border:2px solid var(--green)}
  .chk-pt-circle.active{background:var(--blue);color:#fff;border:2px solid var(--blue)}
  .chk-pt-circle.done::after{content:'✓';position:absolute;top:-5px;right:-5px;
    font-size:8px;background:#fff;color:var(--green);border-radius:50%;
    width:14px;height:14px;display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--green-bd,#86efac);font-weight:900;line-height:14px;text-align:center}
  .chk-pt-label{font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;
    color:var(--gray-4);text-align:center;max-width:52px;line-height:1.2}
  .chk-pt-label.done{color:var(--green)}
  .chk-pt-label.active{color:var(--blue)}
  .chk-pt-line{flex:1;height:2px;background:var(--gray-3);margin:0 3px;margin-bottom:18px}
  .chk-pt-line.done{background:var(--green)}
</style>

<header class="chk-header" id="chkHeader">
  <div id="chkLangWrap">
    <select id="chkLangSel">
      <option value="en">🌐 EN</option>
      <option value="es">ES</option><option value="fr">FR</option>
      <option value="de">DE</option><option value="it">IT</option>
      <option value="nl">NL</option><option value="pt">PT</option>
      <option value="ca">CA</option>
    </select>
  </div>
  <img class="chk-logo" src="logo-negro.png" alt="3Villas"
       onerror="this.onerror=null;this.src='3villas_simbolo_rojo_sin_fondo.png';this.style.height='28px'">
  <div class="chk-title">Check-in Online</div>
  <div class="chk-tabs">
    <a class="chk-tab info" id="chkTabInfo" href="checkin-online.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 5.25a1.4 1.4 0 110 2.8 1.4 1.4 0 010-2.8zM13.4 17h-2.8v-5.6h2.8V17z"/></svg>
      <span id="chkTabInfoLbl">Info</span>
    </a>
    <a class="chk-tab keys" id="chkTabKeys" href="checkin-online.html">
      🔑 <span id="chkTabKeysLbl">Keys</span>
    </a>
  </div>
  <div class="chk-steps">
    <div class="chk-pt-step">
      <a class="chk-pt-circle pend" id="chkC1" href="checkin-arrival.html">1</a>
      <div class="chk-pt-label" id="chkL1">Arrival</div>
    </div>
    <div class="chk-pt-line" id="chkLine1"></div>
    <div class="chk-pt-step">
      <a class="chk-pt-circle pend" id="chkC2" href="checkin-police.html">2</a>
      <div class="chk-pt-label" id="chkL2">Police</div>
    </div>
    <div class="chk-pt-line" id="chkLine2"></div>
    <div class="chk-pt-step">
      <a class="chk-pt-circle pend" id="chkC3" href="checkin-deposit.html">3</a>
      <div class="chk-pt-label" id="chkL3">Deposit</div>
    </div>
    <div class="chk-pt-line" id="chkLine3"></div>
    <div class="chk-pt-step">
      <a class="chk-pt-circle pend" id="chkC4" href="checkin-taxes.html">4</a>
      <div class="chk-pt-label" id="chkL4">Tax</div>
    </div>
  </div>
</header>

<script>
/* ══════════════════════════════════════════════════════
   updateCheckinHeader(opts)
   Llamado por cada subpágina tras verificar la reserva y/o guardar.

   opts = {
     code:    string   — código de reserva (para construir los links)
     s1,s2,s3,s4: bool — estado completado de cada step
     active:  1|2|3|4  — círculo de esta página → se pinta azul
     allDone: bool      — si true, tab Keys se pinta verde
     lang:    string    — idioma actual ('en','es','fr',…)
   }
══════════════════════════════════════════════════════ */
window.updateCheckinHeader = function(opts) {
  var code    = opts.code    || '';
  var states  = [false, !!opts.s1, !!opts.s2, !!opts.s3, !!opts.s4];
  var active  = opts.active  || 0;
  var allDone = !!opts.allDone;
  var lang    = opts.lang    || 'en';
  var qs      = code ? '?TaBookings2021_FS_confirmation_code=' + encodeURIComponent(code) : '';

  /* ── Links de los tabs (siempre a checkin-online.html con el code) ── */
  var tabInfo = document.getElementById('chkTabInfo');
  var tabKeys = document.getElementById('chkTabKeys');
  if (tabInfo) tabInfo.href = 'checkin-online.html' + qs;
  if (tabKeys) {
    tabKeys.href = 'checkin-online.html' + qs;
    if (allDone) tabKeys.classList.add('done');
    else         tabKeys.classList.remove('done');
  }

  /* ── Links y estados de los 4 círculos ── */
  var pages = [
    'checkin-arrival.html',
    'checkin-police.html',
    'checkin-deposit.html',
    'checkin-taxes.html'
  ];
  for (var i = 1; i <= 4; i++) {
    var circle = document.getElementById('chkC' + i);
    var label  = document.getElementById('chkL' + i);
    var line   = i < 4 ? document.getElementById('chkLine' + i) : null;

    if (circle) {
      circle.href = pages[i - 1] + qs;
      if (i === active)     circle.className = 'chk-pt-circle active';
      else if (states[i])   circle.className = 'chk-pt-circle done';
      else                  circle.className = 'chk-pt-circle pend';
    }
    if (label) {
      label.className = 'chk-pt-label' +
        (states[i] ? ' done' : (i === active ? ' active' : ''));
    }
    if (line) {
      line.className = 'chk-pt-line' + (states[i] ? ' done' : '');
    }
  }

  /* ── Selector de idioma: sincronizar con applyLang() de la subpágina ── */
  var sel = document.getElementById('chkLangSel');
  if (sel) {
    sel.value = lang;
    sel.onchange = function() {
      if (typeof window.applyLang === 'function') window.applyLang(this.value);
    };
  }

  /* ── Labels traducidos ── */
  var lbls = {
    en:['Arrival','Police','Deposit','Tax'],
    es:['Llegada','Policía','Depósito','Tasa'],
    fr:['Arrivée','Police','Dépôt','Taxe'],
    de:['Ankunft','Polizei','Kaution','Steuer'],
    it:['Arrivo','Polizia','Deposito','Tassa'],
    nl:['Aankomst','Politie','Borg','Belasting'],
    pt:['Chegada','Polícia','Depósito','Taxa'],
    ca:['Arribada','Policia','Dipòsit','Taxa']
  };
  var tabLbls = {
    en:['Info','Keys'],    es:['Info','Llaves'],  fr:['Info','Clés'],
    de:['Info','Schlüssel'],it:['Info','Chiavi'], nl:['Info','Sleutels'],
    pt:['Info','Chaves'],  ca:['Info','Claus']
  };
  var ll = lbls[lang]    || lbls.en;
  var tl = tabLbls[lang] || tabLbls.en;
  for (var j = 1; j <= 4; j++) {
    var lbl = document.getElementById('chkL' + j);
    if (lbl) lbl.textContent = ll[j - 1];
  }
  var ti = document.getElementById('chkTabInfoLbl');
  var tk = document.getElementById('chkTabKeysLbl');
  if (ti) ti.textContent = tl[0];
  if (tk) tk.textContent = tl[1];
};
</script>
