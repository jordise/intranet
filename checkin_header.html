<script>
(function(){
  var WORKER = 'https://caspio-proxy.jordi-89b.workers.dev';

  function truthy(v){if(!v&&v!==0)return false;
  return['1','-1','true','yes','sí','si'].includes(String(v).toLowerCase().trim());}

  function updateTabStates(s1,s2,s3,s4){
  var states=[s1,s2,s3,s4];
  states.forEach(function(done,i){
    var n=i+1;
    /* Progress-track del header */
    var hpd=$('hpd'+n);
    if(hpd) hpd.className='pt-circle '+(done?'done':'pend');
    var hpl=$('hpl'+n);
    if(hpl) hpl.className='pt-line'+(done?' done':'');
    var hpdl=$('hpdl'+n);
    if(hpdl) hpdl.className='pt-label'+(done?' done':'');
    /* Tabs snav (ocultos pero mantenemos por compatibilidad) */
    var tab=$('tab'+n);
    if(tab){
      if(done){ tab.classList.add('done-tab'); }
      else { tab.classList.remove('done-tab'); }
    }
  });
  /* Tab 5 (llaves) */
  var tab5=$('tab5');
  if(tab5){
    if(_allDone){ tab5.classList.add('done','keys'); tab5.classList.remove('keys'); tab5.className='hdr-tab keys done'+(_allDone?' done':''); }
    else { tab5.className='hdr-tab keys'; }
  }
}

function render(r, code){
  function g(a,b){return r[a]||r[b]||'';}
  var villa   = g('TaVillas_Name_villa_para_inquilinos')||'—';
  var guest   = g('TaBookings2021_Fiscal_guest_name')||g('TaBookings2021_Guest_Full_Name')||'';
  var nights  = g('TaBookings2021_Nights');
  var address = g('TaVillas_Address');
  var maps    = g('TaVillas_Googlemaps_link');
  var wifiU   = g('TaVillas_Wifi_user');
  var wifiP   = g('TaVillas_Wifi_password');
  var keybox  = g('TaVillas_Keybox_code');
  var s1=truthy(g('TaBookings2021_Arrivalform_done'));
  var s2=truthy(g('TaBookings2021_Registro_policia_done'));
  var s3=truthy(g('TaBookings2021_Security_deposit_terminado'));
  var s4=truthy(g('TaBookings2021_Ecotasa_cobrada'));
  _allDone = r._allDone !== undefined ? r._allDone : (s1&&s2&&s3&&s4);

  $('pgGreeting').textContent=t('greeting')+', '+guest;
  $('pgThanks').style.display='block';
  $('pgThanks').innerHTML=t('thanks1')+'<br>'+t('thanks2');
  $('pgVilla').textContent=villa+(nights?' · '+nights+' nights':'');
  $('pgCode').textContent='Booking ID '+code;

  /* URLs de los steps */
  var ce=encodeURIComponent(code);
  var urls=['checkin-arrival.html','checkin-police.html','checkin-deposit.html','checkin-taxes.html'];
  urls.forEach(function(url,i){
    var n=i+1;
    var fullUrl=url+'?TaBookings2021_FS_confirmation_code='+ce;
    if($('tab'+n)) $('tab'+n).href=fullUrl;
    if($('btnS'+n)) $('btnS'+n).href=fullUrl;
    if($('hpd'+n)) $('hpd'+n).href=fullUrl;
  });

  /* Estados de los 4 steps */
  [[s1,1],[s2,2],[s3,3],[s4,4]].forEach(function(pair){
    var done=pair[0], n=pair[1];
    $('pd'+n).className='pt-circle '+(done?'done':'pend');
    $('pdl'+n).className='pt-label'+(done?' done':'');
    var pl=$('pl'+n);if(pl)pl.className='pt-line'+(done?' done':'');
    $('sc'+n).className='step-card '+(done?'done':'pend');
    $('sl'+n).textContent=t('step')+' '+n;
    var ss=$('ss'+n);ss.className='sc-status '+(done?'done':'pend');ss.textContent=done?t('done'):t('pending');
    var btn=$('btnS'+n);btn.className='sc-btn '+(done?'done':'pend');
  });

  /* Panel 5: llaves */
  if(_allDone){
    $('kiKeybox').textContent=(r._mu_keybox||keybox||'—');
    $('kiAddr').textContent=address||'—';
    $('kiWifi').textContent=wifiU||'—';
    $('kiWifiPw').textContent=wifiP||'—';
    if(maps){$('kiMaps').href=maps;$('kiMaps').style.display='inline-flex';}
    if(r._mu_name){$('kiApt').textContent='Apartment: '+r._mu_name;$('kiApt').style.display='block';}
    $('keysReady').style.display='block';
    $('keysPending').style.display='none';

    /* Villa manager en panel keys */
    if(r._vm_name){
      $('duringSectionKeys').style.display='block';
      $('vmDescKeys').innerHTML='<strong>'+r._vm_name+'</strong>'+t('vm_desc');
      if(r._vm_phone) $('vmWaBtnKeys').href='https://api.whatsapp.com/send?phone='+cleanPh(r._vm_phone);
      else $('vmWaBtnKeys').style.display='none';
    }
  } else {
    $('keysReady').style.display='none';
    $('keysPending').style.display='block';
  }

  /* Villa manager en panel 0 (durante la estancia) */
  if(r._vm_name && !_allDone){
    $('duringSection').style.display='block';
    $('vmDesc').innerHTML='<strong>'+r._vm_name+'</strong>'+t('vm_desc');
    if(r._vm_phone) $('vmWaBtn').href='https://api.whatsapp.com/send?phone='+cleanPh(r._vm_phone);
    else $('vmWaBtn').style.display='none';
  }

  /* Actualizar estados de tabs */
  updateTabStates(s1,s2,s3,s4);

  /* Mostrar UI */
  $('stLoad').style.display='none';
  $('content').style.display='block';
  $('stepNav').style.display='none'; /* stepNav oculto — nav en el header */
  $('langWrap').style.display='block';
  $('hdrTabs').style.display='flex';
  $('hdrSteps').style.display='flex';
  var sl=$('hdrStepsLbl');if(sl)sl.style.display='block';

  /* Detectar idioma */
  var sup=['en','es','fr','de','it','nl','pt','ca'];
  var saved=null; try{saved=localStorage.getItem('3v_lang');}catch(e){}
  var nav=(navigator.language||navigator.userLanguage||'en').split('-')[0].toLowerCase();
  var detected=saved||(sup.includes(nav)?nav:'en');
  $('langSel').value=detected;
  applyLang(detected);

  /* Tab inicial: si allDone → panel 5 (llaves), si no → panel 0 */
  if(_allDone){
    showTab(5);
  } else {
    showTab(0);
  }
}

var _currentLang = 'en';
function t(key){ return (LANG[_currentLang] && LANG[_currentLang][key]) || (LANG.en[key]) || key; }

function applyLang(lang){
  if(!LANG[lang]) lang='en';
  _currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  /* Dot labels */
  ['pdl1','pdl2','pdl3','pdl4'].forEach(function(id,i){
    var el=document.getElementById(id);
    var keys=['dot_arrival','dot_police','dot_deposit','dot_tax'];
    if(el) el.textContent=t(keys[i]);
  });
  /* Step labels y status */
  for(var n=1;n<=4;n++){
    var sl=document.getElementById('sl'+n);
    if(sl) sl.textContent=t('step')+' '+n;
    var ss=document.getElementById('ss'+n);
    if(ss){var isDone=ss.classList.contains('done');ss.textContent=isDone?t('done'):t('pending');}
  }
  /* Thanks */
  var pgThanks=document.getElementById('pgThanks');
  if(pgThanks&&pgThanks.style.display!=='none'){
    pgThanks.innerHTML=t('thanks1')+'<br>'+t('thanks2');
  }
  /* vmDesc */
  ['vmDesc','vmDescKeys'].forEach(function(id){
    var el=document.getElementById(id);
    if(el&&el.innerHTML){
      var strong=el.querySelector('strong');
      if(strong){var vmN=strong.textContent;el.innerHTML='<strong>'+vmN+'</strong>'+t('vm_desc');}
    }
  });
  /* s5_pend si no allDone */
  var pendDesc=document.querySelector('#keysPending .keys-pending-desc');
  if(pendDesc) pendDesc.textContent=t('s5_pend');
  /* Actualizar labels del progress-track del header */
  var dotKeys=['dot_arrival','dot_police','dot_deposit','dot_tax'];
  for(var n=1;n<=4;n++){
    var hpdl=document.getElementById('hpdl'+n);
    if(hpdl) hpdl.textContent=t(dotKeys[n-1]);
  }
  /* Actualizar texto tabs header */
  var t0=document.querySelector('#tab0 [data-i18n]'); if(t0) t0.textContent=t('tab_home');
  var t5=document.querySelector('#tab5 [data-i18n]'); if(t5) t5.textContent=t('tab_keys');
  var sl2=$('hdrStepsLbl'); if(sl2) sl2.textContent='4 '+t('steps_lbl');
  try{localStorage.setItem('3v_lang',lang);}catch(e){}
  if(typeof CheckinAuth !== 'undefined' && CheckinAuth._refreshLang) CheckinAuth._refreshLang();
}

if(typeof CheckinAuth === 'undefined'){
  document.getElementById('stLoad').innerHTML =
    '<div style="text-align:center;padding:40px 20px">' +
    '<div style="font-size:36px;margin-bottom:12px">⚠️</div>' +
    '<p style="font-family:Montserrat,sans-serif;font-weight:800;color:#C8102E;font-size:14px">' +
    'Error: checkin-auth.js not found</p></div>';
} else {
  CheckinAuth.init({
    onVerified: function(booking){
      var code = CheckinAuth.getCode();
      render(booking, code);
    }
  });
}
</script>

  function initHeader() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('TaBookings2021_FS_confirmation_code') || '';
    var ce = encodeURIComponent(code);

    /* Selector de idioma */
    var sel = document.getElementById('langSel');
    if (sel) {
      var sup = ['en','es','fr','de','it','nl','pt','ca'];
      var saved = null; try{ saved = localStorage.getItem('3v_lang'); }catch(e){}
      var nav = (navigator.language || 'en').split('-')[0].toLowerCase();
      var lang = saved || (sup.indexOf(nav) >= 0 ? nav : 'en');
      sel.value = lang;
      sel.onchange = function(){ try{ localStorage.setItem('3v_lang', this.value); }catch(e){} };
    }

    /* Links en hpd1-4 */
    var pages = ['checkin-arrival.html','checkin-police.html','checkin-deposit.html','checkin-taxes.html'];
    pages.forEach(function(page, i){
      var el = document.getElementById('hpd' + (i+1));
      if (el) el.href = page + (code ? '?TaBookings2021_FS_confirmation_code=' + ce : '');
    });

    /* Links en tab0 y tab5 */
    var tab0 = document.getElementById('tab0');
    if (tab0) tab0.href = 'checkin-online.html' + (code ? '?TaBookings2021_FS_confirmation_code=' + ce : '');
    var tab5 = document.getElementById('tab5');
    if (tab5) tab5.href = 'checkin-online.html' + (code ? '?TaBookings2021_FS_confirmation_code=' + ce : '');

    /* Fetch estados reales si hay código */
    if (code) {
      fetch(WORKER + '?action=data&table=TaBookings2021'
        + '&where=' + encodeURIComponent("FS_confirmation_code='" + code + "'")
        + '&fields=TaBookings2021_Arrivalform_done,TaBookings2021_Registro_policia_done,'
        + 'TaBookings2021_Security_deposit_terminado,TaBookings2021_Ecotasa_cobrada')
        .then(function(r){ return r.json(); })
        .then(function(data){
          var r = (data.Result && data.Result[0]) || {};
          var g = function(k){ return r[k] || ''; };
          updateTabStates(
            truthy(g('TaBookings2021_Arrivalform_done')),
            truthy(g('TaBookings2021_Registro_policia_done')),
            truthy(g('TaBookings2021_Security_deposit_terminado')),
            truthy(g('TaBookings2021_Ecotasa_cobrada'))
          );
        })
        .catch(function(e){ console.warn('checkin_header: error fetch', e); });
    }
  }

  setTimeout(initHeader, 0);
})();
