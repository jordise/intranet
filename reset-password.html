<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ══ PWA ══ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3Villas">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/3villas-manuals/sw.js')
          .then(r => console.log('SW registrado:', r.scope))
          .catch(e => console.warn('SW error:', e));
      });
    }
  </script>
  <title>Nueva contraseña — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;--gray-1:#f4f5f7;--gray-2:#e8eaed;--gray-3:#c4c9d4;--gray-4:#7a8194;--gray-5:#2d3142;--shadow:0 8px 32px rgba(0,0,0,.14)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:400px;overflow:hidden}
    .card-head{background:var(--red);padding:28px 32px 24px;text-align:center}
    .card-head img{height:52px;display:block;margin:0 auto 8px}
    .card-sub{font-size:13px;color:rgba(255,255,255,.8);font-weight:500}
    .card-body{padding:32px}
    .field{margin-bottom:18px}
    .field label{display:block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-4);margin-bottom:6px}
    .field input{width:100%;height:44px;border:1.5px solid var(--gray-2);border-radius:8px;padding:0 14px;font-family:'Open Sans',sans-serif;font-size:14px;color:var(--gray-5);outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1)}
    .btn{width:100%;height:46px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:background .15s}
    .btn:hover{background:var(--red-dark)}
    .btn:disabled{background:var(--gray-3);cursor:not-allowed}
    .err{background:var(--red-light);color:var(--red);padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
    .err.show{display:block}
    .ok-msg{background:#e6f7ee;color:#1e9e4e;padding:12px 14px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
    .hint{font-size:12px;color:var(--gray-4);margin-top:6px}
    .spinner-inline{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-btn{background:none;border:none;color:var(--gray-4);font-size:13px;cursor:pointer;margin-top:14px;width:100%;text-align:center;padding:6px;display:block}
    .back-btn:hover{color:var(--red)}
    .strength-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--gray-2);overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
  </style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <img src="logo-blanco.png" alt="3Villas" style="filter:brightness(0) invert(1)">
    <div class="card-sub">Crear nueva contraseña</div>
  </div>
  <div class="card-body">
    <div class="err" id="errMsg"></div>
    <div class="ok-msg" id="okMsg">✓ Contraseña actualizada. Redirigiendo al login...</div>
    <div id="formBlock">
      <div class="field">
        <label>Nueva contraseña</label>
        <input type="password" id="newPass" placeholder="Mínimo 6 caracteres" oninput="checkStrength()">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="hint" id="strengthText"></div>
      </div>
      <div class="field">
        <label>Repetir contraseña</label>
        <input type="password" id="newPass2" placeholder="Repite la contraseña">
      </div>
      <button class="btn" id="btnReset" onclick="doReset()">GUARDAR CONTRASEÑA</button>
    </div>
    <a href="/3villas-manuals/login.html" class="back-btn">← Volver al login</a>
  </div>
</div>
<script>
const WORKER = 'https://caspio-proxy.jordi-89b.workers.dev';
const params = new URLSearchParams(location.search);
const token  = params.get('token') || '';
const email  = params.get('email') || '';
if (!token || !email) {
  document.getElementById('errMsg').textContent = 'Enlace inválido. Solicita uno nuevo.';
  document.getElementById('errMsg').classList.add('show');
  document.getElementById('formBlock').style.display = 'none';
}
function checkStrength() {
  const p = document.getElementById('newPass').value;
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (p.length >= 6)  score++;
  if (p.length >= 10) score++;
  if (/[A-Z]/.test(p)) score++;
  if (/[0-9]/.test(p)) score++;
  if (/[^A-Za-z0-9]/.test(p)) score++;
  const levels = [
    {w:'0%',   bg:'var(--gray-2)', label:''},
    {w:'25%',  bg:'#e53935',      label:'Débil'},
    {w:'50%',  bg:'#fb8c00',      label:'Regular'},
    {w:'75%',  bg:'#fdd835',      label:'Buena'},
    {w:'100%', bg:'#43a047',      label:'Fuerte'},
  ];
  const lv = levels[Math.min(score, 4)];
  fill.style.width = lv.w;
  fill.style.background = lv.bg;
  text.textContent = lv.label;
}
document.getElementById('newPass2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});
async function doReset() {
  const errEl = document.getElementById('errMsg');
  errEl.classList.remove('show');
  const newPass  = document.getElementById('newPass').value;
  const newPass2 = document.getElementById('newPass2').value;
  if (newPass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres'; errEl.classList.add('show'); return; }
  if (newPass !== newPass2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.classList.add('show'); return; }
  const btn = document.getElementById('btnReset');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span>GUARDANDO...';
  try {
    const res  = await fetch(`${WORKER}?action=reset`, {
      method : 'POST',
      headers: {'Content-Type': 'application/json'},
      body   : JSON.stringify({ email, token, newPassword: newPass }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      errEl.textContent = data.error || 'Error al guardar';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'GUARDAR CONTRASEÑA';
      return;
    }
    document.getElementById('formBlock').style.display = 'none';
    document.getElementById('okMsg').style.display = 'block';
    setTimeout(() => location.replace('/3villas-manuals/login.html'), 2500);
  } catch(e) {
    errEl.textContent = 'Error de conexión: ' + e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'GUARDAR CONTRASEÑA';
  }
}
</script>
</body>
</html>
