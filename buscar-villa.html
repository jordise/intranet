<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C8102E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3Villas">
  <link rel="apple-touch-icon" href="icon-corazon-rojo-fondo-transparente.png">
  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/3villas-manuals/sw.js').catch(()=>{}));</script>
  <title>Buscar Villa v11 — 3Villas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --red:#C8102E;--red-dark:#9e0c24;--red-light:#fce8eb;
      --green:#1e9e4e;--green-light:#e6f7ee;
      --orange:#e07b00;--orange-light:#fff4e0;
      --blue:#1967d2;--blue-light:#e8f0fe;
      --gray-1:#f8f9fa;--gray-2:#eaecef;--gray-3:#c8cdd8;
      --gray-4:#7a8194;--gray-5:#2d3142;
      --shadow-xs:0 1px 3px rgba(0,0,0,.07);
      --shadow-sm:0 2px 8px rgba(0,0,0,.08);
      --shadow-md:0 4px 16px rgba(0,0,0,.11);
      --r:14px;--r-sm:10px;--r-xs:7px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Open Sans',sans-serif;background:var(--gray-1);color:var(--gray-5);min-height:100vh;padding-bottom:60px}

    /* ══ NAV — idéntico a pedir-wellcomepacks ══ */
    nav.top-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 20px;background:#fff;
      border-bottom:1px solid var(--gray-2);
      box-shadow:var(--shadow-xs);
      position:sticky;top:0;z-index:100;
    }
    .nav-logo{display:flex;align-items:center;gap:1px;text-decoration:none}
    .nav-logo .l1{font-family:Montserrat,sans-serif;font-size:21px;font-weight:900;color:var(--red);letter-spacing:-1px}
    .nav-logo .l2{font-family:Montserrat,sans-serif;font-size:21px;font-weight:900;color:var(--gray-5);letter-spacing:-.5px}
    .nav-btns{display:flex;align-items:center;gap:8px}
    .nav-menu{
      display:flex;align-items:center;justify-content:center;
      background:var(--red);border:none;color:#fff;
      width:34px;height:34px;border-radius:8px;
      text-decoration:none;font-size:18px;transition:background .15s;
    }
    .nav-menu:hover{background:var(--red-dark)}
    .nav-close{
      display:flex;align-items:center;justify-content:center;
      background:rgba(200,16,46,.1);border:none;color:var(--red);
      width:34px;height:34px;border-radius:50%;
      font-size:16px;font-weight:900;cursor:pointer;transition:background .15s;
    }
    .nav-close:hover{background:rgba(200,16,46,.2)}

    /* ══ HERO — idéntico a pedir-wellcomepacks ══ */
    .hero{text-align:center;padding:32px 20px 16px}
    .hero-title{font-family:Montserrat,sans-serif;font-size:clamp(22px,5vw,34px);font-weight:900;color:var(--red);margin-bottom:4px}
    .hero-sub{font-size:13px;color:var(--gray-4)}

    /* ══ MAIN CARD — idéntico a pedir-wellcomepacks ══ */
    .main-wrap{max-width:640px;margin:0 auto 40px;padding:0 12px}
    .main-card{
      background:#fff;border-radius:16px;
      box-shadow:0 6px 24px rgba(0,0,0,.09);
      overflow:hidden;border-top:3px solid var(--red);
    }

    /* ══ FORM — dentro de la card ══ */
    .form-inner{padding:20px 24px 24px}
    .f-label{
      font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;
      text-transform:uppercase;letter-spacing:.5px;color:var(--gray-5);
      display:flex;align-items:center;gap:6px;margin-bottom:6px;
    }
    .f-help{
      width:16px;height:16px;border-radius:50%;background:var(--gray-2);
      color:var(--gray-4);font-size:9px;font-weight:800;
      display:inline-flex;align-items:center;justify-content:center;
      cursor:help;font-family:Montserrat,sans-serif;flex-shrink:0;
    }
    .f-inp{
      border:1.5px solid var(--gray-2);border-radius:var(--r-sm);
      padding:11px 14px;font-size:14px;font-family:'Open Sans',sans-serif;
      color:var(--gray-5);background:#fff;outline:none;width:100%;
      transition:border-color .15s,box-shadow .15s;
    }
    .f-inp:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.08)}
    .f-inp::placeholder{color:var(--gray-3)}
    .f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .f-field{display:flex;flex-direction:column}

    /* Autocomplete */
    .ac-wrap{position:relative}
    .ac-dd{
      position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:#fff;border:1.5px solid var(--red);border-radius:var(--r-sm);
      box-shadow:var(--shadow-md);z-index:200;
      max-height:230px;overflow-y:auto;display:none;
    }
    .ac-opt{
      padding:10px 14px;font-size:13px;color:var(--gray-5);
      cursor:pointer;border-bottom:1px solid var(--gray-2);transition:background .1s;
    }
    .ac-opt:last-child{border-bottom:none}
    .ac-opt:hover{background:var(--red-light);color:var(--red)}
    .ac-opt mark{background:rgba(200,16,46,.12);color:var(--red);border-radius:2px;padding:0 2px;font-style:normal;font-weight:700}
    .ac-sub{font-size:11px;color:var(--gray-4);margin-top:2px}

    /* Botón BUSCAR */
    .btn-buscar{
      width:100%;margin-top:18px;height:50px;
      background:var(--red);color:#fff;border:none;
      border-radius:var(--r-sm);
      font-family:Montserrat,sans-serif;font-size:14px;font-weight:900;
      letter-spacing:2px;text-transform:uppercase;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .15s;box-shadow:0 4px 14px rgba(200,16,46,.3);
    }
    .btn-buscar:hover{background:var(--red-dark)}
    .btn-buscar:active{transform:scale(.98)}
    .btn-buscar:disabled{background:var(--gray-3);box-shadow:none;cursor:not-allowed;transform:none}
    .btn-buscar .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
    .btn-buscar.loading .spin{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse-icon{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.88)}}

    /* ══ RESULTADOS ══ */
    .results-wrap{padding:0 24px 24px;display:none;flex-direction:column;gap:10px}
    .results-header{
      font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;
      text-transform:uppercase;letter-spacing:.5px;color:var(--gray-4);
      padding:14px 0 6px;border-top:1px solid var(--gray-2);
    }
    .villa-card{
      background:var(--gray-1);border-radius:var(--r-sm);
      border:1.5px solid var(--gray-2);overflow:hidden;
      text-decoration:none;display:block;color:inherit;
      transition:box-shadow .15s,border-color .15s,transform .15s;
    }
    .villa-card:hover{box-shadow:var(--shadow-md);border-color:var(--red);transform:translateY(-1px)}
    .vc-head{background:#1565c0;padding:10px 16px;display:flex;align-items:center;gap:10px}
    .vc-name{font-family:Montserrat,sans-serif;font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.4px;flex:1;line-height:1.2}
    .vc-id{font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;background:rgba(255,255,255,.2);color:#fff;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .vc-body{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .vc-pill{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--gray-2);border-radius:20px;padding:3px 10px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;color:var(--gray-4)}
    .vc-pill span{color:var(--gray-5);font-weight:800}
    .vc-arrow{margin-left:auto;color:var(--gray-3);font-size:20px;flex-shrink:0}

    /* Estado vacío */
    .state-init{text-align:center;padding:40px 24px;color:var(--gray-4)}
    .state-init .big{font-size:40px;margin-bottom:10px}
    .state-init p{font-size:13px;line-height:1.6}

    /* Loading overlay */
    #loadOverlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
    .spinner{width:36px;height:36px;border:2.5px solid var(--gray-2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    .sp-txt{font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;color:var(--gray-4)}

    /* Toast */
    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);opacity:0;background:var(--gray-5);color:#fff;padding:9px 18px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.err{background:var(--red)}

    @media(max-width:480px){.f-row{grid-template-columns:1fr}}
    /* tooltip click llavero */
    .tip-wrap{position:relative;display:inline-flex}
    .tip-box{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      background:var(--gray-5);color:#fff;padding:9px 13px;border-radius:var(--r-xs);
      font-family:'Open Sans',sans-serif;font-size:12px;font-weight:400;line-height:1.5;
      white-space:nowrap;box-shadow:var(--shadow-md);z-index:300;text-align:left;
      min-width:200px;white-space:normal;width:220px}
    .tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
      border:5px solid transparent;border-top-color:var(--gray-5)}
    .tip-wrap.open .tip-box{display:block}
    .f-help-btn{width:16px;height:16px;border-radius:50%;background:var(--red-light);
      color:var(--red);font-size:9px;font-weight:800;border:none;
      display:inline-flex;align-items:center;justify-content:center;
      cursor:pointer;font-family:Montserrat,sans-serif;flex-shrink:0}

    /* ── Menu lateral ── */
    #menuOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;backdrop-filter:blur(2px)}
    #menuOverlay.open{display:block}
    #menuPanel{position:fixed;top:0;left:0;bottom:0;width:min(280px,80vw);background:#fff;z-index:901;
      box-shadow:4px 0 24px rgba(0,0,0,.15);transform:translateX(-100%);transition:transform .25s ease;
      display:flex;flex-direction:column;overflow:hidden}
    #menuPanel.open{transform:translateX(0)}
    .mp-head{padding:16px 18px 12px;border-bottom:1.5px solid var(--gray-2);display:flex;align-items:center;justify-content:space-between}
    .mp-logo{display:flex;align-items:center;text-decoration:none}
    .mp-logo img{height:26px;object-fit:contain}
    .mp-close{background:none;border:none;color:var(--gray-4);font-size:18px;font-weight:900;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
    .mp-close:hover{background:var(--gray-1);color:var(--gray-5)}
    .mp-items{flex:1;overflow-y:auto;padding:8px 0}
    .mp-item{display:flex;align-items:center;gap:14px;padding:13px 20px;text-decoration:none;color:var(--gray-5);font-family:'Open Sans',sans-serif;font-size:14px;font-weight:500;transition:background .12s;border-left:3px solid transparent}
    .mp-item:hover{background:var(--gray-1);border-left-color:var(--red)}
    .mp-item.active{background:var(--red-light);color:var(--red);font-weight:700;border-left-color:var(--red)}
    .mp-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .mp-ico.red{background:var(--red-light);color:var(--red)}
    .mp-ico.blue{background:#e8f0fe;color:#1967d2}
    .mp-ico.green{background:var(--green-light);color:var(--green)}
    .mp-ico.orange{background:var(--orange-light);color:var(--orange)}
    .mp-ico.gray{background:var(--gray-2);color:var(--gray-4)}
    .mp-sep{height:1px;background:var(--gray-2);margin:6px 20px}
    .mp-user{padding:14px 20px;border-top:1.5px solid var(--gray-2);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gray-4)}
    .mp-user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  </style>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="nav-component.js"></script>
</head>

  <div class="mp-user"><div class="mp-user-dot"></div><span id="menuUserName">—</span></div>

<!-- ══ NAV — igual que pedir-wellcomepacks ══ -->
<nav class="top-nav">
  <a class="nav-logo" href="index.html">
    <img src="logo-negro.png" alt="<3Villas" style="height:32px;object-fit:contain">
  </a>
  <div class="nav-btns">
    <button class="nav-menu" onclick="openMenu()" title="Menú principal" style="border:none;cursor:pointer">☰</button>
    <button onclick="history.back()" title="Volver" style="display:flex;align-items:center;justify-content:center;background:rgba(200,16,46,.12);border:1.5px solid rgba(200,16,46,.25);color:var(--red);width:34px;height:34px;border-radius:50%;font-size:15px;font-weight:900;cursor:pointer;transition:background .15s;flex-shrink:0">✕</button>

<!-- ══ HERO — igual que pedir-wellcomepacks ══ -->
<div class="hero">
  <div class="hero-title">Buscar Villa</div>
  <div class="hero-sub">Busca por nombre, código llavero o código Hostaway</div>
</div>

<!-- ══ MAIN CARD ══ -->
<div class="main-wrap">
  <div class="main-card">

    <!-- Formulario -->
    <div class="form-inner">

      <div class="f-field">
        <label class="f-label">
          Buscar por el nombre de la villa
        </label>
        <div class="ac-wrap">
          <input type="text" id="fNombre" class="f-inp"
                 placeholder="Ej: Binichic, Serpentona…"
                 autocomplete="off" oninput="onNombreInput()">
          <div class="ac-dd" id="acDd"></div>
        </div>
      </div>

      <div class="f-row">
        <div class="f-field">
          <label class="f-label">
            Código llavero Llaves
            <div class="tip-wrap" id="tipLlavero"><button class="f-help-btn" onclick="document.getElementById('tipLlavero').classList.toggle('open')">?</button><div class="tip-box">Código escrito en el llavero de las llaves, coincide con el código único de cada villa.</div></div>
          </label>
          <input type="text" id="fVillaid" class="f-inp"
                 placeholder="ej. 75" inputmode="numeric"
                 oninput="updateBtnState()">
        </div>
        <div class="f-field">
          <label class="f-label">
            Código Hostaway
          </label>
          <input type="text" id="fHostaway" class="f-inp"
                 placeholder="ej. 92737" inputmode="numeric"
                 oninput="updateBtnState()">
        </div>
      </div>

      <button class="btn-buscar" id="btnBuscar" onclick="doSearch()">
        <div class="spin"></div>
        <span>BUSCAR</span>
      </button>
    </div>

    <!-- Resultados -->
    <div class="results-wrap" id="resultsWrap">
      <div class="results-header" id="resultsHeader"></div>
      <div id="resultsList"></div>
    </div>

    <!-- Estado inicial -->
    <div class="state-init" id="stateInit">
      <div class="big"><img src="icon-corazon-rojo-fondo-transparente.png" alt="3Villas" style="width:72px;height:72px;object-fit:contain"></div>
      <p>Introduce el nombre, el código llavero<br>o el código Hostaway para buscar.</p>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';
var WORKER='https://caspio-proxy.jordi-89b.workers.dev';
var allVillas=[],_loaded=false,_selectedVilla=null; /* villa seleccionada del dropdown */

window.addEventListener('DOMContentLoaded',function(){
  fetch(Auth.url(WORKER+'?action=data&table=TaVillas&limit=500'))
    .then(function(r){return r.json();})
    .then(function(json){
      allVillas=(json.Result||json.result||[]).map(function(v){
        return{
          id:   String(v.villaid||''),
          name: v.Name_villa_para_inquilinos||v.Name||'Villa '+v.villaid,
          hwid: String(v.Hostawayid||'')
        };
      }).filter(function(v){return v.id;});
      _loaded=true;
    }).catch(function(){});
  document.addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
  document.addEventListener('click',function(e){var t=document.getElementById('tipLlavero');if(t&&!t.contains(e.target))t.classList.remove('open');});
});

/* ── Autocomplete nombre: seleccionar → ir directo a villa.html ── */
function onNombreInput(){
  _selectedVilla=null; /* limpiar selección al escribir */
  updateBtnState();
  var q=document.getElementById('fNombre').value.trim();
  var dd=document.getElementById('acDd');
  dd.innerHTML='';dd.style.display='none';
  if(!q||q.length<2||!_loaded)return;
  var ql=q.toLowerCase();
  var matches=allVillas.filter(function(v){return v.name.toLowerCase().indexOf(ql)!==-1;}).slice(0,12);
  if(!matches.length){
    dd.innerHTML='<div style="padding:12px 14px;font-size:13px;color:var(--gray-4);text-align:center">Sin resultados</div>';
    dd.style.display='block';return;
  }
  dd.innerHTML=matches.map(function(v){
    var safe=v.name.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    var idx=safe.toLowerCase().indexOf(ql);
    if(idx>=0)safe=safe.slice(0,idx)+'<mark>'+safe.slice(idx,idx+q.length)+'</mark>'+safe.slice(idx+q.length);
    var sub=v.hwid?'<div class="ac-sub">Hostaway: '+v.hwid+'</div>':'';
    return'<div class="ac-opt" data-id="'+v.id+'" data-name="'+v.name.replace(/"/g,'&quot;')+'">'+safe+sub+'</div>';
  }).join('');
  dd.querySelectorAll('.ac-opt').forEach(function(opt){
    opt.addEventListener('mousedown',function(e){
      e.preventDefault();
      _selectedVilla={id:opt.dataset.id,name:opt.dataset.name};
      document.getElementById('fNombre').value=opt.dataset.name;
      dd.style.display='none';
      /* Ir directamente a la villa */
      window.location.href='villa.html?villa_id='+encodeURIComponent(opt.dataset.id);
    });
  });
  dd.style.display='block';
}
window.onNombreInput=onNombreInput;

/* cerrar dropdown al clicar fuera */
document.addEventListener('click',function(e){
  var dd=document.getElementById('acDd');
  var inp=document.getElementById('fNombre');
  if(inp&&!inp.contains(e.target)&&!dd.contains(e.target))dd.style.display='none';
});

/* Al salir del campo nombre sin selección: limpiar */
document.addEventListener('DOMContentLoaded',function(){
  var inp=document.getElementById('fNombre');
  if(!inp)return;
  inp.addEventListener('blur',function(){
    setTimeout(function(){
      document.getElementById('acDd').style.display='none';
      if(!_selectedVilla&&inp.value.trim()){
        /* texto libre sin seleccionar → marcar error visual */
        inp.style.borderColor='var(--orange)';
      }
    },250);
  });
  inp.addEventListener('focus',function(){
    inp.style.borderColor='';
    if(inp.value.trim()&&!_selectedVilla)onNombreInput();
  });
});

/* Habilitar/deshabilitar BUSCAR según estado */
function updateBtnState(){
  var btn=document.getElementById('btnBuscar');
  var villaid=document.getElementById('fVillaid').value.trim();
  var hwid=document.getElementById('fHostaway').value.trim();
  /* Buscar habilitado si: villa seleccionada del dropdown OR hay código */
  var ok=!!_selectedVilla||!!villaid||!!hwid;
  /* v05: botón siempre rojo — validación al hacer clic */
}
window.updateBtnState=updateBtnState;

/* ── BUSCAR: solo actúa con códigos (nombre ya va directo al seleccionar) ── */
window.doSearch=function doSearch(){
  document.getElementById('acDd').style.display='none';
  var villaid=document.getElementById('fVillaid').value.trim();
  var hwid=document.getElementById('fHostaway').value.trim();
  var nombre=document.getElementById('fNombre').value.trim();

  /* Si hay nombre escrito pero sin selección → avisar */
  if(nombre&&!_selectedVilla&&!villaid&&!hwid){
    toast('Selecciona una villa del desplegable','err');
    document.getElementById('fNombre').style.borderColor='var(--orange)';
    return;
  }

  /* Si villa seleccionada del dropdown → ya fue directo, pero por si acaso */
  if(_selectedVilla){
    window.location.href='villa.html?villa_id='+encodeURIComponent(_selectedVilla.id);
    return;
  }

  if(!villaid&&!hwid){toast('Introduce al menos un código','err');return;}

  /* Buscar por código en local primero */
  if(_loaded){
    var res=allVillas.filter(function(v){
      if(villaid&&hwid)return v.id===villaid&&v.hwid===hwid;
      if(villaid)return v.id===villaid;
      if(hwid)return v.hwid===hwid;
      return false;
    });
    if(res.length===1){window.location.href='villa.html?villa_id='+encodeURIComponent(res[0].id);return;}
    if(res.length>1){renderResults(res);return;}
  }

  /* Query Caspio como fallback */
  setBusy(true);
  var parts=[];
  if(villaid)parts.push('villaid='+encodeURIComponent(villaid));
  if(hwid)parts.push('Hostawayid='+encodeURIComponent(hwid));
  var url=WORKER+'?action=data&table=TaVillas&where='+encodeURIComponent(parts.join(' AND '))+'&limit=10';
  fetch(Auth.url(url))
    .then(function(r){return r.json();})
    .then(function(json){
      var rows=(json.Result||json.result||[]).filter(function(v){return v.villaid;});
      if(rows.length===1){
        window.location.href='villa.html?villa_id='+encodeURIComponent(rows[0].villaid);
      } else if(rows.length>1){
        renderResults(rows.map(function(v){return{id:String(v.villaid),name:v.Name_villa_para_inquilinos||v.Name||'',hwid:String(v.Hostawayid||'')};}));
      } else {
        var si=document.getElementById('stateInit');
        si.style.display='block';
        si.innerHTML='<div class="big"><img src="icon-corazon-rojo-fondo-transparente.png" alt="" style="width:72px;height:72px;object-fit:contain;opacity:.6"></div><p>No se encontraron villas<br>con esos criterios.</p>';
      }
    })
    .catch(function(e){toast('Error: '+e.message,'err');})
    .finally(function(){setBusy(false);});
};

/* Múltiples resultados por código → lista compacta */
function renderResults(villas){
  document.getElementById('stateInit').style.display='none';
  var wrap=document.getElementById('resultsWrap');
  var header=document.getElementById('resultsHeader');
  var list=document.getElementById('resultsList');
  header.textContent=villas.length+' villas encontradas — elige una';
  list.innerHTML=villas.map(function(v){
    return'<a class="villa-card" href="villa.html?villa_id='+encodeURIComponent(v.id)+'" style="margin-bottom:8px">'
      +'<div class="vc-head"><div class="vc-name">'+esc(v.name)+'</div><div class="vc-id">#'+v.id+'</div></div>'
      +'<div class="vc-body">'+(v.hwid?'<div class="vc-pill">🏠 Hostaway <span>'+v.hwid+'</span></div>':'')+'<div class="vc-arrow">›</div></div>'
      +'</a>';
  }).join('');
  wrap.style.display='flex';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setBusy(on){
  var btn=document.getElementById('btnBuscar');
  var ov=document.getElementById('loadOverlay');
  btn.classList.toggle('loading',on);
  if(ov)ov.style.display=on?'flex':'none';
}

var _tt;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='show'+(type==='err'?' err':'');
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='';},4000);
}

/* Estado inicial: botón deshabilitado */
document.addEventListener('DOMContentLoaded',function(){
  /* v05: botón siempre activo */
});
})();
</script>
<script>
/* ── Menu lateral ── */
function openMenu(){
  document.getElementById('menuOverlay').classList.add('open');
  document.getElementById('menuPanel').classList.add('open');
  document.body.style.overflow='hidden';
  /* Marcar página activa */
  var cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.mp-item').forEach(function(a){
    a.classList.toggle('active', a.getAttribute('href')===cur);
  });
  /* Nombre usuario */
  var un=document.getElementById('menuUserName');
  if(un&&typeof Auth!=='undefined'&&Auth.name)un.textContent=Auth.name()||'—';
}
function closeMenu(){
  document.getElementById('menuOverlay').classList.remove('open');
  document.getElementById('menuPanel').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMenu();});
</script>
