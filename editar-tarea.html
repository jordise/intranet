/* ══ v52: Comprimir imagen con canvas (1200px máx, 80% calidad) ══ */
function compressImage(file, maxPx, quality) {
  maxPx   = maxPx   || 1200;
  quality = quality || 0.80;
  return new Promise(function(resolve) {
    /* Si el archivo ya es pequeño (<300KB) no comprimir */
    if (file.size < 300 * 1024) { resolve(file); return; }
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url);
      var w = img.width, h = img.height;
      /* Escalar manteniendo proporción */
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) {
        if (!blob) { resolve(file); return; } /* fallback */
        /* Crear File con mismo nombre */
        var compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
        console.log('[compressImage] ' + Math.round(file.size/1024) + 'KB → ' + Math.round(compressed.size/1024) + 'KB');
        resolve(compressed);
      }, 'image/jpeg', quality);
    };
    img.onerror = function() { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

/* ══ v52: Pre-subida en background al seleccionar foto ══ */
function startBackgroundUpload(type, idx) {
  var store  = type === 'before' ? beforePhotos  : afterPhotos;
  var upArr  = type === 'before' ? beforeUpload  : afterUpload;
  var p      = store[idx];
  var up     = upArr[idx];

  if (!p.file) return;

  /* Marcar como subiendo */
  up.status  = 'uploading';
  up.url     = '';
  up.promise = null;
  renderGallery(type); /* muestra spinner */

  var year = (document.getElementById('fFecha') && document.getElementById('fFecha').value || '').slice(0,4) || String(new Date().getFullYear());
  var safe = (myUserName||'user').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/gi,'_').toLowerCase();

  /* Comprimir primero, luego subir */
  var uploadPromise = compressImage(p.file, 1200, 0.80).then(function(compressed) {
    /* Actualizar el file en store con la versión comprimida */
    store[idx].file = compressed;

    var ext   = (compressed.name.split('.').pop() || 'jpg').toLowerCase();
    var fname = 'fotos-tareas/' + year + '_' + (type==='before'?'before':'after') + '_' + taskId + '_' + safe + '_' + (idx+1) + '.' + ext;
    var fd    = new FormData();
    fd.append('file', compressed, fname);
    fd.append('filename', fname);

    return fetch(Auth.url(WORKER + '?action=upload'), { method:'POST', body:fd })
      .then(function(r) { return r.json(); })
      .then(function(j) {
        var finalUrl = j.url || j.publicUrl || '';
        up.status = finalUrl ? 'done' : 'error';
        up.url    = finalUrl;
        if (finalUrl) store[idx].url = finalUrl; /* guardar URL en store */
        renderGallery(type);
        return finalUrl;
      });
  }).catch(function(e) {
    console.error('[BgUpload] error slot', idx, e);
    up.status = 'error';
    up.url    = '';
    renderGallery(type);
    return '';
  });

  up.promise = uploadPromise;
}

/* ══ v52: uploadPhoto usa URL pre-subida si ya está lista ══ */
function uploadPhoto(type, idx) {
  var store = type === 'before' ? beforePhotos : afterPhotos;
  var upArr = type === 'before' ? beforeUpload : afterUpload;
  var p     = store[idx];
  var up    = upArr[idx];

  /* Sin foto nueva y no eliminada → devolver URL existente */
  if (!p.file) return Promise.resolve(p.deleted ? '' : p.url);

  /* Ya subida en background → usar URL cacheada */
  if (up.status === 'done' && up.url) return Promise.resolve(up.url);

  /* Subiendo en background → esperar a que termine */
  if (up.status === 'uploading' && up.promise) return up.promise;

  /* Error en background o idle → subir ahora (fallback) */
  var year = (document.getElementById('fFecha') && document.getElementById('fFecha').value || '').slice(0,4) || String(new Date().getFullYear());
  var safe = (myUserName||'user').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/gi,'_').toLowerCase();

  return compressImage(p.file, 1200, 0.80).then(function(compressed) {
    store[idx].file = compressed;
    var ext   = (compressed.name.split('.').pop() || 'jpg').toLowerCase();
    var fname = 'fotos-tareas/' + year + '_' + (type==='before'?'before':'after') + '_' + taskId + '_' + safe + '_' + (idx+1) + '.' + ext;
    var fd    = new FormData();
    fd.append('file', compressed, fname);
    fd.append('filename', fname);
    return fetch(Auth.url(WORKER + '?action=upload'), { method:'POST', body:fd })
      .then(function(r) { return r.json(); })
      .then(function(j) { return j.url || j.publicUrl || p.url; })
      .catch(function() { return p.url; });
  });
}

function _renderUsuarioItems(users,q,currentId){
  var sorted=users.slice().sort(function(a,b){if(a.id===currentId)return -1;if(b.id===currentId)return 1;return a.name.localeCompare(b.name,'es',{sensitivity:'base'});});
  return sorted.map(function(u){
    var safe=u.name.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(q){var rx=new RegExp('('+q.replace(/[.+?^${}()|[\]\\]/g,'\\$&')+')','gi');safe=safe.replace(rx,'<mark>$1</mark>');}
    var marker=(u.id===currentId)?'<span style="font-size:9px;color:var(--red);font-weight:800;margin-left:6px">← tú</span>':'';
    var style=(u.id===currentId)?'background:var(--red-light)':'';
    return '<div class="villa-opt" data-id="'+u.id+'" data-name="'+u.name.replace(/"/g,'&quot;')+'" style="'+style+'">'+safe+marker+'</div>';
  }).join('');

// ── FOTOS: galería con slots fijos + pre-subida background (v52) ──
function buildGallery(type){ renderGallery(type); }

function renderGallery(type){
  var galId=type==='before'?'beforeGallery':'afterGallery';
  var store=type==='before'?beforePhotos:afterPhotos;
  var upArr=type==='before'?beforeUpload:afterUpload;
  var gal=g(galId); if(!gal)return;
  gal.innerHTML='';

  store.forEach(function(p,idx){
    var up=upArr[idx];
    var displayUrl=p.preview||(p.deleted?'':p.url);
    if(displayUrl){
      var thumb=document.createElement('div');
      thumb.className='photo-thumb'+(p.file?' is-new':'');
      var img=document.createElement('img'); img.alt='';
      img.onerror=function(){ store[idx].url=''; store[idx].preview=''; renderGallery(type); };
      img.src=displayUrl; thumb.appendChild(img);
      var numBadge=document.createElement('span'); numBadge.className='pt-num'; numBadge.textContent=idx+1; thumb.appendChild(numBadge);
      var nb=document.createElement('span'); nb.className='pt-new'; nb.textContent='NUEVA'; thumb.appendChild(nb);

      /* ── v52: overlay de estado de subida ── */
      if(up.status==='uploading'){
        var ov=document.createElement('div'); ov.className='pt-uploading';
        ov.innerHTML='<div class="up-spin"></div><div class="up-lbl">Subiendo…</div>';
        thumb.appendChild(ov);
      } else if(up.status==='done'){
        var done=document.createElement('div'); done.className='pt-done-badge'; done.textContent='✓'; thumb.appendChild(done);
      } else if(up.status==='error'){
        var err=document.createElement('div'); err.className='pt-err-badge'; err.textContent='⚠ Error'; thumb.appendChild(err);
      }

      var del=document.createElement('button'); del.type='button'; del.className='pt-del'; del.textContent='✕ Quitar';
      (function(i){del.onclick=function(e){e.stopPropagation();store[i]={file:null,url:'',deleted:true,preview:''};upArr[i]={status:'idle',url:'',promise:null};renderGallery(type);checkBadge();};} )(idx);
      thumb.appendChild(del);
      (function(url){thumb.onclick=function(e){if(!e.target.classList.contains('pt-del'))openLightbox(url);};})(displayUrl);
      gal.appendChild(thumb);
    } else {
      var empty=document.createElement('div'); empty.className='photo-empty-slot';
      var numLbl=document.createElement('span'); numLbl.className='pes-num'; numLbl.textContent=''+(idx+1); empty.appendChild(numLbl);
      var btnsDiv=document.createElement('div'); btnsDiv.className='pes-btns';
      var btnCam=document.createElement('button'); btnCam.type='button'; btnCam.className='pes-btn'; btnCam.textContent='📷'; btnCam.title='Hacer foto';
      var btnFile=document.createElement('button'); btnFile.type='button'; btnFile.className='pes-btn'; btnFile.textContent='📂'; btnFile.title='Subir archivo';
      var inpCam=document.createElement('input'); inpCam.type='file'; inpCam.accept='image/*'; inpCam.setAttribute('capture','environment'); inpCam.style.display='none';
      var inpFile=document.createElement('input'); inpFile.type='file'; inpFile.accept='image/*'; inpFile.style.display='none';

      /* ── v52: al seleccionar foto → preview + pre-subida background ── */
      (function(i,s,ua){
        function onFileSelected(file){
          if(!file)return;
          s[i].file=file; s[i].deleted=false;
          var r=new FileReader();
          r.onload=function(ev){
            s[i].preview=ev.target.result;
            ua[i]={status:'idle',url:'',promise:null}; /* reset upload state */
            renderGallery(type);
            checkBadge();
            /* Iniciar pre-subida en background */
            startBackgroundUpload(type,i);
          };
          r.readAsDataURL(file);
        }
        inpCam.onchange=function(e){ if(e.target.files&&e.target.files[0]) onFileSelected(e.target.files[0]); };
        inpFile.onchange=function(e){ if(e.target.files&&e.target.files[0]) onFileSelected(e.target.files[0]); };
        btnCam.onclick=function(e){ e.stopPropagation(); saveState(); inpCam.value=''; inpCam.click(); };
        btnFile.onclick=function(e){ e.stopPropagation(); saveState(); inpFile.value=''; inpFile.click(); };
      })(idx,store,upArr);

      btnsDiv.appendChild(btnCam); btnsDiv.appendChild(btnFile);
      empty.appendChild(btnsDiv); empty.appendChild(inpCam); empty.appendChild(inpFile);
      gal.appendChild(empty);
    }
  });
}

function initMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR)return;
  var rec=new SR(); rec.lang='es-ES'; rec.continuous=false; rec.interimResults=false;
  var aB=null,aF=null,isR=false;
  function startRec(b,f){ if(isR){rec.stop();return;} aB=b;aF=f;isR=true;b.classList.add('rec');try{rec.start();}catch(e){stopRec();} }
  function stopRec(){ isR=false; if(aB)aB.classList.remove('rec'); aB=null;aF=null; }
  rec.onresult=function(e){
    var t=e.results[0][0].transcript;
    var savedTl=window._savedMicTl; window._savedMicTl=null;
    if(savedTl&&window._tlAddItem){ window._tlAddItem(savedTl,t); return; }
    if(aF)aF.value=(aF.value?aF.value+' ':'')+t;
  };
  rec.onend=stopRec; rec.onerror=function(){ stopRec(); toast('Error de micrófono','err'); };
  var TL_IDS={micDesc:'fDesc',micSolucion:'fSolucion'};
  [['micNombre','fNombre'],['micDesc','fDesc'],['micNotas','fNotas'],['micSolucion','fSolucion']].forEach(function(p){
    var b=g(p[0]),f=g(p[1]); if(!b||!f)return;
    b.classList.remove('hidden');
    b.addEventListener('mousedown',function(){ if(TL_IDS[p[0]])window._savedMicTl=TL_IDS[p[0]]; });
    b.addEventListener('click',function(){ startRec(b,f); });
  });
}

function submitForm(markDone){
  if(isSaving)return;
  var nombre=g('fNombre').value.trim();
  g('fNombre').classList.remove('err');
  if(!nombre){ g('fNombre').classList.add('err'); g('fNombre').scrollIntoView({behavior:'smooth',block:'center'}); toast('⚠️ El nombre es obligatorio','err'); return; }
  var villaInp=g('fVillaSearch');
  var villaText=villaInp?villaInp.value.trim():'';
  if(villaText&&!selectedVillaId){
    if(villaInp){villaInp.classList.add('villa-err');setTimeout(function(){villaInp.classList.remove('villa-err');},1500);villaInp.scrollIntoView({behavior:'smooth',block:'center'});}
    var cl=g('villaCurrentLabel');if(cl){cl.textContent='⚠ Selecciona una villa de la lista antes de guardar';cl.className='villa-current err-save';}
    toast('⚠️ Selecciona una villa de la lista','err');return;
  }
  if(villaInp)villaInp.classList.remove('villa-err');
  var userInp=g('fAsignadoSearch');
  if(userInp&&userInp.value.trim()&&!selectedUserId){
    userInp.classList.add('villa-err');setTimeout(function(){userInp.classList.remove('villa-err');},1500);userInp.scrollIntoView({behavior:'smooth',block:'center'});
    var ucl=g('usuarioCurrentLabel');if(ucl){ucl.textContent='⚠ Selecciona una persona de la lista antes de guardar';ucl.className='villa-current err-save';}
    toast('⚠️ Selecciona una persona de la lista','err');return;
  }
  if(userInp)userInp.classList.remove('villa-err');

  setBusy(true);
  if(markDone)setTerminada(true);

  /* v52: uploadPhoto ya usa URLs pre-subidas si están listas */
  var uploads=[];
  for(var i=0;i<5;i++)(function(idx){ uploads.push(uploadPhoto('before',idx)); })(i);
  for(var i=0;i<5;i++)(function(idx){ uploads.push(uploadPhoto('after',idx));  })(i);

  Promise.allSettled(uploads).then(function(results){
    var beforeUrls=results.slice(0,5).map(function(r){ return r.status==='fulfilled'?r.value:''; });
    var afterUrls =results.slice(5,10).map(function(r){ return r.status==='fulfilled'?r.value:''; });
    var record={};
    record[F.nombre]     =nombre;
    record[F.descripcion]=(window._tlGet?_tlGet('fDesc'):g('fDesc').value).trim();
    record[F.fecha]      =(g('fFecha').value||today())+' 00:00:00';
    record[F.asignado]   =selectedUserId||g('fAsignado').value||'';
    record[F.terminada]  =isTerminada;
    record[F.notas]      =g('fNotas').value.trim();
    record[F.solucion]   =(window._tlGet?_tlGet('fSolucion'):g('fSolucion').value).trim();
    if(selectedVillaId)  record['villaid']=parseInt(selectedVillaId)||0;
    record['PMSmultiunitID']=selectedMultiunitId||'';
    record['urgente']   =isUrgente;
    record['importante']=isImportante;
    BEFORE_FIELDS.forEach(function(f,i){ record[f]=beforeUrls[i]||''; });
    AFTER_FIELDS.forEach(function(f,i){ record[f]=afterUrls[i]||''; });
    return fetch(Auth.url(WORKER+'?action=update&table=TaTasks&id='+encodeURIComponent(taskId)),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});
  })
  .then(function(r){ if(!r.ok)return r.json().then(function(e){ throw new Error(e.Message||e.error||'HTTP '+r.status); }); return r.json(); })
  .then(function(j){ if(j.error||j.Message)throw new Error(j.error||j.Message); onDone(); })
  .catch(function(err){ setBusy(false); toast('❌ '+err.message,'err'); console.error('[EditTask]',err); });
}

function onDone(){
  setBusy(false);clearState();toast('¡Tarea actualizada!','ok');sessionStorage.setItem('taskSaved','1');
  setTimeout(function(){
    var ref=document.referrer;
    if(ref&&ref.indexOf(window.location.hostname)!==-1&&ref!==window.location.href){window.location.href=ref;}
    else{history.back();}
  },600);
}

})();

/* ════ Lista de tareas editable (Descripción / Solución) ════
   Serialización compatible con el formato del proyecto:
     [x] texto  -> ítem marcado
     [ ] texto  -> ítem desmarcado
     • texto    -> ítem desmarcado (legacy viñeta)
     texto      -> línea plana legacy -> se carga como ítem desmarcado
   El orden de las líneas = el orden visual de la lista. */
(function() {
  var _lists = {}; /* fId -> { list, ta } */

  /* Texto guardado -> array de {text, done} respetando el orden */
  function parse(text) {
    if (!text) return [];
    return String(text).split('\n').map(function(line) {
      if (/^\[x\] /i.test(line)) return { text: line.slice(4), done: true };
      if (/^\[ \] /.test(line))   return { text: line.slice(4), done: false };
      if (/^\u2022 /.test(line))  return { text: line.slice(2), done: false };
      return { text: line, done: false }; /* línea plana legacy -> ítem desmarcado */
    }).filter(function(it) { return it.text.trim() !== ''; });
  }

  /* DOM de la lista -> texto serializado en el orden actual */
  function serialize(listEl) {
    var lines = [];
    listEl.querySelectorAll('.tl-item').forEach(function(it) {
      var span = it.querySelector('.tl-text');
      var t = (span.innerText || span.textContent || '').replace(/\n/g, ' ').trim();
      if (!t) return;
      var done = it.querySelector('input[type=checkbox]').checked;
      lines.push((done ? '[x] ' : '[ ] ') + t);
    });
    return lines.join('\n');
  }

  /* Coloca la fila "Añadir" justo encima de la primera tarea terminada;
     si no hay terminadas, queda al final de la lista */
  function placeAdd(fId) {
    var L = _lists[fId]; if (!L || !L.add) return;
    var firstDone = L.list.querySelector('.tl-item.done');
    if (firstDone) L.list.insertBefore(L.add, firstDone);
    else L.list.appendChild(L.add);
  }

  function sync(fId) {
    var L = _lists[fId]; if (!L) return;
    placeAdd(fId);
    L.ta.value = serialize(L.list);
  }

  /* Crea una fila de ítem */
  function makeItem(fId, text, done) {
    var L = _lists[fId];
    var item = document.createElement('div');
    item.className = 'tl-item' + (done ? ' done' : '');
    item.draggable = true;

    var grip = document.createElement('span');
    grip.className = 'tl-grip'; grip.textContent = '⠿'; grip.title = 'Arrastrar para reordenar';

    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = !!done;

    var span = document.createElement('span');
    span.className = 'tl-text'; span.contentEditable = 'true';
    span.setAttribute('data-ph', 'Escribe…');
    span.textContent = text || '';

    var del = document.createElement('button');
    del.type = 'button'; del.className = 'tl-del'; del.textContent = '×'; del.title = 'Eliminar';

    /* Edición de texto */
    span.addEventListener('input', function() { sync(fId); });
    span.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); span.blur(); addItem(fId, '', false, item); }
    });
    span.addEventListener('blur', function() {
      if ((span.textContent || '').trim() === '') { item.remove(); }
      sync(fId);
    });

    /* Marcar/desmarcar + auto-mover */
    cb.addEventListener('change', function() {
      if (cb.checked) { item.classList.add('done'); L.list.appendChild(item); }
      else { item.classList.remove('done'); L.list.insertBefore(item, L.list.firstChild); }
      sync(fId);
    });

    /* Eliminar */
    del.addEventListener('click', function() { item.remove(); sync(fId); });

    /* Drag & drop */
    item.addEventListener('dragstart', function() { item.classList.add('dragging'); });
    item.addEventListener('dragend', function() { item.classList.remove('dragging'); sync(fId); });

    item.appendChild(grip);
    item.appendChild(cb);
    item.appendChild(span);
    item.appendChild(del);
    return item;
  }

  /* Añade un ítem y, opcionalmente, enfoca su texto.
     Un ítem desmarcado se inserta como último pendiente (antes de la fila add). */
  function addItem(fId, text, done, afterEl) {
    var L = _lists[fId]; if (!L) return;
    var item = makeItem(fId, text, done);
    if (afterEl && afterEl.parentNode === L.list) L.list.insertBefore(item, afterEl.nextSibling);
    else if (L.add && L.add.parentNode === L.list) L.list.insertBefore(item, L.add);
    else L.list.appendChild(item);
    sync(fId);
    var sp = item.querySelector('.tl-text'); if (sp) sp.focus();
    return item;
  }

  function getDragAfter(listEl, y) {
    var els = [].slice.call(listEl.querySelectorAll('.tl-item:not(.dragging)'));
    return els.reduce(function(closest, child) {
      var box = child.getBoundingClientRect();
      var offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
      return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  window._tlInit = function(fId, ph) {
    var ta = document.getElementById(fId);
    var wrap = document.getElementById(fId + '_tl');
    if (!ta || !wrap) return;

    var list = document.createElement('div');
    list.className = 'tl-list';

    var add = document.createElement('div');
    add.className = 'tl-add';
    var inp = document.createElement('input');
    inp.type = 'text'; inp.placeholder = ph || 'Añadir…'; inp.autocomplete = 'off';
    var btn = document.createElement('button');
    btn.type = 'button'; btn.textContent = '+ Añadir';

    wrap.appendChild(list);
    list.appendChild(add);
    add.appendChild(inp);
    add.appendChild(btn);

    _lists[fId] = { list: list, ta: ta, add: add };

    /* Carga inicial desde el texto guardado (ítems antes de la fila add) */
    parse(ta.value).forEach(function(it) { list.insertBefore(makeItem(fId, it.text, it.done), add); });
    sync(fId);

    function commit() {
      var v = inp.value.trim();
      if (!v) return;
      addItem(fId, v, false);
      inp.value = '';
    }
    btn.addEventListener('click', function() { commit(); inp.focus(); });
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); commit(); } });

    list.addEventListener('dragover', function(e) {
      e.preventDefault();
      var dragging = list.querySelector('.tl-item.dragging'); if (!dragging) return;
      var after = getDragAfter(list, e.clientY);
      if (after == null) { if (add.parentNode === list) list.insertBefore(dragging, add); else list.appendChild(dragging); }
      else list.insertBefore(dragging, after);
    });

    ta.style.display = 'none';
  };

  /* Lee el texto serializado del campo (orden actual) */
  window._tlGet = function(fId) {
    var L = _lists[fId];
    if (L) return serialize(L.list);
    return (document.getElementById(fId) || {}).value || '';
  };

  /* Añade un ítem desmarcado con el texto dado (usado por el micrófono) */
  window._tlAddItem = function(fId, text) {
    if (!_lists[fId] || !text) return;
    addItem(fId, text.trim(), false);
  };
})();
</script>
</body>
