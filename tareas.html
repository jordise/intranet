<script>

function _ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ── Editor inline Quill ── */
var _tqls={};
(function(){
  function toPlain(h){
    if(!h)return'';
    var d=document.createElement('div');d.innerHTML=h;
    var lines=[];
    d.childNodes.forEach(function(n){
      if(n.nodeName==='UL'){
        var chk=n.getAttribute('data-checked');
        n.querySelectorAll('li').forEach(function(li){
          var t=(li.innerText||li.textContent||'').trim();
          if(chk==='true')lines.push('[x] '+t);
          else if(chk==='false')lines.push('[ ] '+t);
          else lines.push('• '+t);
        });
      } else {
        var t=(n.innerText||n.textContent||'').replace(/\n/g,' ').trim();
        if(t)lines.push(t);
      }
    });
    return lines.join('\n');
  }
  function toHtmlQ(text){
    if(!text)return'';
    if(text.indexOf('<ul')!==-1||text.indexOf('<p>')!==-1)return text;
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    return text.split('\n').map(function(line){
      if(/^\[x\] /.test(line))return'<ul data-checked="true"><li>'+esc(line.slice(4))+'</li></ul>';
      if(/^\[ \] /.test(line))return'<ul data-checked="false"><li>'+esc(line.slice(4))+'</li></ul>';
      if(/^• /.test(line))return'<ul><li>'+esc(line.slice(2))+'</li></ul>';
      return'<p>'+esc(line)+'</p>';
    }).join('');
  }
  window._tplain=toPlain;
  window._thtml=toHtmlQ;
})();

function _getWrap(el){return el.closest('.desc-wrap');}
function _getQ(wrap){return _tqls[wrap.getAttribute('data-tid')]||null;}

function _initQ(wrap){
  var tid=wrap.getAttribute('data-tid');
  if(_tqls[tid])return _tqls[tid];
  var qlEl=wrap.querySelector('.desc-ql');
  if(!qlEl||!window.Quill)return null;
  qlEl.innerHTML='';
  var q=new Quill(qlEl,{modules:{toolbar:false},theme:'snow',placeholder:'Descripción de la tarea…'});
  q.root.innerHTML=_thtml(wrap.getAttribute('data-raw')||'');
  _tqls[tid]=q;
  return q;
}

function _openDesc(btn){
  var wrap=_getWrap(btn);
  var lines=wrap.querySelector('.desc-lines');
  var editor=wrap.querySelector('.desc-editor');
  lines.style.display='none';
  btn.style.display='none';
  editor.style.display='block';
  var q=_initQ(wrap);
  if(q)setTimeout(function(){q.focus();},50);
}

function _doSave(wrap,onDone){
  var q=_getQ(wrap);
  var newText=q?_tplain(q.root.innerHTML):(wrap.getAttribute('data-raw')||'');
  newText=newText.trim();
  wrap.setAttribute('data-raw',newText);
  var lines=wrap.querySelector('.desc-lines');
  if(lines)lines.innerHTML=descHtml(newText);
  var tid=wrap.getAttribute('data-tid')||'';
  if(onDone)onDone();
  if(!tid)return;
  var saving=wrap.querySelector('.desc-saving');
  if(saving){saving.textContent='Guardando…';saving.style.color='';saving.style.display='inline';}
  var _worker=window._W||'https://caspio-proxy.jordi-89b.workers.dev';
  var url=_worker+'?action=update&table=TaTasks&id='+encodeURIComponent(tid);
  if(typeof Auth!=='undefined'&&Auth.url)url=Auth.url(url);
  fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({Taskdescription:newText})})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status);});return r.json();})
  .then(function(){if(saving){saving.textContent='✓';setTimeout(function(){saving.style.display='none';},2000);}})
  .catch(function(e){console.error('[desc save]',tid,e);if(saving){saving.textContent='✕ Error';saving.style.color='var(--red)';setTimeout(function(){saving.style.display='none';saving.style.color='';},4000);}});
}

function _closeDesc(btn){
  var wrap=_getWrap(btn);
  var editor=wrap.querySelector('.desc-editor');
  var openBtn=wrap.querySelector('.open-btn');
  _doSave(wrap,function(){
    editor.style.display='none';
    var lines=wrap.querySelector('.desc-lines');
    if(lines)lines.style.display='';
    if(openBtn)openBtn.style.display='';
  });
}

function _saveDescBtn(btn){_doSave(_getWrap(btn),null);}

function _qFmtRow(btn,type){
  var q=_getQ(_getWrap(btn));
  if(!q)return;
  q.focus();
  var f=q.getFormat();
  if(type==='bullet')q.format('list',f.list==='bullet'?false:'bullet');
  else q.format('list',(f.list==='unchecked'||f.list==='checked')?false:'unchecked');
}

function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function descHtml(t){
  if(!t)return'';
  if(t.indexOf('<ul')!==-1||t.indexOf('<p>')!==-1){
    var d=document.createElement('div');d.innerHTML=t;
    return _esc((d.innerText||d.textContent||'').replace(/\n/g,' ').trim());
  }
  return t.split('\n').map(function(l){
    if(/^\[x\] /.test(l))return'<s style="color:#c4c9d4">✓ '+_esc(l.slice(4))+'</s>';
    if(/^\[ \] /.test(l))return'<span style="color:#7a8194">☐ '+_esc(l.slice(4))+'</span>';
    if(/^\u2022 /.test(l))return'<b style="color:#C8102E;font-weight:900">•</b> '+_esc(l.slice(2));
    return _esc(l);
  }).join('<br>');
}
function toggleDesc(btn){
  var p=btn.previousElementSibling;
  p.classList.toggle('open');
  btn.textContent=p.classList.contains('open')?'▲ menos':'▼ más';
}
</script>

    var lbl=g('fUserLabel'); if(!lbl)return;

    /* v12: actualizar filtro multiunit al cambiar villa */

    var vText=val('fVilla').trim().toLowerCase();
    var mg=g('multiunitFilterGroup'),ms=g('fMultiunit');
    if(!vText){if(mg)mg.style.display='none';if(ms)ms.value='';return;}
    /* buscar villa que coincida exactamente */
    var matchVid=null;
    Object.keys(villaNameMap).forEach(function(vid){if(villaNameMap[vid].toLowerCase()===vText)matchVid=vid;});
    if(!matchVid){if(mg)mg.style.display='none';return;}
    var mus=Object.keys(multiunitsMap).filter(function(id){return multiunitsMap[id].villaId===matchVid;});
    if(!mus.length){if(mg)mg.style.display='none';return;}
    if(ms)ms.innerHTML='<option value="">Todas las unidades</option>'+mus.map(function(id){return'<option value="'+id+'">'+multiunitsMap[id].name+'</option>';}).join('');
    if(mg)mg.style.display='';
  }
    /* v32: buildWhereForUser acepta array de userIds específico */
    function buildWhereForUser(userKeys){
      var parts2=[], desde=val('fDesde');
      var userKeys2=userKeys||selUsersKeys();
      if(userKeys2.length>0){
        /* v37: para cada usuario añadir UserID y KPD si son distintos */
        var ids=[];
        userKeys2.forEach(function(key){
          ids.push("'"+key+"'");
          var u=allUsersList.find(function(x){return x.id===key;});
          if(u&&u.kpd&&u.kpd!==key) ids.push("'"+u.kpd+"'");
        });
        ids=ids.filter(function(v,i,a){return a.indexOf(v)===i;});
        parts2.push(ids.length===1?'UserID_asigned_alfanum='+ids[0]:'UserID_asigned_alfanum IN ('+ids.join(',')+')');
      }
      if(desde) parts2.push("(Data_to_be_done_fixed IS NULL OR Data_to_be_done_fixed>='"+desde+"T00:00:00')"); /* v35 */
      var bt=val('fBookingType'), tt=val('fTasktype'), reserva=val('fReserva').trim();
      if(bt)    parts2.push('Tasktype_booking='+bt);
      if(tt)    parts2.push("Tasktype='"+tt.replace(/'/g,"''")+"'");
      if(reserva) parts2.push("idreserva LIKE '%"+reserva+"%'");
      var villaQ=val('fVilla').trim().toLowerCase();
      if(villaQ){
        var mids=allVillas.filter(function(v){return v.name.toLowerCase().indexOf(villaQ)!==-1;}).map(function(v){return v.id;}).filter(Boolean);
        if(!mids.length) parts2.push('villaid=-999');
        else if(mids.length===1) parts2.push('villaid='+mids[0]);
        else parts2.push('villaid IN ('+mids.join(',')+')');
      }
      var muF=val('fMultiunit').trim();
      if(muF) parts2.push("PMSmultiunitID='"+muF+"'");
      var bq=(val('fBuscar')||'').trim().replace(/'/g,"''");
      if(bq) parts2.push("buscar_en_textos LIKE '%"+bq+"%'");
      return parts2.join(' AND ');
    }

    function buildWhere() {
    var parts=[], desde=val('fDesde'), hasta=val('fHasta');
    var reserva=val('fReserva').trim(), tt=val('fTasktype'), bt=val('fBookingType');
    /* v32: Tarea_terminada se filtra en cliente — ver doSearch */
    var keys=selUsersKeys();
    if(keys.length>0){
      /* v37: incluir UserID y KPD de cada usuario */
      var ids=[];
      keys.forEach(function(key){
        ids.push("'"+key+"'");
        var u=allUsersList.find(function(x){return x.id===key;});
        if(u&&u.kpd&&u.kpd!==key) ids.push("'"+u.kpd+"'");
      });
      ids=ids.filter(function(v,i,a){return a.indexOf(v)===i;});
      parts.push(ids.length===1?'UserID_asigned_alfanum='+ids[0]:'UserID_asigned_alfanum IN ('+ids.join(',')+')');
    }
    // Solo filtrar desde en servidor (hasta client-side para no excluir tareas sin fecha)
    if(desde) parts.push("(Data_to_be_done_fixed IS NULL OR Data_to_be_done_fixed>='"+desde+"T00:00:00')"); /* v35 */
    if(bt)    parts.push('Tasktype_booking='+bt);
    if(tt)    parts.push("Tasktype='"+tt.replace(/'/g,"''")+"'");
    if(reserva) parts.push("idreserva LIKE '%"+reserva+"%'");
    var villaQ=val('fVilla').trim().toLowerCase();
    if(villaQ){
      var mids=allVillas.filter(function(v){return v.name.toLowerCase().indexOf(villaQ)!==-1;}).map(function(v){return v.id;}).filter(Boolean);
      if(!mids.length) parts.push('villaid=-999');
      else if(mids.length===1) parts.push('villaid='+mids[0]);
      else parts.push('villaid IN ('+mids.join(',')+')');
    }
    var muF=val('fMultiunit').trim();
    if(muF)parts.push("PMSmultiunitID='"+muF+"'");
    var bq=(val('fBuscar')||'').trim().replace(/'/g,"''");
    if(bq) parts.push("buscar_en_textos LIKE '%"+bq+"%'");
    return parts.join(' AND ');
  }

  // ── CHIPS ──
  var DEFAULT_DESDE='2020-01-01', DEFAULT_HASTA='2029-12-31';

  function renderChips() {
    var html='';
    var keys=selUsersKeys();
    // Chip usuario: solo si hay selección no-default (más de 1 usuario, o un usuario distinto al actual)
    var isDefaultUser=(keys.length===1&&selectedUsers[currentUserId]===true);
    if(keys.length>0 && !isDefaultUser){
      var names=keys.map(function(id){return allUsersMap[id]||id;}).join(', ');
      html+=chip((keys.length===1?'Asignado: ':'Asignados: ')+names,'users');
    }
    // Chip fecha: solo si difiere del default
    var d=val('fDesde'), h=val('fHasta');
    if(d && d!==DEFAULT_DESDE) html+=chip('Desde: '+fmtDate(d),'desde');
    if(h && h!==DEFAULT_HASTA) html+=chip('Hasta: '+fmtDate(h),'hasta');
    if(val('fReserva').trim()) html+=chip('Reserva: '+val('fReserva').trim(),'reserva');
    if(val('fVilla').trim())   html+=chip('Villa: '+val('fVilla').trim(),'villa');
    if(val('fMultiunit').trim()){var _mn=multiunitsMap[val('fMultiunit')]?multiunitsMap[val('fMultiunit')].name:val('fMultiunit');html+=chip('Unidad: '+_mn,'multiunit');}
    var bt=val('fBookingType'), btL={'10':'Limpieza','20':'WelcomePack','30':'Cierre'};
    if(bt) html+=chip(btL[bt]||bt,'booking');
    if(val('fTasktype')) html+=chip('Tipo: '+val('fTasktype'),'tasktype');
    // Chip estado: solo si es Terminadas (Pendientes es el default)
    if(estadoFilter==='done') html+=chip('Terminadas','estado');
    if(estadoFilter==='all')  html+=chip('Todas','estado');
    if(filterUrgente)    html+=chip('🏁 Urgente','urgente');
    if(filterImportante) html+=chip('🚩 Importante','importante');
    g('chips').innerHTML=html;
    g('chips').querySelectorAll('button[data-key]').forEach(function(btn){
      btn.addEventListener('click',function(){ clearChip(btn.dataset.key); renderChips(); doSearch(); });
    });
  }
  function chip(label,key){ return '<span class="chip-filter">'+label+' <button data-key="'+key+'">✕</button></span>'; }
  function clearChip(key) {
    // La X limpia el filtro (quita la restricción), no resetea al default
    if(key==='users')   { selectedUsers={}; renderUserList(''); updateUserBtn(); }
    if(key==='desde')   g('fDesde').value='';       // sin límite inferior de fecha
    if(key==='hasta')   g('fHasta').value='';       // sin límite superior de fecha
    if(key==='reserva') g('fReserva').value='';
    if(key==='villa'){g('fVilla').value='';if(g('fMultiunit'))g('fMultiunit').value='';if(g('multiunitFilterGroup'))g('multiunitFilterGroup').style.display='none';}
    if(key==='multiunit')  g('fMultiunit').value='';
    if(key==='booking') g('fBookingType').value='';
    if(key==='tasktype') g('fTasktype').value='';
    if(key==='estado')  setEstado('pend',false);    // vuelve al default: pendientes
    if(key==='urgente')   {filterUrgente=false;   var b=document.getElementById('fUrgente');   if(b)b.classList.remove('on-urg');}
    if(key==='importante'){filterImportante=false; var b=document.getElementById('fImportante');if(b)b.classList.remove('on-imp');}
  }

  // ── BUSCAR ──
  function doSearch() {
    var myId=++searchId; proxOpen=false; renderChips();
    g('tableWrap').style.display='none'; g('stInit').style.display='none';
    g('stLoad').style.display='block';   g('stErr').style.display='none';
    g('statsBar').style.display='none';  if(g('hCount'))g('hCount').textContent='';

    var keys=selUsersKeys();
    /* v32: si hay múltiples usuarios, una petición por usuario para evitar el límite de 1000 */
    var fetchPromises;
    if(keys.length>1){
      fetchPromises=keys.map(function(uid){
        var whereOne=buildWhereForUser([uid]);
        var qs=whereOne?'&where='+encodeURIComponent(whereOne):'';
        return fetch(Auth.url(WORKER+'?action=data&table=TaTasks'+qs+'&orderBy=taskid%20DESC&limit=1000'))
          .then(function(r){return r.json();})
          .then(function(j){return j.Result||j.result||[];});
      });
    } else {
      var where=buildWhere();
      var qs=where?'&where='+encodeURIComponent(where):'';
      fetchPromises=[fetch(Auth.url(WORKER+'?action=data&table=TaTasks'+qs+'&orderBy=taskid%20DESC&limit=1000'))
        .then(function(r){return r.json();})
        .then(function(j){if(j.error)throw new Error(j.error);return j.Result||j.result||[];})];
    }

    Promise.all(fetchPromises)
      .then(function(arrays){
        if(myId!==searchId)return;
        /* Combinar y deduplicar por taskid */
        var seen={};
        var tasks=[];
        arrays.forEach(function(arr){
          arr.forEach(function(t){
            var id=String(t.taskid||t.PK_ID||'');
            if(!seen[id]){seen[id]=true;tasks.push(t);}
          });
        });
        /* v29: debug extendido para diagnóstico */
        var dbSelectedUsers=JSON.stringify(selectedUsers);
        var dbUsersList=allUsersList.map(function(u){return u.id+'='+u.name;}).join(', ');
        var dbAssignedVals=[...new Set(tasks.map(function(t){return String(t.UserID_asigned_alfanum||'(vacío)');}))]
                          .slice(0,20).join(', ');
        g('dbBox').textContent=
          'selectedUsers: '+dbSelectedUsers+
          '\ncurrentUserId: '+currentUserId+
          '\nWHERE: '+(where||'(sin filtros)')+
          '\n\nResultados: '+tasks.length+
          '\nUserID_asigned_alfanum en resultados: '+dbAssignedVals+
          '\n\nallUsersList IDs: '+dbUsersList+
          '\n\n'+JSON.stringify(tasks[0]||{},null,2);
        tasks.forEach(function(t){ if(t.Tasktype) tasktypeSet[String(t.Tasktype).trim()]=true; });
        var selTT=g('fTasktype'), curTT=selTT.value;
        selTT.innerHTML='<option value="">— Todos —</option>'+
          Object.keys(tasktypeSet).sort().map(function(v){
            return '<option value="'+v+'"'+(v===curTT?' selected':'')+'>'+v+'</option>';
          }).join('');
        tasks.forEach(function(t){ var vid=String(t.villaid||''); if(vid&&!villaNameMap[vid])villaNameMap[vid]='Villa '+vid; });
        allRows=tasks; renderTable();
      })
      .catch(function(err){
        if(myId!==searchId)return;
        g('stLoad').style.display='none'; g('stErr').style.display='block';
        g('errMsg').textContent=err.message; g('dbBox').textContent='Error:\n'+err.message;
      });
  }

  // ── SORT ──
  function sortBy(col) {
    if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
    document.querySelectorAll('th[data-col]').forEach(function(th){
      th.classList.remove('sort-asc','sort-desc');
      if(th.dataset.col===col) th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    });
    renderTable();
  }

  // ── FECHA CELL ──
  function dateCell(t) {
    var raw=t.Data_to_be_done_fixed||'';
    if(!raw) return '<span class="date-cell">—</span>';
    var d=new Date(raw.split('T')[0]+'T00:00:00');
    var today=new Date(); today.setHours(0,0,0,0);
    var diff=Math.round((d-today)/86400000);
    var cls='date-cell'+(diff<0?' overdue':diff===0?' today':'');
    var lbl=diff===0?'Hoy':diff===-1?'Ayer':diff===1?'Mañana':fmtDate(raw);
    return '<span class="'+cls+'">'+lbl+'</span>';
  }

        + '<div class="desc-editor">'

  // ── RENDER ──
  function renderTable() {
    g('stLoad').style.display='none';
    var today=new Date(); today.setHours(0,0,0,0);

    var hastaVal=val('fHasta');
    var filtered=allRows.filter(function(t){
      if(estadoFilter==='pend') return !isDone(t);
      if(estadoFilter==='done') return  isDone(t);
      return true;
    }).filter(function(t){
      /* v36: excluir Tasktype_booking=20 en cliente — evita problemas SQL con IS NULL */
      return String(t.Tasktype_booking||'') !== '20';
    }).filter(function(t){
      // Filtro hasta en cliente: tareas sin fecha siempre pasan
      if(!hastaVal) return true;
      var rawD=t.Data_to_be_done_fixed||'';
      if(!rawD) return true;
      return rawD.split('T')[0]<=hastaVal;
    }).filter(function(t){
      /* v19: filtro urgente/importante en cliente */
      if(filterUrgente   && !isFlagOn(t.urgente))    return false;
      if(filterImportante && !isFlagOn(t.importante)) return false;
      return true;
    }).map(function(t){
      return Object.assign({},t,{
        _villaName: (function(){var vn=villaNameMap[String(t.villaid||'')]||'Villa '+String(t.villaid||'');var mu=String(t.PMSmultiunitID||'').trim();return mu&&multiunitsMap[mu]?vn+' / '+multiunitsMap[mu].name:vn;})(), /* v12 */
        _userName:  allUsersMap[String(t.UserID_asigned_alfanum||'')]||String(t.UserID_asigned_alfanum||''),
        _done:      isDone(t)?1:0,
      });
    });

    filtered.sort(function(a,b){
      var av=a[sortCol]!==undefined?a[sortCol]:'', bv=b[sortCol]!==undefined?b[sortCol]:'';
      if(sortCol==='Data_to_be_done_fixed'){av=a.Data_to_be_done_fixed||'9999';bv=b.Data_to_be_done_fixed||'9999';}
      return String(av).localeCompare(String(bv),'es',{numeric:true})*sortDir;
    });

    /* v19: Separar en grupos con lógica de prioridad:
       - Importante (solo pendPast, no futura salvo que sea también urgente) → primeros
       - Urgente (cualquier fecha, sacada de Próximamente) → segundos
       - Normal pendPast → en medio
       - Próximamente: futuras no urgentes (aunque sean importantes) → colapsable
       - Done → al final
    */
    var grpImportante=[], grpUrgente=[], grpNormal=[], grpProx=[], doneRows=[];

    filtered.forEach(function(t){
      if(isDone(t)){ doneRows.push(t); return; }
      var rawD=t.Data_to_be_done_fixed||'';
      var isFuture=rawD && new Date(rawD.split('T')[0]+'T00:00:00')>today;
      var imp=isFlagOn(t.importante);
      var urg=isFlagOn(t.urgente);

      if(imp && !isFuture){
        grpImportante.push(t);        /* importante + pasada/hoy → primero */
      } else if(urg){
        grpUrgente.push(t);           /* urgente (cualquier fecha) → segundo, sacada de Próximamente */
      } else if(!isFuture){
        grpNormal.push(t);            /* normal pasada/hoy → en medio */
      } else {
        grpProx.push(t);              /* futura no urgente → Próximamente */
      }
    });

    var pendTotal = grpImportante.length+grpUrgente.length+grpNormal.length+grpProx.length;
    var done = doneRows.length;
    g('sCnt').textContent=filtered.length;
    g('sPendCnt').textContent=pendTotal; g('sDoneCnt').textContent=done;
    g('sPendStat').style.display=pendTotal>0?'flex':'none';
    g('sDoneStat').style.display=done>0?'flex':'none';
    g('statsBar').style.display='flex';
    if(g('hCount'))g('hCount').textContent=filtered.length||'';

    var tbody=g('tbody');
    if(!filtered.length){
      tbody.innerHTML='<tr class="empty-row"><td colspan="5">🏖️ Sin tareas para los filtros seleccionados</td></tr>';
      g('tableWrap').style.display='block'; return;
    }

    var html='';
    grpImportante.forEach(function(t){ html+=buildRow(t,''); });
    grpUrgente.forEach(function(t){    html+=buildRow(t,''); });
    grpNormal.forEach(function(t){     html+=buildRow(t,''); });

    if(grpProx.length){
      html+='<tr class="prox-toggle-row" onclick="toggleProxTareas()">'+
        '<td colspan="5">'+
        '<span style="margin-right:8px;font-size:14px">🗓️</span>'+
        '<strong>Próximamente: '+grpProx.length+' tarea'+(grpProx.length>1?'s':'')+'</strong>'+
        '<span id="proxArrow" style="margin-left:8px;display:inline-block;transition:transform .2s">›</span>'+
        '</td></tr>';
      grpProx.forEach(function(t){ html+=buildRow(t,'prox-task-row'); });
    }

    doneRows.forEach(function(t){ html+=buildRow(t,''); });
    tbody.innerHTML=html;
    g('tableWrap').style.display='block';
  }

})();
